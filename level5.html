let st={m:0,l:0};
const prog=JSON.parse(localStorage.getItem('ec5-prog')||'{}');
const started=localStorage.getItem('ec5-started');
function saveProg(){localStorage.setItem('ec5-prog',JSON.stringify(prog))}
function getGlobalIdx(m,l){let idx=0;for(let i=0;i<m;i++)idx+=MS[i].c;return idx+l}
function getMonthLesson(gi){let m=0,idx=gi;while(m<MS.length&&idx>=MS[m].c){idx-=MS[m].c;m++}return{m,l:idx}}
function completedInMonth(m){let s=getGlobalIdx(m,0),c=0;for(let i=0;i<MS[m].c;i++)if(prog[s+i])c++;return c}
function totalCompleted(){let c=0;for(let k in prog)if(prog[k])c++;return c}
function speak(text,rate){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=rate||0.55;speechSynthesis.speak(u)}
function exportProgress(){return btoa(unescape(encodeURIComponent(JSON.stringify({p:prog,s:started?'1':'0',v:5}))))}
function importProgress(code){try{const d=JSON.parse(decodeURIComponent(escape(atob(code.trim()))));if(!d.p)throw 0;Object.keys(prog).forEach(k=>delete prog[k]);Object.assign(prog,d.p);saveProg();if(d.s==='1')localStorage.setItem('ec5-started','1');return true}catch(e){return false}}
function showBackupPanel(){const bp=document.getElementById('backup-panel');if(bp)bp.classList.toggle('show')}
function doExport(){document.getElementById('bp-code').value=exportProgress();document.getElementById('bp-msg').className='bp-msg ok';document.getElementById('bp-msg').textContent='تم!'}
function doCopy(){const ta=document.getElementById('bp-code');ta.select();navigator.clipboard.writeText(ta.value).then(()=>{document.getElementById('bp-msg').className='bp-msg ok';document.getElementById('bp-msg').textContent='تم النسخ!'})}
function doImport(){const code=document.getElementById('bp-code').value;if(!code.trim()){document.getElementById('bp-msg').className='bp-msg err';document.getElementById('bp-msg').textContent='الصقي الكود أولاً.';return}if(importProgress(code)){document.getElementById('bp-msg').className='bp-msg ok';document.getElementById('bp-msg').textContent='تم!';setTimeout(()=>location.reload(),1000)}else{document.getElementById('bp-msg').className='bp-msg err';document.getElementById('bp-msg').textContent='الكود مش صحيح.'}}
function render(){const app=document.getElementById('app');if(!started){app.innerHTML=`<header><h1>تعلمي الإنجليزي</h1><div class="level-badge">المستوى الخامس</div><p>كورس سنة - ٣٦٥ درس - طلاقة شبه أصلية</p></header><div class="welcome"><h2>المستوى الأخير!</h2><p>أطول الجمل وأعمقها، مواضيع فكرية وثقافية وإبداعية، سخرية وفكاهة ومفاوضة، وإتقان كامل للغة.</p><p style="margin-top:24px"><strong>الشهور:</strong></p><p style="font-size:0.9rem;line-height:2">١. الدقة والفروق<br>٢. الفكاهة والسخرية<br>٣. التفاوض والإقناع<br>٤. الأدب والشعر<br>٥. العامية والتعابير<br>٦. العلاقات المهنية<br>٧. التفكير النقدي<br>٨. الإعلام والتحليل<br>٩. القيادة والإدارة<br>١٠. الطلاقة الثقافية<br>١١. التعبير الإبداعي<br>١٢. الإتقان الكامل</p><button class="start-btn" onclick="localStorage.setItem('ec5-started','1');render()">يلا نبلش الرحلة الأخيرة!</button></div>`;return}renderLesson()}
function renderLesson(){const app=document.getElementById('app');const gi=getGlobalIdx(st.m,st.l);const lesson=L[gi];const done=prog[gi];const tc=totalCompleted();const pct=Math.round(tc/365*100);let mt='';for(let i=0;i<MS.length;i++){const mc=completedInMonth(i);const f=mc===MS[i].c;mt+=`<div class="month-tab${i===st.m?' active':''}" onclick="st.m=${i};st.l=0;renderLesson()">${f?'<span class="check">&#10003;</span>':''}${i+1}. ${MS[i].n}</div>`}let dots='';for(let i=0;i<MS[st.m].c;i++){const d=getGlobalIdx(st.m,i);const c=i===st.l?'current':(prog[d]?'done':'');dots+=`<div class="dot ${c}" onclick="st.l=${i};renderLesson()"></div>`}app.innerHTML=`<header><button class="gear-btn" onclick="showBackupPanel()">&#9881;</button><h1>تعلمي الإنجليزي</h1><div class="level-badge">المستوى الخامس</div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><div class="progress-text">${tc} من ٣٦٥ (${pct}%)</div></header><div id="backup-panel" class="backup-panel"><h3>&#128190; نسخة احتياطية</h3><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px"><button class="bp-btn" onclick="doExport()">&#128190; حفظ</button><button class="bp-btn" onclick="doCopy()">&#128203; نسخ</button><button class="bp-btn restore" onclick="doImport()">&#128260; استرجاع</button><button class="bp-btn close" onclick="showBackupPanel()">&#10005;</button></div><textarea id="bp-code" placeholder="كود النسخة الاحتياطية..."></textarea><div id="bp-msg" class="bp-msg"></div></div><div class="months">${mt}</div><div class="month-title">${MS[st.m].e} - ${MS[st.m].n}</div><div class="lesson-nav"><span>درس ${st.l+1} من ${MS[st.m].c}</span><div class="lesson-dots">${dots}</div></div><div class="card"><div class="card-header"><span class="day-num">اليوم ${gi+1} من ٣٦٥</span>${done?'<span style="color:#16a34a;font-size:0.85rem">&#10003; تم</span>':''}</div><div class="card-body"><div class="english-sentence" onclick="speak('${lesson[0].replace(/'/g,"\\'")}')"> ${lesson[0]}</div><div class="controls"><button class="btn btn-listen" onclick="speak('${lesson[0].replace(/'/g,"\\'")}')">&#9654; اسمعيها</button><button class="btn btn-listen" onclick="speak('${lesson[0].replace(/'/g,"\\'")}',0.3)">&#128034; ببطء</button><button class="btn btn-translate" onclick="document.getElementById('tr').classList.toggle('show')">&#127760; الترجمة</button><button class="btn btn-tip" onclick="document.getElementById('tp').classList.toggle('show')">&#128161; نصيحة</button><button class="btn btn-words" onclick="showWords()">&#128220; كلمة كلمة</button></div><div id="word-area"></div><div id="tr" class="translation">${lesson[1]}</div><div id="tp" class="tip">${lesson[2]}</div><button class="btn btn-complete${done?' done':''}" onclick="markDone(${gi})">${done?'&#10003; تم':'&#10003; خلصت هالدرس'}</button></div></div><div class="bottom-nav"><button class="nav-btn" ${gi>=364?'disabled':''}onclick="goNext()">الجاي &#8592;</button><span class="lesson-count">${gi+1}/365</span><button class="nav-btn" ${gi<=0?'disabled':''}onclick="goPrev()">&#8594; السابق</button></div>`;setTimeout(()=>{const a=document.querySelector('.month-tab.active');if(a)a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})},100)}
function showWords(){const gi=getGlobalIdx(st.m,st.l);const w=L[gi][0].replace(/[.,!?;:'"]/g,'').split(' ');const a=document.getElementById('word-area');if(a.innerHTML){a.innerHTML='';return}a.innerHTML='<div class="word-mode">'+w.map(x=>`<button class="word-btn" onclick="speak('${x.replace(/'/g,"\\'")}',0.4)">${x}</button>`).join('')+'</div>'}
function markDone(gi){if(prog[gi])delete prog[gi];else prog[gi]=true;saveProg();renderLesson()}
function goNext(){const gi=getGlobalIdx(st.m,st.l);if(gi>=364)return;const n=getMonthLesson(gi+1);st.m=n.m;st.l=n.l;renderLesson();window.scrollTo(0,0)}
function goPrev(){const gi=getGlobalIdx(st.m,st.l);if(gi<=0)return;const n=getMonthLesson(gi-1);st.m=n.m;st.l=n.l;renderLesson();window.scrollTo(0,0)}
const ld=Object.keys(prog).map(Number).sort((a,b)=>b-a)[0];if(ld!==undefined&&ld<364){const n=getMonthLesson(ld+1);st.m=n.m;st.l=n.l}
render();
</script>
