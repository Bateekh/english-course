.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e2e8f0;display:flex;justify-content:space-between;padding:12px 20px;max-width:500px;margin:0 auto;z-index:10}
.nav-btn{background:#d97706;color:#fff;border:none;border-radius:10px;padding:10px 24px;font-size:0.9rem;cursor:pointer;font-family:inherit}
.nav-btn:disabled{background:#e2e8f0;color:#94a3b8}
.nav-btn:active{background:#b45309}
.lesson-count{display:flex;align-items:center;font-size:0.85rem;color:#64748b}

.month-title{padding:12px 20px;font-size:0.85rem;color:#64748b;text-align:center;background:#f8fafc}

.backup-panel textarea{width:100%;height:80px;border:1px solid #cbd5e1;border-radius:8px;padding:10px;font-size:0.85rem;font-family:monospace;direction:ltr;resize:none;margin-bottom:8px}
.backup-panel .bp-btn{background:#d97706;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:0.9rem;cursor:pointer;margin-left:8px;font-family:inherit}
.backup-panel .bp-btn.restore{background:#16a34a}
.backup-panel .bp-btn.close{background:#94a3b8}
.bp-msg{font-size:0.85rem;margin-top:8px;padding:8px;border-radius:6px;display:none}
.bp-msg.ok{display:block;background:#f0fdf4;color:#166534}
.bp-msg.err{display:block;background:#fef2f2;color:#991b1b}
.level-badge{display:inline-block;background:rgba(255,255,255,0.2);padding:2px 10px;border-radius:12px;font-size:0.75rem;margin-bottom:4px}

];
const L=[
// Month 1: Nuance & Subtlety (31)
["There is a subtle but profoundly important difference between being assertive, which involves standing up for yourself respectfully, and being aggressive, which involves disregarding other people's feelings entirely.","في فرق دقيق بس مهم بعمق بين إنك تكوني حازمة اللي بيتضمن الدفاع عن حالك باحترام، وبين إنك تكوني عدوانية اللي بيتضمن تجاهل مشاعر الناس بالكامل.","\"Assertive\" = حازم. \"Aggressive\" = عدواني. فرق مهم جداً بالتواصل."],
["When she said that the dinner was interesting, her tone of voice and the slight pause before the word interesting made it abundantly clear that she did not actually enjoy the meal at all.","لما قالت إنو العشا كان مثير للاهتمام، نبرة صوتها والوقفة الخفيفة قبل كلمة مثير للاهتمام وضحت بشكل كبير إنها فعلاً ما استمتعت بالأكل أبداً.","\"Interesting\" هون = ما أعجبها. اللهجة والنبرة بيغيروا المعنى بالكامل."],
["The distinction between sympathy, which involves feeling sorry for someone, and empathy, which involves truly sharing and understanding their emotional experience, is far more significant than most people realize.","الفرق بين التعاطف اللي بيتضمن إنك تحسي بالأسف لحدا، والتقمص العاطفي اللي بيتضمن إنك فعلاً تشاركي وتفهمي تجربتهم العاطفية، أهم بكتير مما أغلب الناس بيدركوا.","\"Sympathy\" = تعاطف سطحي. \"Empathy\" = تقمص عاطفي عميق. فرق جوهري."],
["His response was technically correct and factually accurate, but the dismissive way in which he delivered it completely undermined the validity of his point and alienated his entire audience.","جوابه كان صحيح تقنياً ودقيق بالوقائع، بس الطريقة الاستخفافية اللي قدمه فيها قوضت بالكامل صحة نقطته ونفّرت كل جمهوره.","\"Dismissive\" = استخفافي. \"Undermined\" = قوّض. \"Alienated\" = نفّر."],
["The word home carries emotional connotations of warmth, belonging, and safety that the more neutral word house, which refers primarily to a physical structure, simply cannot convey.","كلمة home بتحمل دلالات عاطفية بالدفء والانتماء والأمان اللي الكلمة الأكتر حيادية house اللي بتشير بشكل رئيسي لبناء مادي ببساطة ما بتقدر توصلها.","\"Connotations\" = دلالات. \"Denotation\" = المعنى الحرفي. فرق مهم باللغة."],
["She chose her words with extraordinary precision, carefully navigating the delicate balance between honesty and tact so that her constructive feedback would be received with openness rather than defensiveness.","اختارت كلماتها بدقة استثنائية، بتتنقل بعناية بالتوازن الدقيق بين الصدق واللباقة حتى ملاحظاتها البنّاءة تنستقبل بانفتاح بدل الدفاعية.","\"Tact\" = لباقة. \"Defensiveness\" = الدفاعية. مهارة تواصل عالية."],
["There is a world of difference between someone who is frugal, meaning they are wisely careful with their money, and someone who is cheap, meaning they are unwilling to spend even when it is appropriate.","في فرق هائل بين شخص مقتصد يعني بيدير مصاريه بحكمة، وشخص بخيل يعني مش مستعد يصرف حتى لما يكون مناسب.","\"Frugal\" = مقتصد (إيجابي). \"Cheap\" = بخيل (سلبي). نفس المفهوم بنظرتين."],
["The email was worded so diplomatically that it took me several readings to fully grasp the underlying implication that our proposal had essentially been politely but firmly rejected.","الإيميل كان مصاغ بدبلوماسية لدرجة إنه أخذني عدة قراءات لأفهم بالكامل الإشارة الضمنية إنو اقتراحنا بالأساس انرفض بأدب بس بحزم.","\"Underlying implication\" = الإشارة الضمنية. قراءة ما بين السطور."],
["Knowing when to speak up and when to remain strategically silent is a form of emotional intelligence that many highly articulate people ironically struggle to master throughout their careers.","معرفة إيمت تحكي وإيمت تسكتي بشكل استراتيجي شكل من أشكال الذكاء العاطفي اللي كتير ناس فصيحين بالمفارقة بيصعب عليهم يتقنوه طول مسيرتهم المهنية.","\"Strategically silent\" = صامت بشكل استراتيجي. القوة بالصمت أحياناً."],
["The phrase I am fine has become perhaps the most universally understood euphemism in the English language, often masking emotions that range from mild frustration to genuine despair.","عبارة أنا منيحة صارت يمكن أكتر تلطيف مفهوم عالمياً باللغة الإنجليزية، وغالباً بتخبي مشاعر بتتراوح من إحباط خفيف لحد يأس حقيقي.","\"Euphemism\" = تلطيف. \"I'm fine\" = غالباً مش منيحة فعلاً!"],
["A truly sophisticated communicator understands that the meaning of any statement is shaped not merely by the words themselves but by the context, the relationship between speakers, and the cultural framework.","متواصل متمكن فعلاً بيفهم إنو معنى أي تصريح بيتشكل مش بس بالكلمات نفسها بل بالسياق والعلاقة بين المتحدثين والإطار الثقافي.","\"Sophisticated communicator\" = متواصل متمكن. هدفك بهالمستوى!"],
["The difference between confidence and arrogance is often razor-thin; confidence inspires trust and admiration, while arrogance breeds resentment and alienation among the very people you are trying to impress.","الفرق بين الثقة والغرور غالباً رفيع جداً؛ الثقة بتلهم الثقة والإعجاب، بينما الغرور بيولد الحقد والنفور عند الناس بالزبط اللي عم تحاولي تعجبيهم.","\"Razor-thin\" = رفيع جداً. \"Breeds\" = يولّد."],
["She managed to convey her deep disappointment without ever explicitly stating it, using strategic pauses, carefully chosen qualifiers, and a measured tone that spoke volumes.","قدرت توصّل خيبة أملها العميقة بدون ما تقولها صراحة، باستعمال وقفات استراتيجية ومحددات مختارة بعناية ونبرة محسوبة حكت كتير.","\"Qualifiers\" = محددات (كلمات مثل somewhat, rather). \"Spoke volumes\" = حكت كتير."],
["Understanding the distinction between hearing, which is a passive physical process, and genuinely listening, which requires active cognitive and emotional engagement, fundamentally transforms your relationships.","فهم الفرق بين السمع اللي هو عملية جسدية سلبية، والإصغاء الحقيقي اللي بيتطلب تفاعل معرفي وعاطفي فعّال، بيغير علاقاتك بشكل جذري.","\"Hearing\" = سمع سلبي. \"Listening\" = إصغاء فعّال. فرق جذري."],
["The way you frame a question determines the kind of answer you receive; asking why did this fail produces a very different conversation than asking what can we learn from this experience.","الطريقة اللي بتصيغي فيها السؤال بتحدد نوع الجواب اللي بتحصلي عليه؛ سؤال ليش فشل هاد بيولد محادثة مختلفة كتير عن شو ممكن نتعلم من هالتجربة.","\"Frame a question\" = صياغة السؤال. القوة بالصياغة."],
["Constructive criticism, when delivered with genuine care and specific actionable suggestions, becomes a gift rather than an attack, strengthening bonds rather than eroding them.","النقد البنّاء لما ينقدم بعناية حقيقية واقتراحات عملية محددة بيصير هدية بدل هجوم، بيقوي الروابط بدل ما يآكلها.","\"Actionable suggestions\" = اقتراحات عملية. \"Eroding\" = تآكل."],
["The English language is remarkably rich in near-synonyms that carry subtly different shades of meaning, and mastering these distinctions is what separates advanced speakers from truly fluent ones.","اللغة الإنجليزية غنية بشكل ملحوظ بمترادفات قريبة بتحمل ظلال معنى مختلفة بدقة، وإتقان هالفروقات هو اللي بيفصل المتحدثين المتقدمين عن الطلقين فعلاً.","\"Near-synonyms\" = مترادفات قريبة. \"Shades of meaning\" = ظلال المعنى."],
["Sometimes the most powerful statement you can make in a difficult conversation is simply to ask a thoughtful question and then give the other person the space and silence they need to answer honestly.","أحياناً أقوى تصريح ممكن تعمليه بمحادثة صعبة هو ببساطة تسألي سؤال مدروس وبعدين تعطي الشخص التاني المساحة والصمت اللي بيحتاجه يجاوب بصدق.","قوة الأسئلة المدروسة والصمت المعطي. مهارة تواصل عالية."],
["The cultural concept of saving face, which exists in varying forms across virtually all societies, profoundly influences how people communicate disagreement and deliver criticism.","المفهوم الثقافي لحفظ ماء الوجه اللي بيوجد بأشكال مختلفة تقريباً بكل المجتمعات بيأثر بعمق على كيف الناس بتوصل الاختلاف وتقدم النقد.","\"Saving face\" = حفظ ماء الوجه. مفهوم عالمي بأشكال مختلفة."],
["A well-placed understatement can sometimes communicate infinitely more than the most elaborate and detailed explanation, precisely because it trusts the listener's intelligence to fill in the gaps.","تصريح مخفف موضوع بمكانه ممكن أحياناً يوصل أكتر بلا حدود من أكتر شرح تفصيلي ومفصل، بالتحديد لأنه بيوثق بذكاء المستمع ليملأ الفراغات.","\"Understatement\" = تصريح مخفف. عكسه overstatement. أسلوب بريطاني."],
["The art of saying no gracefully, without burning bridges or creating unnecessary conflict, is one of the most underrated yet practically essential communication skills in adult life.","فن قول لا بأناقة بدون ما تحرقي الجسور أو تخلقي صراع غير ضروري واحدة من أكتر مهارات التواصل استخفافاً بها بس عملياً ضرورية بحياة البالغين.","\"Burning bridges\" = حرق الجسور. \"Underrated\" = مستخف فيها."],
["What makes a conversation truly meaningful is not the brilliance of what is said but the quality of attention that both participants bring to the exchange of ideas and feelings.","اللي بيخلي المحادثة ذات معنى فعلاً مش بريق اللي بينحكى بل جودة الانتباه اللي كلا المشاركين بيجيبوه لتبادل الأفكار والمشاعر.","\"Quality of attention\" = جودة الانتباه. جوهر التواصل الحقيقي."],
["Mastering the art of the graceful pivot, smoothly changing the subject when a conversation becomes uncomfortable, is an invaluable social skill that protects both you and others from unnecessary embarrassment.","إتقان فن التحويل الأنيق، تغيير الموضوع بسلاسة لما المحادثة تصير مزعجة، مهارة اجتماعية لا تقدر بثمن بتحمي إنتِ وغيرك من إحراج غير ضروري.","\"Graceful pivot\" = تحويل أنيق. مهارة اجتماعية مهمة جداً."],
["The ability to read between the lines, to understand what is being communicated beneath the surface of spoken words, is perhaps the ultimate mark of true linguistic and emotional mastery.","القدرة على القراءة بين السطور، فهم اللي عم يتوصل تحت سطح الكلمات المنطوقة، يمكن العلامة النهائية للإتقان اللغوي والعاطفي الحقيقي.","\"Read between the lines\" = القراءة بين السطور. ذروة الفهم اللغوي."],
["In English, the strategic use of hedging language, phrases like it seems to me or I could be wrong but, allows speakers to express strong opinions while maintaining an appearance of open-mindedness.","بالإنجليزي، الاستعمال الاستراتيجي للغة التحفظ، عبارات مثل \"يبدو لي\" أو \"ممكن أكون غلطانة بس\"، بيسمح للمتحدثين يعبروا عن آراء قوية مع الحفاظ على مظهر الانفتاح.","\"Hedging language\" = لغة التحفظ. أداة دبلوماسية مهمة."],
["Context is everything in language: the simple phrase we need to talk can inspire either excitement or dread depending entirely on the relationship and circumstances in which it is uttered.","السياق هو كل شي باللغة: عبارة بسيطة مثل لازم نحكي ممكن تلهم حماس أو خوف حسب العلاقة والظروف اللي بتنقال فيها بالكامل.","\"Context is everything\" = السياق هو كل شي. مثال عملي عن قوة السياق."],
["The finest writers in the English language understand that what is deliberately left unsaid can resonate far more deeply with readers than the most eloquently crafted prose.","أفضل الكتّاب باللغة الإنجليزية بيفهموا إنو اللي بيتترك بقصد بدون ما ينقال ممكن يتردد أعمق بكتير مع القراء من أبلغ نثر مصاغ.","\"Deliberately left unsaid\" = متروك بقصد. \"Resonate\" = يتردد/يؤثر."],
["The way bilingual individuals unconsciously code-switch between languages depending on the emotional content of what they are expressing reveals fascinating insights about the relationship between language and feeling.","الطريقة اللي الأفراد ثنائيي اللغة بيتنقلوا فيها لا شعورياً بين اللغات حسب المحتوى العاطفي لللي عم يعبروا عنه بتكشف رؤى ملفتة عن العلاقة بين اللغة والشعور.","\"Code-switch\" = التنقل بين اللغات. ظاهرة لغوية بتعيشيها يومياً!"],
["True eloquence is not about using impressive vocabulary or constructing elaborate sentences; it is about choosing exactly the right words to make your meaning land with precision, clarity, and emotional impact.","البلاغة الحقيقية مش عن استعمال مفردات مبهرة أو بناء جمل معقدة؛ هي عن اختيار الكلمات المناسبة بالزبط لتوصلي معناكِ بدقة ووضوح وتأثير عاطفي.","\"Eloquence\" = البلاغة. الهدف النهائي للتواصل."],
["At this advanced level, you are no longer simply learning English; you are developing the sophisticated metacognitive awareness needed to understand how language itself shapes thought and perception.","بهالمستوى المتقدم، ما عدتِ بس عم تتعلمي إنجليزي؛ عم تطوري الوعي فوق المعرفي المتطور المطلوب لفهم كيف اللغة نفسها بتشكل الفكر والإدراك.","\"Metacognitive awareness\" = الوعي فوق المعرفي. تفكير بالتفكير!"],
["The difference between persuading and manipulating lies entirely in intent: persuasion respects the other person's autonomy and right to choose, while manipulation deliberately exploits their vulnerabilities for selfish gain.","الفرق بين الإقناع والتلاعب بيكمن بالكامل بالنية: الإقناع بيحترم استقلالية الشخص التاني وحقه بالاختيار، بينما التلاعب بيستغل عمداً نقاط ضعفه لمكسب أناني.","\"Autonomy\" = استقلالية. فرق أخلاقي جوهري."],
// Month 2: Humor, Sarcasm & Wit (28)
["Sarcasm is one of the trickiest aspects of English to master because it requires you to understand that the speaker means the exact opposite of what their words literally say, and the only clues are tone and context.","السخرية من أصعب جوانب الإنجليزي للإتقان لأنها بتتطلب تفهمي إنو المتحدث بيقصد عكس اللي كلماته حرفياً بتقوله، والإشارات الوحيدة هي النبرة والسياق.","\"Sarcasm\" = سخرية. النبرة هي المفتاح لفهمها."],
["When an American says oh great after spilling coffee on their shirt, the enthusiastic tone combined with the obviously negative situation creates an unmistakable instance of verbal irony.","لما أمريكي بيقول \"أوه عظيم\" بعد ما ينسكب القهوة على قميصه، النبرة المتحمسة مع الموقف السلبي الواضح بتخلق حالة لا تخطئها من السخرية اللفظية.","\"Verbal irony\" = السخرية اللفظية. أكتر أنواع السخرية شيوعاً."],
["The beauty of a well-crafted pun lies in its ability to exploit the multiple meanings of a single word or phrase, creating a moment of delightful surprise and intellectual pleasure.","جمال التورية المصاغة بإتقان بقدرتها تستغل المعاني المتعددة لكلمة أو عبارة وحدة، بتخلق لحظة مفاجأة ممتعة ومتعة فكرية.","\"Pun\" = تورية. لعب على الكلمات. نوع فكاهة محبوب ومكروه بنفس الوقت!"],
["Self-deprecating humor, the ability to laugh at yourself before anyone else gets the chance, is widely considered one of the most endearing and disarming qualities a person can possess.","الفكاهة الذاتية، القدرة على الضحك على حالك قبل ما حدا تاني ياخد الفرصة، بتعتبر على نطاق واسع من أكتر الصفات المحببة والمُنزعة للسلاح اللي شخص ممكن يملكها.","\"Self-deprecating\" = ذاتي الاستخفاف. \"Disarming\" = منزع للسلاح (مجازياً)."],
["Deadpan delivery, where someone says something absolutely hilarious with a completely straight face and zero emotional expression, is a comedic technique that requires impeccable timing and extraordinary restraint.","الإلقاء الجاد حيث حدا بيقول شي مضحك جداً بوجه جدي تماماً وبدون أي تعبير عاطفي تقنية كوميدية بتتطلب توقيت لا تشوبه شائبة وضبط نفس استثنائي.","\"Deadpan\" = إلقاء جاد. \"Impeccable timing\" = توقيت مثالي."],
["The phrase bless your heart, commonly used in the American South, is a masterful example of how sugar-coated language can carry a meaning that ranges from genuine affection to devastating condescension.","عبارة \"يحفظ قلبك\" المستعملة عادة بجنوب أمريكا مثال رائع عن كيف اللغة المغلفة بالسكر ممكن تحمل معنى بيتراوح من عاطفة حقيقية لتعالي مدمر.","\"Bless your heart\" = ممكن تكون حنونة أو ساخرة! \"Condescension\" = تعالي."],
["British humor, with its love of understatement and dry wit, often leaves non-native English speakers genuinely confused about whether the speaker is being serious, joking, or subtly insulting them.","الفكاهة البريطانية بحبها للتخفيف والذكاء الجاف غالباً بتخلي غير الناطقين بالإنجليزية محتارين فعلاً إذا المتحدث جدي أو عم يمزح أو عم يهينهم بدقة.","\"Dry wit\" = ذكاء جاف. \"Understatement\" = تخفيف. أساس الفكاهة البريطانية."],
["There is a fine line between playful teasing, which strengthens bonds through shared laughter, and hurtful mockery, which damages trust and creates emotional distance between people.","في خط رفيع بين المزاح المرح اللي بيقوي الروابط من خلال الضحك المشترك، والسخرية المؤذية اللي بتضر الثقة وبتخلق مسافة عاطفية بين الناس.","\"Teasing\" = مزاح. \"Mockery\" = سخرية مؤذية. فرق مهم!"],
["The comedic rule of three, where two normal items establish a pattern and a third unexpected one breaks it, is the structural foundation of countless jokes in the English language.","قاعدة الثلاثة الكوميدية حيث عنصرين عاديين بيأسسوا نمط وتالت غير متوقع بيكسره هي الأساس البنيوي لعدد لا يحصى من النكت باللغة الإنجليزية.","\"Rule of three\" = قاعدة الثلاثة. سر كتير نكت ناجحة!"],
["Situational comedy, which derives its humor from the absurdity or awkwardness of everyday situations rather than from clever wordplay, tends to translate more easily across cultural and linguistic boundaries.","الكوميديا الموقفية اللي بتستمد فكاهتها من عبثية أو إحراج المواقف اليومية بدل التلاعب الذكي بالكلمات بتميل تنترجم بسهولة أكتر عبر الحدود الثقافية واللغوية.","\"Situational comedy\" = كوميديا موقفية. \"Absurdity\" = عبثية."],
["The ability to find genuine humor in difficult circumstances, without minimizing the seriousness of the situation, is a coping mechanism that psychologists recognize as a marker of remarkable emotional resilience.","القدرة على إيجاد فكاهة حقيقية بظروف صعبة بدون التقليل من جدية الموقف آلية تأقلم بيعترف فيها علماء النفس كعلامة على مرونة عاطفية ملحوظة.","\"Coping mechanism\" = آلية تأقلم. الضحك كعلاج!"],
["When someone responds to a genuine compliment with yeah right or sure, the rolling of their eyes and skeptical tone transform these normally affirmative words into expressions of complete disbelief.","لما حدا بيرد على مجاملة حقيقية بـ\"أي والله\" أو \"أكيد\" بتدوير عيونهم ونبرة متشككة بتحول هالكلمات الإيجابية عادة لتعابير كفر تام.","حركة العيون والنبرة بيقلبوا المعنى بالكامل. لغة الجسد مهمة!"],
["A perfectly timed pause before the punchline of a joke can be the difference between an audience erupting in laughter and the same joke falling completely flat in absolute silence.","وقفة بتوقيت مثالي قبل نهاية النكتة ممكن تكون الفرق بين الجمهور ينفجر ضحك ونفس النكتة تطيح بالكامل بصمت مطلق.","\"Punchline\" = نهاية النكتة. \"Falling flat\" = تطيح/تفشل."],
["Irony of fate, also known as cosmic irony, occurs when the outcome of a situation is the exact opposite of what was intended or expected, as if the universe itself has a dark sense of humor.","سخرية القدر المعروفة كمان بالسخرية الكونية بتصير لما نتيجة موقف بتكون عكس اللي كان مقصود أو متوقع بالزبط، وكإنو الكون عنده حس فكاهة أسود.","\"Cosmic irony\" = السخرية الكونية. \"Dark humor\" = فكاهة سوداء."],
["Learning to laugh at the inevitable awkwardness and embarrassment that comes with speaking a second language imperfectly is one of the healthiest attitudes you can possibly adopt as a language learner.","تعلم الضحك على الإحراج والحرج الحتمي اللي بيجي مع حكي لغة تانية بشكل غير مثالي واحد من أصح المواقف اللي ممكن تتبنيها كمتعلمة لغة.","الضحك على أخطائك = سر التعلم السريع والممتع!"],
["The double meaning in the phrase I could not care less is frequently confused with I could care less, which ironically communicates the exact opposite of the intended meaning of total indifference.","المعنى المزدوج بعبارة \"ما ممكن يهمني أقل\" كتير بيتلخبط مع \"ممكن يهمني أقل\" اللي بالمفارقة بتوصل عكس المعنى المقصود بالكامل من اللامبالاة التامة.","\"Couldn't care less\" = ما بيهمني أبداً. \"Could care less\" = غلط شائع!"],
["Observational humor, the comedy that comes from pointing out the absurd contradictions and illogical conventions of everyday life, requires a sharp eye and the ability to articulate what everyone feels but nobody says.","الفكاهة الملاحظاتية، الكوميديا اللي بتيجي من الإشارة للتناقضات العبثية والعادات غير المنطقية بالحياة اليومية، بتتطلب عين حادة وقدرة تصيغي اللي الكل بيحسه بس ما حدا بيقوله.","\"Observational humor\" = فكاهة ملاحظاتية. أسلوب كتير كوميديين مشهورين."],
["Verbal wit, the ability to produce clever and humorous responses spontaneously in real-time conversation, is widely admired in English-speaking cultures and is considered a sign of both intelligence and social confidence.","الذكاء اللفظي، القدرة على إنتاج ردود ذكية ومضحكة بشكل عفوي بالمحادثة الفورية، مُعجب فيه بالثقافات الناطقة بالإنجليزية وبيعتبر علامة على الذكاء والثقة الاجتماعية.","\"Wit\" = ذكاء فكاهي. \"Spontaneously\" = بشكل عفوي."],
["Cultural humor that relies on shared historical references, local stereotypes, or language-specific wordplay is often the very last type of comedy that second-language speakers learn to fully appreciate and enjoy.","الفكاهة الثقافية اللي بتعتمد على مراجع تاريخية مشتركة وصور نمطية محلية أو تلاعب بالكلمات خاص باللغة غالباً آخر نوع كوميديا المتحدثين بلغة تانية بيتعلموا يقدروه ويستمتعوا فيه بالكامل.","فهم الفكاهة الثقافية = دليل على الطلاقة العميقة!"],
["The phrase it is what it is has become a philosophical shrug of acceptance in modern English, expressing a resigned acknowledgment that some things are simply beyond our power to change.","عبارة \"هو اللي هو\" صارت هز كتف فلسفي بالإنجليزية الحديثة، بتعبر عن اعتراف مستسلم إنو بعض الأشياء ببساطة أبعد من قدرتنا على تغييرها.","\"It is what it is\" = هو اللي هو. فلسفة يومية!"],
["Satirical writing, which uses humor, exaggeration, and ridicule to criticize social and political institutions, has a long and distinguished tradition in English literature dating back centuries.","الكتابة الساخرة اللي بتستعمل الفكاهة والمبالغة والسخرية لانتقاد المؤسسات الاجتماعية والسياسية عندها تقليد طويل ومتميز بالأدب الإنجليزي بيرجع لقرون.","\"Satire\" = السخرية الأدبية. \"Distinguished\" = متميز."],
["The comedic concept of bathos, an abrupt and intentional shift from the serious and sublime to the trivial and ridiculous, is a devastatingly effective technique for generating unexpected laughter.","المفهوم الكوميدي للانتقال المفاجئ، تحول مفاجئ ومقصود من الجدي والسامي للتافه والسخيف، تقنية فعالة بشكل مدمر لتوليد ضحك غير متوقع.","\"Bathos\" = انتقال مفاجئ من السامي للتافه. تقنية كوميدية قوية!"],
["Understanding humor in your second language is not just about entertainment; it is a profound cognitive achievement that demonstrates deep cultural literacy and genuine emotional connection to the language community.","فهم الفكاهة بلغتك التانية مش بس عن التسلية؛ هو إنجاز معرفي عميق بيظهر ثقافة عميقة ورابط عاطفي حقيقي بمجتمع اللغة.","إذا بتفهمي النكت بالإنجليزي = وصلتي لمستوى عالي جداً!"],
["The ability to laugh at yourself in a second language, to find humor in your own mistakes and mispronunciations, is both a sign of confidence and a remarkably effective way to connect with native speakers.","القدرة على الضحك على حالك بلغة تانية، إيجاد الفكاهة بأخطائك ونطقك الخاطئ، علامة ثقة وطريقة فعالة بشكل ملحوظ للتواصل مع الناطقين الأصليين.","الضحك على أخطائك = قوة وليس ضعف!"],
["Dark humor, which finds comedy in subjects that are typically considered taboo or uncomfortable, serves as a psychological coping mechanism that helps people process difficult emotions and experiences.","الفكاهة السوداء اللي بتلاقي الكوميديا بمواضيع عادة بتعتبر محظورة أو مزعجة بتعمل كآلية تأقلم نفسية بتساعد الناس يعالجوا مشاعر وتجارب صعبة.","\"Dark humor\" = فكاهة سوداء. \"Taboo\" = محظور."],
["The running gag, a comedic device where the same joke or situation recurs throughout a story with escalating absurdity, builds anticipation and compounds laughter with each successive appearance.","النكتة المتكررة، أداة كوميدية حيث نفس النكتة أو الموقف بيتكرر طول القصة بعبثية متصاعدة، بتبني الترقب وبتضاعف الضحك مع كل ظهور متتالي.","\"Running gag\" = نكتة متكررة. \"Escalating\" = متصاعد."],
["Gallows humor, finding something funny about an extremely dire or hopeless situation, has historically been used by people facing impossible circumstances as a way of asserting their humanity.","فكاهة المشنقة، إيجاد شي مضحك بموقف خطير أو يائس جداً، تاريخياً استعملها ناس بيواجهوا ظروف مستحيلة كطريقة لتأكيد إنسانيتهم.","\"Gallows humor\" = فكاهة المشنقة. الضحك بأحلك اللحظات."],
["The best comedians are actually philosophers in disguise; they use humor as a vehicle to deliver profound truths about human nature that audiences might otherwise resist hearing.","أفضل الكوميديين هم فعلاً فلاسفة متنكرين؛ بيستعملوا الفكاهة كوسيلة لإيصال حقائق عميقة عن الطبيعة البشرية اللي الجمهور ممكن يقاوم سماعها بغير طريقة.","الكوميديا = فلسفة بثوب الضحك."],
// Month 3: Negotiation & Persuasion (31)
["The most effective negotiators understand that the goal is not to defeat the other party but to find a mutually beneficial solution that leaves both sides feeling genuinely satisfied with the outcome.","أكتر المفاوضين فعالية بيفهموا إنو الهدف مش هزيمة الطرف التاني بل إيجاد حل مفيد للطرفين بيخلي كلا الجانبين حاسين بالرضا الحقيقي عن النتيجة.","\"Mutually beneficial\" = مفيد للطرفين. \"Win-win\" = ربح مشترك."],
["Before entering any negotiation, it is absolutely critical to clearly define your own priorities, understand your absolute bottom line, and anticipate the likely concerns and motivations of the other party.","قبل ما تدخلي أي مفاوضة، ضروري جداً تحددي أولوياتك بوضوح وتفهمي حدك الأدنى المطلق وتتوقعي المخاوف والدوافع المحتملة للطرف التاني.","\"Bottom line\" = الحد الأدنى. \"Anticipate\" = تتوقع."],
["The anchoring effect, where the first number mentioned in a negotiation disproportionately influences all subsequent discussion, is one of the most well-documented cognitive biases in behavioral economics.","تأثير المرساة حيث الرقم الأول المذكور بمفاوضة بيأثر بشكل غير متناسب على كل النقاش اللاحق واحد من أكتر التحيزات المعرفية الموثقة بالاقتصاد السلوكي.","\"Anchoring effect\" = تأثير المرساة. اللي بيحط الرقم الأول عنده ميزة."],
["Skilled persuaders know that people are far more likely to be convinced by stories and personal narratives than by abstract statistics and logical arguments alone, no matter how compelling the data may be.","المقنعين الماهرين بيعرفوا إنو الناس أكتر بكتير احتمال يقتنعوا بالقصص والروايات الشخصية من الإحصائيات المجردة والحجج المنطقية لحالها، مهما كانت البيانات مقنعة.","\"Narratives\" = روايات. قوة القصة بالإقناع."],
["The principle of reciprocity, the deeply ingrained human tendency to want to return favors and match the generosity of others, is one of the most powerful tools in the art of ethical persuasion.","مبدأ التبادل، النزعة البشرية المتجذرة بعمق لرغبة رد الجميل ومطابقة كرم الآخرين، واحد من أقوى الأدوات بفن الإقناع الأخلاقي.","\"Reciprocity\" = التبادل. \"Ingrained\" = متجذر."],
["Active listening during a negotiation is not merely a courtesy; it is a strategic advantage that allows you to identify hidden interests and uncover opportunities that might otherwise remain invisible.","الإصغاء الفعّال خلال المفاوضة مش مجرد لطافة؛ هو ميزة استراتيجية بتسمحلك تحددي مصالح مخفية وتكشفي فرص ممكن تضل غير مرئية.","\"Strategic advantage\" = ميزة استراتيجية. \"Hidden interests\" = مصالح مخفية."],
["The technique of reframing, presenting the same information from a different angle or perspective, can completely transform how the other party perceives and evaluates a proposed agreement.","تقنية إعادة التأطير، عرض نفس المعلومات من زاوية أو منظور مختلف، ممكن تغير بالكامل كيف الطرف التاني بيدرك ويقيّم اتفاق مقترح.","\"Reframing\" = إعادة التأطير. أداة إقناعية قوية جداً."],
["Emotional intelligence plays a crucial role in negotiation because the ability to read and respond appropriately to the other person's emotional state often determines the outcome more than any logical argument.","الذكاء العاطفي بيلعب دور حاسم بالمفاوضة لأنو القدرة على قراءة حالة الشخص التاني العاطفية والرد عليها بشكل مناسب غالباً بتحدد النتيجة أكتر من أي حجة منطقية.","الذكاء العاطفي مفتاح المفاوضة الناجحة."],
["The BATNA concept, which stands for Best Alternative To a Negotiated Agreement, represents the strongest source of power you can bring to any negotiation because it defines what you will do if no deal is reached.","مفهوم BATNA اللي بيمثل أفضل بديل لاتفاق تفاوضي بيمثل أقوى مصدر قوة ممكن تجيبيه لأي مفاوضة لأنو بيحدد شو رح تعملي إذا ما تم التوصل لاتفاق.","\"BATNA\" = أفضل بديل. معرفة بديلك = قوتك."],
["Effective persuasion requires understanding that different people are motivated by fundamentally different values, and what appeals to one audience may completely fail to resonate with another.","الإقناع الفعّال بيتطلب فهم إنو ناس مختلفين بيتحفزوا بقيم مختلفة جذرياً، واللي بيجذب جمهور ممكن يفشل تماماً بالتأثير على جمهور تاني.","\"Resonate\" = يتردد/يأثر. \"Appeals to\" = يجذب."],
["The power of silence in a negotiation should never be underestimated; a well-timed pause after making your case creates psychological pressure that often leads the other party to make concessions.","قوة الصمت بالمفاوضة لازم ما يتم الاستخفاف فيها أبداً؛ وقفة بتوقيتها المناسب بعد تقديم حجتك بتخلق ضغط نفسي غالباً بيدفع الطرف التاني يقدم تنازلات.","\"Concessions\" = تنازلات. الصمت = أداة تفاوضية قوية."],
["Building genuine rapport with the other party before diving into the substance of a negotiation creates a foundation of trust that makes compromise and creative problem-solving significantly more likely.","بناء علاقة ود حقيقية مع الطرف التاني قبل ما تغوصي بجوهر المفاوضة بيخلق أساس ثقة بيخلي التسوية وحل المشاكل الإبداعي أكتر احتمالاً بشكل كبير.","\"Rapport\" = علاقة ود. \"Diving into\" = تغوص بـ."],
["The scarcity principle, which states that people place higher value on things they perceive as rare or limited, is frequently leveraged in both marketing and interpersonal persuasion.","مبدأ الندرة اللي بيقول إنو الناس بيعطوا قيمة أعلى للأشياء اللي بيشوفوها نادرة أو محدودة، كتير بيتم استغلاله بالتسويق والإقناع بين الأشخاص.","\"Scarcity principle\" = مبدأ الندرة. \"Leveraged\" = يتم استغلاله."],
["When negotiating salary or compensation, it is strategically advantageous to let the employer make the first offer, as this gives you valuable information about their budget and expectations.","لما تفاوضي على الراتب أو التعويض، استراتيجياً مفيد تخلي صاحب العمل يعمل أول عرض، لأنو هاد بيعطيكي معلومات قيّمة عن ميزانيتهم وتوقعاتهم.","نصيحة عملية مهمة لمفاوضة الراتب!"],
["The most persuasive arguments are those that acknowledge and directly address the strongest objections to your position, rather than ignoring or dismissing them and hoping they will go unnoticed.","أكتر الحجج إقناعاً هي اللي بتعترف وبتعالج مباشرة أقوى الاعتراضات على موقفك، بدل ما تتجاهلها أو تستخف فيها وتتمنى ما حدا ينتبه.","\"Acknowledge objections\" = اعترف بالاعتراضات. قوة بمش ضعف!"],
["Framing a request as a question rather than a demand fundamentally changes the power dynamic of an interaction and makes the other person far more inclined to cooperate willingly.","صياغة الطلب كسؤال بدل أمر بيغير بشكل جذري ديناميكية القوة بالتفاعل وبيخلي الشخص التاني أكتر ميلاً يتعاون بإرادته.","الفرق بين \"سوي هاد\" و\"ممكن تسوي هاد؟\" هائل!"],
["Understanding cognitive biases, the systematic errors in human thinking that affect our judgment and decision-making, gives you an enormous advantage in any persuasive situation.","فهم التحيزات المعرفية، الأخطاء المنهجية بالتفكير البشري اللي بتأثر على حكمنا واتخاذنا للقرارات، بيعطيكي ميزة هائلة بأي موقف إقناعي.","\"Cognitive biases\" = تحيزات معرفية. معرفتها = قوة."],
["The most dangerous negotiation mistake is entering a discussion without a clear understanding of what you truly want, what you are willing to concede, and at what point you are prepared to walk away.","أخطر غلطة تفاوضية هي الدخول بنقاش بدون فهم واضح لشو فعلاً بدك، شو مستعدة تتنازلي عنه، وبأي نقطة مستعدة تمشي.","\"Walk away\" = تمشي/ترفض. معرفة حدودك أساسية."],
["The ability to disagree without being disagreeable, to challenge ideas firmly while maintaining warmth and genuine respect for the other person, is the hallmark of a truly masterful communicator.","القدرة على الاختلاف بدون ما تكوني مزعجة، تتحدي الأفكار بحزم مع الحفاظ على الدفء والاحترام الحقيقي للشخص التاني، علامة المتواصل المتمكن فعلاً.","\"Hallmark\" = علامة مميزة. ذروة مهارات التواصل."],
["Ethical persuasion empowers people to make better-informed decisions that align with their own genuine interests, whereas manipulation exploits psychological vulnerabilities to serve only the manipulator's selfish agenda.","الإقناع الأخلاقي بيمكّن الناس ياخدوا قرارات أكتر استنارة بتتوافق مع مصالحهم الحقيقية، بينما التلاعب بيستغل نقاط الضعف النفسية لخدمة أجندة المتلاعب الأنانية فقط.","\"Ethical persuasion\" مقابل \"manipulation\". فرق أخلاقي جوهري."],
["In cross-cultural negotiations, awareness of different communication styles, attitudes toward hierarchy, and concepts of time and relationship-building can mean the difference between success and total failure.","بالمفاوضات بين الثقافات، الوعي بأساليب تواصل مختلفة ومواقف تجاه التسلسل الهرمي ومفاهيم الوقت وبناء العلاقات ممكن يعني الفرق بين النجاح والفشل الكامل.","الوعي الثقافي = مفتاح المفاوضات الدولية."],
["The principle of social proof, our tendency to look at what others are doing to determine the correct course of action, is one of the most powerful and universally applicable tools of influence.","مبدأ الإثبات الاجتماعي، ميلنا للنظر لشو عم يعمل غيرنا لنحدد التصرف الصحيح، واحد من أقوى أدوات التأثير وأكترها قابلية للتطبيق عالمياً.","\"Social proof\" = الإثبات الاجتماعي. ليش المراجعات مهمة!"],
["A truly persuasive leader does not simply tell people what to do; they paint a vivid and compelling vision of the future that inspires others to willingly follow because they genuinely believe in the destination.","القائد المقنع فعلاً مش بس بيقول للناس شو يعملوا؛ بيرسم رؤية حية ومقنعة للمستقبل بتلهم الآخرين يتبعوا بإرادتهم لأنهم فعلاً بيؤمنوا بالوجهة.","\"Paint a vision\" = يرسم رؤية. \"Compelling\" = مقنعة/جاذبة."],
["The door-in-the-face technique, where you make an intentionally large initial request followed by a smaller more reasonable one, exploits the contrast effect to make your actual request seem far more acceptable.","تقنية الباب بالوجه حيث بتعملي طلب أولي كبير عمداً متبوع بطلب أصغر وأكتر معقولية بتستغل تأثير التباين لتخلي طلبك الفعلي يبان أكتر قبولاً بكتير.","\"Door-in-the-face\" = تقنية تفاوضية. عكسها foot-in-the-door."],
["Creating a sense of urgency through legitimate time constraints can accelerate decision-making, but manufacturing false urgency is manipulative and ultimately destroys trust and credibility.","خلق إحساس بالإلحاح من خلال قيود زمنية مشروعة ممكن يسرّع اتخاذ القرار، بس تصنيع إلحاح مزيف تلاعب وبالنهاية بيدمر الثقة والمصداقية.","\"Urgency\" = إلحاح. فرق بين الحقيقي والمصطنع."],
["The concept of expanding the pie in negotiations means finding creative ways to increase the total value available to both parties rather than fighting over a fixed amount of resources.","مفهوم توسيع الكعكة بالمفاوضات بيعني إيجاد طرق إبداعية لزيادة القيمة الإجمالية المتاحة لكلا الطرفين بدل التنافس على كمية ثابتة من الموارد.","\"Expanding the pie\" = توسيع الكعكة. فكر إبداعي بالتفاوض."],
["Mirroring, the subtle practice of reflecting back the other person's body language and speech patterns, builds unconscious rapport and creates a sense of connection that facilitates more productive negotiations.","المرآة، الممارسة الدقيقة لعكس لغة جسد الشخص التاني وأنماط كلامه، بتبني علاقة ود لا واعية وبتخلق إحساس بالتواصل بيسهل مفاوضات أكتر إنتاجية.","\"Mirroring\" = المرآة/الانعكاس. تقنية تفاوض لا واعية."],
["The most successful negotiators prepare extensively before every interaction, researching the other party's interests, constraints, and alternatives so thoroughly that they can anticipate objections before they arise.","أنجح المفاوضين بيحضروا بشكل مكثف قبل كل تفاعل، بيبحثوا بمصالح الطرف التاني وقيوده وبدائله بشكل شامل لدرجة إنهم بيقدروا يتوقعوا الاعتراضات قبل ما تطلع.","\"Prepare extensively\" = حضّر بشكل مكثف. التحضير = ٩٠٪ من النجاح."],
["Knowing how to gracefully make concessions, offering them strategically rather than all at once, signals good faith while maintaining your negotiating position and preserving the perceived value of what you give.","معرفة كيف تقدمي تنازلات بأناقة، تعرضيها بشكل استراتيجي بدل كلها مرة وحدة، بتشير لحسن النية مع الحفاظ على موقفك التفاوضي والقيمة المدركة لللي بتعطيه.","\"Concessions\" = تنازلات. قدميها ببطء واستراتيجياً."],
["The ability to identify and name the emotional undercurrent in a negotiation, saying something like it seems like you are frustrated about the timeline, can defuse tension and open pathways to creative solutions.","القدرة على تحديد وتسمية التيار العاطفي الخفي بمفاوضة، قول شي مثل يبدو إنك محبطة من الجدول الزمني، ممكن يخفف التوتر ويفتح مسارات لحلول إبداعية.","\"Emotional undercurrent\" = التيار العاطفي الخفي. تسميته = تخفيفه."],
["Never negotiate against yourself by lowering your own offer before the other party has even responded; patience and comfortable silence are among the most powerful tools in any negotiator's arsenal.","ما تفاوضي ضد حالك بتخفيض عرضك قبل ما الطرف التاني حتى يرد؛ الصبر والصمت المريح من أقوى الأدوات بترسانة أي مفاوض.","\"Never negotiate against yourself\" = قاعدة ذهبية. الصبر = قوة."],
// Month 4: Literature & Poetry (30)
["Great literature possesses the extraordinary power to transport readers across time, geography, and cultural boundaries, allowing them to inhabit lives and perspectives radically different from their own.","الأدب العظيم عنده قوة استثنائية ينقل القراء عبر الزمن والجغرافيا والحدود الثقافية، بيسمحلهم يعيشوا حياة ومنظورات مختلفة جذرياً عن حياتهم.","\"Inhabit\" = يعيش بـ. \"Radically different\" = مختلف جذرياً. قوة الأدب."],
["The metaphor, which describes one thing in terms of another to reveal hidden similarities and create vivid imagery, is perhaps the most fundamental and powerful tool in all of literary expression.","الاستعارة اللي بتوصف شي بمصطلحات شي تاني لتكشف تشابهات مخفية وتخلق صور حية يمكن أكتر أداة أساسية وقوية بكل التعبير الأدبي.","\"Metaphor\" = استعارة. أساس اللغة الأدبية."],
["Poetry distills human experience into its most concentrated and essential form, using rhythm, imagery, and carefully chosen language to evoke emotions that ordinary prose simply cannot reach.","الشعر بيقطّر التجربة الإنسانية لأكتر أشكالها تركيزاً وجوهرية، باستعمال الإيقاع والصور واللغة المختارة بعناية ليستثير مشاعر ما النثر العادي ببساطة ما بيقدر يوصلها.","\"Distills\" = يقطّر. \"Evoke\" = يستثير. الشعر = جوهر اللغة."],
["The unreliable narrator, a storytelling technique where the person telling the story cannot be fully trusted, forces readers to become active participants in constructing the meaning of the text.","الراوي غير الموثوق، تقنية سردية حيث الشخص اللي عم يحكي القصة ما بيقدر يُوثق فيه بالكامل، بيجبر القراء يصيروا مشاركين فعالين ببناء معنى النص.","\"Unreliable narrator\" = الراوي غير الموثوق. تقنية أدبية مهمة."],
["Shakespeare's enduring relevance, more than four centuries after his death, demonstrates the timeless universality of the human emotions and moral dilemmas he explored in his extraordinary body of work.","أهمية شكسبير المستمرة بعد أكتر من أربع قرون من وفاته بتثبت العالمية الخالدة للمشاعر الإنسانية والمعضلات الأخلاقية اللي استكشفها بأعماله الاستثنائية.","\"Enduring relevance\" = أهمية مستمرة. \"Timeless\" = خالد."],
["The concept of foreshadowing, where an author plants subtle hints early in a narrative about events that will occur later, creates a satisfying sense of inevitability when those events finally unfold.","مفهوم التمهيد حيث الكاتب بيزرع تلميحات دقيقة بداية السرد عن أحداث رح تصير لاحقاً بيخلق إحساس مُرضي بالحتمية لما هالأحداث أخيراً بتتكشف.","\"Foreshadowing\" = التمهيد. \"Inevitability\" = الحتمية."],
["Stream of consciousness writing, which attempts to capture the unfiltered flow of a character's thoughts and sensory impressions, revolutionized the novel in the early twentieth century.","كتابة تيار الوعي اللي بتحاول تلتقط التدفق غير المفلتر لأفكار الشخصية وانطباعاتها الحسية غيرت الرواية بشكل ثوري ببداية القرن العشرين.","\"Stream of consciousness\" = تيار الوعي. أسلوب جويس ووولف."],
["The power of a well-chosen simile lies in its ability to make the unfamiliar suddenly and startlingly accessible by comparing it to something the reader already intimately knows and understands.","قوة التشبيه المختار بعناية بقدرته يخلي غير المألوف فجأة وبشكل مذهل متاح بمقارنته بشي القارئ خلص بيعرفه وبيفهمه بعمق.","\"Simile\" = تشبيه (uses like/as). مختلف عن metaphor."],
["Magical realism, a literary genre that seamlessly weaves supernatural elements into otherwise realistic narratives, originated in Latin American literature and has since influenced writers worldwide.","الواقعية السحرية، نوع أدبي بيدمج بسلاسة عناصر خارقة بسرديات واقعية، نشأت بالأدب اللاتيني الأمريكي ومن وقتها أثرت على كتّاب حول العالم.","\"Magical realism\" = الواقعية السحرية. \"Seamlessly weaves\" = يدمج بسلاسة."],
["The tragic hero, a character whose exceptional qualities are ultimately undermined by a fatal flaw, has captivated audiences and readers from ancient Greek drama to contemporary cinema.","البطل المأساوي، شخصية صفاتها الاستثنائية بالنهاية بتتقوض بعيب قاتل، أسرت الجماهير والقراء من الدراما اليونانية القديمة للسينما المعاصرة.","\"Tragic hero\" = البطل المأساوي. \"Fatal flaw\" = العيب القاتل."],
["Arabic literature, with its rich tradition of poetry, storytelling, and philosophical discourse, represents one of the most magnificent and historically influential literary traditions in all of human civilization.","الأدب العربي بتقاليده الغنية بالشعر والسرد القصصي والخطاب الفلسفي بيمثل واحد من أعظم التقاليد الأدبية تأثيراً تاريخياً بكل الحضارة الإنسانية.","\"Magnificent\" = عظيم. الأدب العربي = كنز عالمي."],
["The concept of the literary canon, the collection of works considered essential and representative of a culture's highest artistic achievements, is increasingly being challenged and expanded to include more diverse voices.","مفهوم الكانون الأدبي، مجموعة الأعمال المعتبرة أساسية وممثلة لأعلى إنجازات ثقافة فنية، عم يتم تحديها وتوسيعها بشكل متزايد لتشمل أصوات أكتر تنوعاً.","\"Literary canon\" = الكانون الأدبي. \"Diverse voices\" = أصوات متنوعة."],
["Symbolism in literature, where concrete objects and images stand for abstract ideas and deeper meanings, adds layers of interpretive richness that reward careful and repeated reading.","الرمزية بالأدب حيث الأشياء الملموسة والصور بتمثل أفكار مجردة ومعاني أعمق بتضيف طبقات من الغنى التفسيري اللي بيكافئ القراءة المتأنية والمتكررة.","\"Symbolism\" = الرمزية. \"Interpretive richness\" = غنى تفسيري."],
["Memoir writing, the art of crafting meaningful narrative from personal memory and lived experience, has become one of the most popular and critically acclaimed literary genres of the twenty-first century.","كتابة المذكرات، فن صياغة سرد ذو معنى من الذاكرة الشخصية والتجربة المعاشة، صارت واحدة من أكتر الأنواع الأدبية شعبية وإشادة نقدية بالقرن الحادي والعشرين.","\"Memoir\" = مذكرات. \"Critically acclaimed\" = مشاد بها نقدياً."],
["The beauty of a perfectly constructed sentence, where every word contributes to the overall rhythm, meaning, and emotional effect, is one of the greatest pleasures available to lovers of language.","جمال جملة مبنية بشكل مثالي حيث كل كلمة بتساهم بالإيقاع العام والمعنى والتأثير العاطفي واحدة من أعظم المتع المتاحة لعشاق اللغة.","أنتِ صرتِ من عشاق اللغة! إتقان الجملة = فن."],
["Translation between languages is never a simple mechanical process of substituting equivalent words; it is a creative act that requires deep understanding of both cultures and the willingness to make difficult artistic choices.","الترجمة بين اللغات أبداً مش عملية ميكانيكية بسيطة لاستبدال كلمات متكافئة؛ هي فعل إبداعي بيتطلب فهم عميق للثقافتين والاستعداد لاتخاذ خيارات فنية صعبة.","\"Translation\" = الترجمة = فن وليس علم فقط!"],
["The personal essay, a literary form that combines autobiographical reflection with broader cultural observation, allows writers to use their individual experience as a lens through which to examine universal themes.","المقالة الشخصية، شكل أدبي بيجمع التأمل السيرذاتي مع الملاحظة الثقافية الأوسع، بتسمح للكتّاب يستعملوا تجربتهم الفردية كعدسة ليفحصوا مواضيع عالمية.","\"Personal essay\" = المقالة الشخصية. شكل أدبي قوي."],
["Reading widely across genres and traditions cultivates the kind of flexible, creative, and empathetic thinking that benefits every aspect of your intellectual and emotional life.","القراءة الواسعة عبر الأنواع والتقاليد بتنمي النوع المرن والإبداعي والمتعاطف من التفكير اللي بيفيد كل جانب من حياتك الفكرية والعاطفية.","\"Cultivates\" = تنمي. القراءة = نمو شامل."],
["The concept of the anti-hero, a protagonist who lacks the conventional qualities of a traditional hero yet commands the reader's sympathy and engagement, has become one of the defining character types of modern fiction.","مفهوم البطل المضاد، بطل بيفتقر للصفات التقليدية لبطل عادي ومع هيك بيستحوذ على تعاطف وتفاعل القارئ، صار واحد من أنواع الشخصيات المميزة للخيال الحديث.","\"Anti-hero\" = البطل المضاد. شخصية معقدة ومثيرة."],
["Alliteration, the repetition of initial consonant sounds in successive words, creates a musical quality in prose and poetry that enhances both memorability and aesthetic pleasure.","الجناس الصوتي، تكرار الأصوات الساكنة الأولى بكلمات متتالية، بيخلق جودة موسيقية بالنثر والشعر بتعزز التذكر والمتعة الجمالية.","\"Alliteration\" = الجناس الصوتي. أداة شعرية."],
["The Gothic literary tradition, with its emphasis on darkness, mystery, and the supernatural, continues to influence contemporary horror fiction and psychological thriller novels.","التقليد الأدبي القوطي بتركيزه على الظلام والغموض والخارق للطبيعة لسا بيأثر على خيال الرعب المعاصر وروايات الإثارة النفسية.","\"Gothic\" = القوطي. \"Supernatural\" = الخارق."],
["Dramatic irony, where the audience knows something crucial that the characters do not, creates a powerful sense of suspense and emotional engagement that keeps readers turning pages.","السخرية الدرامية حيث الجمهور بيعرف شي مهم ما الشخصيات ما بتعرفه بتخلق إحساس قوي بالتشويق والتفاعل العاطفي بيخلي القراء يكملوا القراءة.","\"Dramatic irony\" = السخرية الدرامية. أداة سردية قوية."],
["The bildungsroman, a novel that traces the moral and psychological development of its protagonist from youth to maturity, remains one of the most beloved and enduring narrative forms.","رواية التكوين اللي بتتبع التطور الأخلاقي والنفسي لبطلها من الشباب للنضج لسا واحدة من أكتر الأشكال السردية المحبوبة والدائمة.","\"Bildungsroman\" = رواية التكوين. مثل جين إير وهاري بوتر."],
["Intertextuality, the way literary works reference, allude to, and build upon earlier texts, creates rich layers of meaning that reward readers who are widely read.","التناص، الطريقة اللي الأعمال الأدبية بتشير فيها وتلمح وتبني على نصوص سابقة، بتخلق طبقات غنية من المعنى بتكافئ القراء الواسعين القراءة.","\"Intertextuality\" = التناص. كل نص بيحاور نصوص سابقة."],
["The power of a well-chosen epigraph, a quotation placed at the beginning of a literary work, lies in its ability to establish tone, foreshadow themes, and create expectations in the reader's mind.","قوة الاستشهاد المختار بعناية المحطوط ببداية عمل أدبي بقدرته يأسس النبرة ويمهد للمواضيع ويخلق توقعات بذهن القارئ.","\"Epigraph\" = استشهاد تمهيدي. بداية ذكية."],
["Postmodern literature deliberately breaks the fourth wall, calling attention to its own fictional nature and questioning the very conventions of storytelling that readers have come to take for granted.","الأدب ما بعد الحداثي بيكسر الجدار الرابع عمداً، بيلفت الانتباه لطبيعته الخيالية وبيتساءل عن أعراف السرد القصصي اللي القراء صاروا ياخدوها كمسلمات.","\"Fourth wall\" = الجدار الرابع. \"Postmodern\" = ما بعد حداثي."],
["The art of the plot twist, a sudden and unexpected revelation that recontextualizes everything the reader thought they knew, requires meticulous planning and extraordinary narrative discipline.","فن التحول بالحبكة، كشف مفاجئ وغير متوقع بيعيد وضع كل اللي القارئ فكر إنه بيعرفه بسياق جديد، بيتطلب تخطيط دقيق وانضباط سردي استثنائي.","\"Plot twist\" = تحول بالحبكة. أداة سردية مذهلة."],
["Free verse poetry, which abandons traditional meter and rhyme schemes in favor of natural speech rhythms, democratized poetic expression by making it accessible to a far wider range of voices.","الشعر الحر اللي بيتخلى عن الأوزان التقليدية وأنماط القافية لصالح إيقاعات الكلام الطبيعي دمقرط التعبير الشعري بجعله متاحاً لمجموعة أوسع بكتير من الأصوات.","\"Free verse\" = الشعر الحر. حرية التعبير الشعري."],
["The literary technique of juxtaposition, placing two contrasting ideas or images side by side, creates meaning through the tension and resonance that emerges from their unexpected proximity.","التقنية الأدبية للمقابلة، وضع فكرتين أو صورتين متناقضتين جنب بعض، بتخلق معنى من خلال التوتر والتردد اللي بيطلع من قربهم غير المتوقع.","\"Juxtaposition\" = المقابلة. التناقض بيخلق معنى."],
["The technique of the cliffhanger, ending a chapter or episode at a moment of peak suspense, is one of the oldest and most effective strategies for maintaining audience engagement across serialized narratives.","تقنية التعليق على الحافة، إنهاء فصل أو حلقة بلحظة ذروة التشويق، واحدة من أقدم وأكتر الاستراتيجيات فعالية للحفاظ على تفاعل الجمهور عبر السرديات المتسلسلة.","\"Cliffhanger\" = نهاية مشوقة. بتخليك تبدي تكملي!"],
// Month 5: Slang & Colloquial English (31)
["No cap, learning slang and colloquial expressions is lowkey one of the most challenging aspects of truly mastering English because these terms constantly evolve and change meaning across different communities.","بدون مبالغة، تعلم العامية والتعابير العامية هو بهدوء واحد من أصعب جوانب إتقان الإنجليزي فعلاً لأنو هالمصطلحات دايماً بتتطور وبتغير معناها عبر مجتمعات مختلفة.","\"No cap\" = بدون مبالغة. \"Lowkey\" = بهدوء/سراً. عامية حديثة."],
["When someone says they are going to ghost you, it means they plan to suddenly stop all communication without any explanation, which has unfortunately become an increasingly common behavior in modern dating culture.","لما حدا بيقول رح يعمللك ghosting، يعني بيخطط يوقف فجأة كل التواصل بدون أي تفسير، واللي للأسف صار سلوك شائع بشكل متزايد بثقافة المواعدة الحديثة.","\"Ghost\" = يختفي فجأة. تعبير حديث مهم."],
["The expression that hits different is used when something, such as a song, a memory, or a moment, resonates with you on an unusually deep and personal emotional level.","التعبير \"بيأثر بطريقة مختلفة\" بيستعمل لما شي مثل أغنية أو ذكرى أو لحظة بيتردد معك على مستوى عاطفي عميق وشخصي بشكل غير عادي.","\"Hits different\" = بيأثر بطريقة مختلفة. عامية عاطفية."],
["If an American teenager tells you something is sus, they are using a shortened form of suspicious, meaning they think something about the situation seems dishonest, questionable, or not quite right.","إذا مراهق أمريكي قلك إنو شي sus، عم يستعمل شكل مختصر من مشبوه، يعني بيفتكر إنو شي بالموقف بيبان مش صادق أو مشكوك فيه أو مش تمام.","\"Sus\" = مختصر suspicious. انتشرت من لعبة Among Us."],
["The slang term salty, which means being visibly annoyed, bitter, or upset about something, often something relatively minor, perfectly captures that particular flavor of petty irritation we all occasionally experience.","مصطلح العامية salty اللي بيعني إنك منزعج أو مرّ أو متضايق بشكل واضح من شي، غالباً شي بسيط نسبياً، بيلقط بدقة هداك النوع من الانزعاج البسيط اللي كلنا بنعيشه أحياناً.","\"Salty\" = منزعج/مرّ. \"Petty\" = تافه."],
["When someone describes another person as extra, they mean that the person is dramatically over the top, excessively attention-seeking, or far more theatrical in their behavior than the situation reasonably warrants.","لما حدا بيوصف شخص تاني بـ extra، بيقصد إنو الشخص مبالغ بشكل درامي، بيطلب انتباه بشكل مفرط، أو أكتر مسرحية بتصرفه مما الموقف بيستدعي.","\"Extra\" = مبالغ. تعبير عامي شائع جداً."],
["The phrase I am dead or I am literally dying is a dramatic hyperbolic expression that means something is so unbelievably funny that you feel you might actually expire from laughing so hard.","عبارة \"أنا ميتة\" أو \"عم بموت حرفياً\" تعبير مبالغ درامي بيعني إنو شي مضحك بشكل لا يصدق لدرجة بتحسي إنك ممكن تموتي فعلاً من الضحك.","مبالغة كوميدية شائعة جداً عند الشباب!"],
["Saying my bad is a casual and widely accepted way of taking responsibility for a minor mistake, and it carries a lighter, less formal tone than saying I apologize or I am sorry.","قول my bad طريقة عفوية ومقبولة على نطاق واسع لتحمل المسؤولية عن غلطة بسيطة، وبتحمل نبرة أخف وأقل رسمية من قول أعتذر أو آسف.","\"My bad\" = غلطتي. عفوية وخفيفة."],
["The versatile expression no worries has largely replaced you are welcome in casual American English, conveying a warm and relaxed message that the favor or help was genuinely no trouble at all.","التعبير المتعدد الاستعمالات no worries استبدل لحد كبير you are welcome بالإنجليزية الأمريكية العفوية، بيوصل رسالة دافئة ومريحة إنو الخدمة أو المساعدة فعلاً ما كانت إزعاج أبداً.","\"No worries\" = ولا يهمك. بديل عفوي لـ you're welcome."],
["To vibe with someone means to feel a natural and effortless connection with them, a sense of mutual understanding and compatibility that does not require excessive effort to maintain.","إنك تنسجمي مع حدا يعني تحسي بتواصل طبيعي وبدون جهد معهم، إحساس بتفاهم متبادل وتوافق ما بيتطلب جهد مفرط للحفاظ عليه.","\"Vibe with\" = تنسجم مع. \"Good vibes\" = أجواء حلوة."],
["When someone says they are going to flex on social media, it means they intend to show off their accomplishments, possessions, or lifestyle in a way that is designed to impress and provoke admiration or envy.","لما حدا بيقول رح يعمل flex على السوشال ميديا، يعني بينوي يتباهى بإنجازاته أو ممتلكاته أو أسلوب حياته بطريقة مصممة تبهر وتثير الإعجاب أو الحسد.","\"Flex\" = يتباهى. \"Show off\" = بديل أقدم."],
["The expression that is a vibe describes a moment, place, song, or atmosphere that creates a particular mood or feeling that resonates deeply and feels exactly right for the moment.","تعبير \"هاد vibe\" بيوصف لحظة أو مكان أو أغنية أو جو بيخلق مزاج أو إحساس معين بيتردد بعمق وبيحسسك إنو مناسب بالزبط للحظة.","\"That's a vibe\" = هاد الجو/الإحساس مناسب تماماً."],
["Telling someone to take it easy or chill out is an informal way of suggesting they should relax, calm down, and not overreact to whatever situation is currently causing them stress or agitation.","إنك تقولي لحدا take it easy أو chill out طريقة غير رسمية لاقتراح إنه لازم يرتاح ويهدا وما يبالغ بردة فعله على أي موقف حالياً عم يسببله ضغط أو هيجان.","\"Chill out\" = اهدأ. \"Take it easy\" = خذها بروقان."],
["The phrase keeping it real means being authentic, honest, and true to yourself without pretending to be someone you are not, even when social pressure might tempt you to do otherwise.","عبارة keeping it real بتعني إنك أصيلة وصادقة ووفية لحالك بدون ما تتظاهري إنك حدا مش إنتِ، حتى لما الضغط الاجتماعي ممكن يغريكي تعملي غير هيك.","\"Keeping it real\" = كوني حالك. أصالة."],
["When an American says something is a game changer, they mean it is an innovation, idea, or development so significant that it fundamentally alters the way people think about or approach a particular situation.","لما أمريكي بيقول إنو شي game changer، بيقصد إنو ابتكار أو فكرة أو تطور مهم لدرجة إنو بيغير بشكل جذري طريقة تفكير أو تعامل الناس مع موقف معين.","\"Game changer\" = شي بيغير اللعبة. تعبير شائع جداً."],
["Slang evolves at a breathtaking pace, and expressions that were considered trendy and current just two or three years ago may already sound dated and out of touch to younger speakers today.","العامية بتتطور بسرعة مذهلة، وتعابير كانت تعتبر عصرية وحالية قبل بس سنتين أو تلاتة ممكن تبان خلص قديمة ومش متصلة للمتحدثين الأصغر اليوم.","\"Dated\" = قديم. \"Out of touch\" = مش متصل بالواقع. اللغة حية!"],
["The expression to throw shade at someone means to subtly disrespect or criticize them, often through indirect comments or dismissive body language rather than direct confrontation.","تعبير throw shade على حدا بيعني تستخف أو تنتقد بدقة، غالباً من خلال تعليقات غير مباشرة أو لغة جسد استخفافية بدل المواجهة المباشرة.","\"Throw shade\" = يستخف بدقة. انتقاد غير مباشر."],
["When someone says they are going through it, they mean they are experiencing a particularly difficult or emotionally challenging period in their life and need understanding and support.","لما حدا بيقول عم يمر فيها، بيقصد إنه عم يعيش فترة صعبة أو متطلبة عاطفياً بحياته وبيحتاج تفهم ودعم.","\"Going through it\" = عم يمر بفترة صعبة."],
["The term gaslighting refers to a form of psychological manipulation where someone makes you doubt your own perception of reality, your memories, or your sanity through persistent denial and distortion.","مصطلح gaslighting بيشير لشكل من التلاعب النفسي حيث حدا بيخليكي تشكي بإدراكك للواقع أو ذكرياتك أو عقلك من خلال الإنكار والتحريف المستمر.","\"Gaslighting\" = تلاعب نفسي خطير. مهم تعرفيه."],
["Saying I am not going to lie or not gonna lie before a statement is a conversational filler that signals the speaker is about to share a candid or potentially unpopular honest opinion.","قول \"مش رح أكذب\" أو \"بصراحة\" قبل تصريح حشوة محادثة بتشير إنو المتحدث رح يشارك رأي صريح أو ممكن يكون غير شعبي بصدق.","\"Not gonna lie\" = بصراحة. بداية تصريح صريح."],
["The slang term clap back refers to a quick, sharp, and effective response to criticism or an insult, often one that completely silences the original attacker through wit and precision.","مصطلح العامية clap back بيشير لرد سريع وحاد وفعال على نقد أو إهانة، غالباً واحد بيسكت المهاجم الأصلي بالكامل من خلال الذكاء والدقة.","\"Clap back\" = رد حاد وذكي."],
["When Americans say something is a red flag, they mean it is a warning sign that indicates a potential problem in a relationship, a job, or any situation that warrants serious caution.","لما الأمريكان بيقولوا شي red flag، بيقصدوا إنو علامة تحذير بتشير لمشكلة محتملة بعلاقة أو شغل أو أي موقف بيستدعي حذر جدي.","\"Red flag\" = علامة تحذير. مصطلح شائع جداً."],
["The expression built different is used as a compliment to describe someone who possesses exceptional qualities, abilities, or resilience that set them apart from ordinary people.","تعبير built different بيستعمل كمجاملة لوصف حدا عنده صفات أو قدرات أو صمود استثنائي بيميزه عن الناس العاديين.","\"Built different\" = مصنوع مختلف. مجاملة قوية."],
["The phrase to be on the same page means to share a common understanding or agreement about a situation, ensuring that everyone involved has the same information and expectations.","عبارة on the same page بتعني مشاركة فهم أو اتفاق مشترك عن موقف، بتضمن إنو كل المشاركين عندهم نفس المعلومات والتوقعات.","\"On the same page\" = على نفس الصفحة. تفاهم مشترك."],
["Using the word lowkey before a statement softens it and adds a sense of understatement or secrecy, while highkey means the exact opposite: openly, obviously, and without any attempt at subtlety.","استعمال كلمة lowkey قبل تصريح بيخففه وبيضيف إحساس بالتخفيف أو السرية، بينما highkey بتعني العكس بالزبط: بوضوح وبشكل واضح وبدون أي محاولة للدقة.","\"Lowkey\" مقابل \"highkey\". أساسيات العامية الحديثة."],
["The expression no shade is used as a preface to soften a potentially critical or harsh comment, signaling that the speaker does not intend to be disrespectful or mean-spirited.","تعبير no shade بيستعمل كمقدمة لتخفيف تعليق ممكن يكون نقدي أو قاسي، بيشير إنو المتحدث ما بينوي يكون مستخف أو خبيث.","\"No shade\" = بدون استخفاف. مقدمة لتعليق صريح."],
["The versatile term lit can mean exciting, excellent, or amazing when describing a party, event, or experience, though its popularity has waned somewhat among younger generations.","المصطلح المتعدد lit ممكن يعني مثير أو ممتاز أو مذهل لما بيوصف حفلة أو حدث أو تجربة، مع إنو شعبيته تراجعت شوي بين الأجيال الأصغر.","\"Lit\" = حلو/مثير. شعبيته عم تتغير مع الوقت."],
["Understanding regional slang differences across America, from East Coast expressions to Southern drawl phrases to West Coast surfer terminology, reveals the incredible linguistic diversity within a single country.","فهم فروقات العامية الإقليمية عبر أمريكا من تعابير الساحل الشرقي لعبارات لهجة الجنوب لمصطلحات راكبي الأمواج بالساحل الغربي بيكشف التنوع اللغوي المذهل ضمن بلد واحد.","التنوع اللغوي داخل أمريكا = عالم كامل!"],
["The phrase main character energy describes someone who carries themselves with confidence and charisma, as if they are the protagonist of their own life movie rather than a background extra.","عبارة main character energy بتوصف حدا بيحمل حاله بثقة وكاريزما، وكإنه بطل فيلم حياته بدل ما يكون كومبارس بالخلفية.","\"Main character energy\" = طاقة البطل. كوني بطلة حياتك!"],
["When something goes viral on the internet, it means that content, whether a video, meme, tweet, or article, has been shared and viewed by millions of people in a very short period.","لما شي بينتشر على الإنترنت، بيعني إنو محتوى سواء فيديو أو ميم أو تغريدة أو مقالة تم مشاركته ومشاهدته من ملايين الناس بفترة قصيرة جداً.","\"Goes viral\" = ينتشر. ظاهرة إنترنت."],
["The expression to be snatched is a compliment meaning that someone looks exceptionally attractive or put-together, while the related term wig snatched means something was so impressive it figuratively blew your wig off.","تعبير snatched مجاملة بتعني إنو حدا شكله جذاب بشكل استثنائي أو متناسق، بينما المصطلح المرتبط wig snatched بيعني شي كان مبهر لدرجة مجازياً طيّر شعرك.","\"Snatched\" = شكل رائع. عامية إيجابية."],
// Month 6: Professional Networking (30)
["Effective professional networking is fundamentally about building genuine, mutually beneficial relationships over time, rather than simply collecting business cards or adding connections on social media platforms.","التواصل المهني الفعّال بالأساس عن بناء علاقات حقيقية ومفيدة للطرفين مع الوقت، بدل مجرد جمع كروت شغل أو إضافة اتصالات على منصات التواصل الاجتماعي.","\"Networking\" = التواصل المهني. العلاقات الحقيقية > الأرقام."],
["The most valuable professional connections are often forged not through formal networking events but through genuine conversations about shared interests, challenges, and aspirations.","أقيم الاتصالات المهنية غالباً بتنبني مش من خلال فعاليات التواصل الرسمية بل من خلال محادثات حقيقية عن اهتمامات وتحديات وطموحات مشتركة.","\"Forged\" = تُبنى (مثل الحديد). \"Aspirations\" = طموحات."],
["When introducing yourself professionally, the elevator pitch, a concise and compelling summary of who you are and what you do that takes no longer than thirty seconds to deliver, is an invaluable tool.","لما تعرّفي عن حالك مهنياً، خطاب المصعد، ملخص موجز ومقنع عن مين إنتِ وشو بتعملي ما بيتطلب أكتر من تلاتين ثانية، أداة لا تقدر بثمن.","\"Elevator pitch\" = خطاب المصعد. ٣٠ ثانية تعريف مقنع."],
["Following up after meeting someone at a professional event with a personalized message referencing something specific from your conversation demonstrates genuine interest and helps cement the relationship.","المتابعة بعد ما تقابلي حدا بفعالية مهنية برسالة شخصية بتشير لشي محدد من محادثتكم بتظهر اهتمام حقيقي وبتساعد تثبت العلاقة.","\"Following up\" = المتابعة. \"Cement\" = تثبّت."],
["A strong professional reputation is built not by self-promotion but by consistently delivering excellent work, being reliable, and genuinely helping others succeed whenever you have the opportunity.","السمعة المهنية القوية ما بتنبني بالترويج الذاتي بل بتقديم عمل ممتاز باستمرار والموثوقية ومساعدة الآخرين بصدق ينجحوا كل ما عندك الفرصة.","\"Reputation\" = سمعة. \"Reliable\" = موثوق."],
["The art of the informational interview, where you meet with someone not to ask for a job but to learn about their career path and industry, is one of the most underutilized networking strategies.","فن المقابلة المعلوماتية حيث بتقابلي حدا مش لتطلبي شغل بل لتتعلمي عن مسيرتهم المهنية وصناعتهم واحدة من أكتر استراتيجيات التواصل غير المستغلة.","\"Informational interview\" = مقابلة معلوماتية. أداة تواصل قوية."],
["Mentorship, the practice of having an experienced professional guide and support your career development, can accelerate your growth in ways that would be virtually impossible to achieve entirely on your own.","التوجيه المهني، ممارسة إنو يكون عندك محترف خبير يوجه ويدعم تطورك المهني، ممكن يسرّع نموك بطرق مستحيل تقريباً تحققيها بالكامل لحالك.","\"Mentorship\" = التوجيه المهني. \"Accelerate\" = يسرّع."],
["Your online professional presence, particularly on platforms dedicated to career networking, has become as important as your in-person impression in shaping how potential employers and collaborators perceive you.","حضورك المهني على الإنترنت خصوصاً على منصات مخصصة للتواصل المهني صار مهم قد انطباعك الشخصي بتشكيل كيف أصحاب العمل والمتعاونين المحتملين بيشوفوكي.","\"Online presence\" = الحضور الإلكتروني. مهم بعالم اليوم."],
["The ability to make a strong first impression through confident body language, a firm handshake, genuine eye contact, and a warm smile transcends cultural boundaries and opens doors universally.","القدرة على عمل انطباع أول قوي من خلال لغة جسد واثقة ومصافحة حازمة وتواصل بصري حقيقي وابتسامة دافئة بتتجاوز الحدود الثقافية وبتفتح أبواب عالمياً.","\"First impression\" = الانطباع الأول. بيدوم طويلاً."],
["Volunteering your skills and expertise to community organizations is not only personally fulfilling but also expands your professional network in organic and authentic ways that formal events simply cannot replicate.","التطوع بمهاراتك وخبرتك لمنظمات مجتمعية مش بس مُرضي شخصياً بل كمان بيوسع شبكتك المهنية بطرق عضوية وأصيلة ما الفعاليات الرسمية ببساطة ما بتقدر تكررها.","\"Organic\" = عضوي/طبيعي. التطوع = تواصل مهني حقيقي."],
["Building a personal brand that authentically represents your values, expertise, and unique perspective is increasingly important in a professional landscape where reputation and visibility directly influence opportunity.","بناء علامة شخصية بتمثل بأصالة قيمك وخبرتك ومنظورك الفريد مهم بشكل متزايد بمشهد مهني حيث السمعة والظهور بيأثروا مباشرة على الفرص.","\"Personal brand\" = العلامة الشخصية. هويتك المهنية."],
["The art of asking thoughtful questions during professional conversations, rather than simply waiting for your turn to speak, demonstrates genuine intellectual curiosity and earns you respect and credibility.","فن طرح أسئلة مدروسة خلال المحادثات المهنية بدل مجرد الانتظار لدورك تحكي بيظهر فضول فكري حقيقي وبيكسبك احترام ومصداقية.","الأسئلة الذكية > الأجوبة المعلبة. إصغاء = احترام."],
["Developing genuine expertise in a specific niche area and generously sharing that knowledge positions you as a trusted thought leader and naturally attracts professional opportunities.","تطوير خبرة حقيقية بمجال متخصص ومشاركة هالمعرفة بكرم بيحطك كقائد فكري موثوق وبشكل طبيعي بيجذب فرص مهنية.","\"Thought leader\" = قائد فكري. \"Niche\" = تخصص دقيق."],
["Cross-industry networking, connecting with professionals outside your immediate field, often produces the most innovative ideas and unexpected collaborative opportunities precisely because diverse perspectives converge.","التواصل عبر الصناعات، التواصل مع محترفين خارج مجالك المباشر، غالباً بينتج أكتر الأفكار ابتكاراً وفرص تعاونية غير متوقعة بالتحديد لأنو منظورات متنوعة بتتقاطع.","\"Cross-industry\" = عبر الصناعات. التنوع = ابتكار."],
["Maintaining long-term professional relationships requires consistent nurturing through periodic check-ins, celebrating others' successes, and being genuinely helpful without expecting immediate reciprocation.","الحفاظ على علاقات مهنية طويلة الأمد بيتطلب رعاية مستمرة من خلال تواصل دوري والاحتفال بنجاحات الآخرين والمساعدة بصدق بدون توقع مقابل فوري.","العلاقات المهنية الحقيقية = استثمار طويل الأمد."],
["The ability to introduce two people in your network who could benefit from knowing each other is one of the most valuable and appreciated networking skills you can develop.","القدرة على تعريف شخصين بشبكتك ممكن يستفيدوا من معرفة بعض واحدة من أقيم مهارات التواصل المقدّرة اللي ممكن تطوريها.","\"Connecting people\" = ربط الناس. أقوى مهارة تواصل."],
["Professional conferences and industry events provide concentrated opportunities for meaningful connection, but the real relationship-building happens in the follow-up communications afterward.","المؤتمرات المهنية وفعاليات الصناعة بتوفر فرص مركزة لتواصل ذو معنى، بس بناء العلاقات الحقيقي بيصير بالتواصل اللاحق بعدها.","المتابعة بعد الفعاليات = حيث السحر الحقيقي بيصير."],
["Learning to gracefully accept compliments and recognition for your professional achievements, rather than deflecting or minimizing them, projects confidence and reinforces positive professional perception.","تعلم تقبل المجاملات والتقدير لإنجازاتك المهنية بأناقة بدل ما ترفضيها أو تقلليها بيعكس ثقة وبيعزز النظرة المهنية الإيجابية.","اقبلي المجاملات بأناقة. \"Thank you\" كافية!"],
["The concept of paying it forward in professional networking means helping others advance their careers unselfishly, trusting that the goodwill you create will eventually return to you in unexpected ways.","مفهوم رد الجميل للأمام بالتواصل المهني بيعني مساعدة الآخرين يتقدموا بمسيرتهم المهنية بلا أنانية، بتوثقي إنو حسن النية اللي بتخلقيه بالنهاية رح يرجعلك بطرق غير متوقعة.","\"Paying it forward\" = رد الجميل للأمام. فلسفة الكرم المهني."],
["Navigating professional networking as a bilingual immigrant woman requires recognizing that your unique perspective, cultural fluency, and language skills are extraordinary competitive advantages in today's global marketplace.","التنقل بالتواصل المهني كامرأة مهاجرة ثنائية اللغة بيتطلب الاعتراف إنو منظورك الفريد وطلاقتك الثقافية ومهاراتك اللغوية ميزات تنافسية استثنائية بسوق اليوم العالمي.","مهاراتك كمهاجرة ثنائية اللغة = قوة خارقة مهنياً!"],
["The difference between transactional networking, which focuses solely on what you can get, and relational networking, which focuses on building genuine human connections, determines the quality and longevity of your professional relationships.","الفرق بين التواصل المعاملاتي اللي بيركز بس على شو ممكن تاخدي، والتواصل العلائقي اللي بيركز على بناء روابط إنسانية حقيقية بيحدد جودة وعمر علاقاتك المهنية.","\"Transactional\" مقابل \"relational\". العلاقات > المعاملات."],
["Your professional story, the narrative of how your unique background, challenges, and triumphs have shaped your career path, is your most powerful tool for creating authentic and memorable professional connections.","قصتك المهنية، سردية كيف خلفيتك الفريدة وتحدياتك وانتصاراتك شكلت مسيرتك المهنية، أقوى أداة لخلق روابط مهنية أصيلة ولا تنسى.","قصتك المهنية = ميزتك التنافسية الأقوى."],
["Mastering the art of the gracious exit from a conversation at a networking event, leaving the other person feeling valued and eager to reconnect, is as important as making a strong first impression.","إتقان فن الخروج اللطيف من محادثة بفعالية تواصل مهني، بتخلي الشخص التاني حاسس بالتقدير ومتحمس يتواصل مجدداً، مهم قد عمل انطباع أول قوي.","الخروج من المحادثة بأناقة = فن مهم!"],
["In the digital age, your online professional presence often precedes your physical one, making it essential to ensure that your digital footprint accurately reflects the professional image you want to project.","بالعصر الرقمي، حضورك المهني الإلكتروني غالباً بيسبق حضورك الجسدي، واللي بيخليه ضروري تتأكدي إنو بصمتك الرقمية بتعكس بدقة الصورة المهنية اللي بدك تعكسيها.","\"Digital footprint\" = البصمة الرقمية. راقبيها!"],
["The most powerful networking tool available to you costs absolutely nothing: genuine kindness, authentic interest in others, and the willingness to help without keeping score or expecting anything in return.","أقوى أداة تواصل مهني متاحة إلك ما بتكلف شي أبداً: الطيبة الحقيقية والاهتمام الأصيل بالآخرين والاستعداد للمساعدة بدون حساب أو توقع أي شي بالمقابل.","الطيبة = أقوى أداة تواصل مهني. مجاناً!"],
["Strategic networking involves identifying the key individuals and organizations that align with your professional goals and finding creative, authentic ways to build relationships with them over time.","التواصل الاستراتيجي بيتضمن تحديد الأفراد والمنظمات الرئيسية اللي بتتوافق مع أهدافك المهنية وإيجاد طرق إبداعية وأصيلة لبناء علاقات معهم مع الوقت.","\"Strategic networking\" = تواصل استراتيجي. خططي لعلاقاتك المهنية."],
["The ability to navigate professional social events with confidence, engaging in meaningful small talk and transitioning smoothly between conversations, is a skill that improves dramatically with deliberate practice.","القدرة على التنقل بالفعاليات الاجتماعية المهنية بثقة والمشاركة بأحاديث صغيرة ذات معنى والانتقال بسلاسة بين المحادثات مهارة بتتحسن بشكل كبير بالممارسة المتعمدة.","\"Small talk\" = الأحاديث الصغيرة. مهارة ممكن تتعلميها!"],
["Building professional relationships across generational lines, connecting meaningfully with both those more experienced and those newer to the field, enriches your perspective and expands your influence in ways that same-generation networking cannot.","بناء علاقات مهنية عبر الأجيال، التواصل بشكل ذو معنى مع أصحاب الخبرة ومع الجدد بالمجال، بيغني منظورك وبيوسع تأثيرك بطرق ما التواصل مع نفس الجيل بيقدر يعملها.","تواصلي مع كل الأجيال. كل جيل عنده حكمة مختلفة."],
["The practice of regularly reflecting on and refining your professional networking strategy ensures that your efforts remain focused, authentic, and aligned with your evolving career objectives and personal values.","ممارسة التأمل المنتظم وتحسين استراتيجية التواصل المهني بتضمن إنو جهودك تضل مركزة وأصيلة ومتوافقة مع أهدافك المهنية المتطورة وقيمك الشخصية.","راجعي استراتيجيتك دورياً. تأكدي إنها لسا مناسبة."],
["Understanding that professional relationships, like all meaningful human connections, require patience, genuine care, and the wisdom to give without immediately expecting to receive, is the ultimate networking mastery.","فهم إنو العلاقات المهنية مثل كل الروابط الإنسانية ذات المعنى بتتطلب صبر ورعاية حقيقية وحكمة العطاء بدون توقع فوري للاستلام هو الإتقان النهائي للتواصل المهني.","الصبر + الكرم = إتقان التواصل المهني."],
// Month 7: Critical Thinking & Analysis (31)
["Critical thinking is not about being negative or finding fault with everything; it is about carefully evaluating evidence, questioning assumptions, and forming well-reasoned conclusions based on the best available information.","التفكير النقدي مش عن السلبية أو إيجاد أخطاء بكل شي؛ هو عن تقييم الأدلة بعناية وتساؤل الافتراضات وتشكيل استنتاجات مدروسة بناءً على أفضل المعلومات المتاحة.","\"Critical thinking\" لا يعني \"سلبي\". بيعني \"تحليلي\"."],
["The ability to distinguish between correlation, where two things happen to occur together, and causation, where one thing actually causes the other, is one of the most essential analytical skills.","القدرة على التمييز بين الارتباط حيث شيئين بيصادف يصيروا سوا، والسببية حيث شي فعلاً بيسبب التاني، واحدة من أهم المهارات التحليلية.","\"Correlation\" لا يعني \"causation\". خطأ شائع جداً."],
["Confirmation bias, our natural tendency to seek out information that confirms what we already believe while ignoring evidence that contradicts our existing views, is perhaps the most pervasive obstacle to clear thinking.","التحيز التأكيدي، ميلنا الطبيعي للبحث عن معلومات بتأكد اللي خلص بنؤمن فيه مع تجاهل أدلة بتناقض آراءنا الموجودة، يمكن أكتر عائق انتشاراً للتفكير الواضح.","\"Confirmation bias\" = التحيز التأكيدي. أخطر تحيز معرفي."],
["A logically sound argument requires premises that are both true and relevant, a valid logical structure connecting those premises to the conclusion, and the absence of any hidden assumptions or fallacies.","حجة منطقية سليمة بتتطلب مقدمات صحيحة وذات صلة، وبنية منطقية صحيحة بتربط هالمقدمات بالاستنتاج، وغياب أي افتراضات مخفية أو مغالطات.","\"Premises\" = مقدمات. \"Fallacies\" = مغالطات. أساس المنطق."],
["The Socratic method of questioning, which involves systematically probing the foundations of a claim through a series of focused questions, remains one of the most powerful tools for uncovering hidden weaknesses in an argument.","طريقة سقراط بالتساؤل اللي بتتضمن فحص أسس ادعاء بشكل منهجي من خلال سلسلة أسئلة مركزة لسا واحدة من أقوى الأدوات لكشف نقاط ضعف مخفية بحجة.","\"Socratic method\" = طريقة سقراط. أسئلة تكشف الحقيقة."],
["Intellectual humility, the recognition that your current understanding may be incomplete or even wrong, is paradoxically one of the greatest strengths a critical thinker can possess.","التواضع الفكري، الاعتراف بأنو فهمك الحالي ممكن يكون ناقص أو حتى غلط، بالمفارقة واحد من أعظم نقاط القوة اللي مفكر نقدي ممكن يملكها.","\"Intellectual humility\" = التواضع الفكري. قوة مش ضعف!"],
["The steel man argument, the practice of engaging with the strongest possible version of your opponent's position rather than a weakened caricature, demonstrates both intellectual integrity and genuine respect for truth.","حجة الرجل الفولاذي، ممارسة التعامل مع أقوى نسخة ممكنة من موقف خصمك بدل كاريكاتور مضعّف، بتظهر نزاهة فكرية واحترام حقيقي للحقيقة.","\"Steel man\" = عكس straw man. ناقش أقوى حجة للخصم مش أضعفها."],
["Developing the habit of asking who benefits from this particular narrative and whose perspective is conspicuously absent transforms you from a passive consumer of information into an active critical analyst.","تطوير عادة السؤال مين بيستفيد من هالسردية بالذات ومنظور مين غائب بشكل واضح بيحولك من مستهلك سلبي للمعلومات لمحلل نقدي فعّال.","أسئلة قوية: \"مين بيستفيد؟\" و\"شو الناقص؟\""],
["The ability to hold two contradictory ideas in your mind simultaneously and evaluate them fairly without immediately dismissing either one is a hallmark of sophisticated intellectual maturity.","القدرة على حمل فكرتين متناقضتين بذهنك بنفس الوقت وتقييمهم بإنصاف بدون ما ترفضي أي واحدة فوراً علامة على نضج فكري متطور.","فكرة سكوت فيتزجيرالد: عقل ممتاز = يحمل تناقضات."],
["Every piece of information you encounter has been selected, framed, and presented by someone with particular interests and perspectives, and recognizing this fundamental truth is the first step toward genuine media literacy.","كل قطعة معلومات بتصادفيها تم اختيارها وتأطيرها وتقديمها من حدا عنده مصالح ومنظورات معينة، والاعتراف بهالحقيقة الأساسية أول خطوة نحو محو الأمية الإعلامية الحقيقية.","\"Media literacy\" = محو الأمية الإعلامية. مهارة القرن الـ٢١."],
["The ad hominem fallacy, attacking the person making an argument rather than addressing the argument itself, is one of the most common and easily recognizable logical errors in everyday discourse.","مغالطة الهجوم على الشخص، مهاجمة الشخص اللي عم يقدم حجة بدل معالجة الحجة نفسها، واحدة من أكتر الأخطاء المنطقية شيوعاً وسهولة بالتعرف عليها بالنقاش اليومي.","\"Ad hominem\" = هجوم على الشخص. مغالطة شائعة."],
["The Dunning-Kruger effect, where people with limited knowledge in an area tend to overestimate their competence while true experts tend to underestimate theirs, reveals a fascinating paradox of human cognition.","تأثير دانينغ كروغر حيث الناس بمعرفة محدودة بمجال بيميلوا يبالغوا بتقدير كفاءتهم بينما الخبراء الحقيقيين بيميلوا يقللوا من كفاءتهم بيكشف مفارقة ملفتة بالإدراك البشري.","\"Dunning-Kruger effect\" = المبتدئ يفتكر يعرف كل شي، الخبير يشك بنفسه!"],
["The sunk cost fallacy, continuing to invest time, money, or effort into something simply because you have already invested so much, leads to consistently poor decision-making across all areas of life.","مغالطة التكلفة الغارقة، الاستمرار باستثمار وقت أو مال أو جهد بشي بس لأنك خلص استثمرتي كتير، بتؤدي لاتخاذ قرارات سيئة باستمرار بكل مجالات الحياة.","\"Sunk cost fallacy\" = مغالطة التكلفة الغارقة. اللي راح راح!"],
["The principle of Occam's razor states that when multiple explanations exist for a phenomenon, the simplest explanation that accounts for all the evidence is most likely to be correct.","مبدأ موس أوكام بيقول إنو لما تكون في تفسيرات متعددة لظاهرة، التفسير الأبسط اللي بيفسر كل الأدلة على الأرجح هو الصحيح.","\"Occam's razor\" = موس أوكام. الأبسط غالباً الأصح."],
