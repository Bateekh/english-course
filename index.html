<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>كورس الإنجليزي - سنة كاملة</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI','Arial',sans-serif;background:#f0f4f8;min-height:100vh;color:#1e293b}
#app{max-width:500px;margin:0 auto;padding:0 0 80px 0}
header{background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;padding:20px;text-align:center}
header h1{font-size:1.4rem;margin-bottom:4px}
header p{font-size:0.85rem;opacity:0.9}
.progress-bar{background:rgba(255,255,255,0.2);height:8px;border-radius:4px;margin-top:12px;overflow:hidden}
.progress-fill{background:#fbbf24;height:100%;border-radius:4px;transition:width 0.5s}
.progress-text{font-size:0.75rem;margin-top:4px;opacity:0.8}
.months{display:flex;overflow-x:auto;background:#fff;border-bottom:1px solid #e2e8f0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.months::-webkit-scrollbar{display:none}
.month-tab{flex-shrink:0;padding:12px 16px;font-size:0.8rem;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;color:#64748b;transition:all 0.2s}
.month-tab.active{color:#1e40af;border-bottom-color:#1e40af;font-weight:bold}
.month-tab .check{color:#16a34a;margin-right:4px}
.lesson-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;border-bottom:1px solid #e2e8f0}
.lesson-nav span{font-size:0.85rem;color:#64748b}
.lesson-dots{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;max-width:60%}
.dot{width:10px;height:10px;border-radius:50%;background:#e2e8f0;cursor:pointer;transition:all 0.2s}
.dot.done{background:#16a34a}
.dot.current{background:#3b82f6;transform:scale(1.3)}
.card{background:#fff;margin:16px;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,0.08);overflow:hidden}
.card-header{padding:16px 20px 8px;display:flex;justify-content:space-between;align-items:center}
.day-num{font-size:0.8rem;color:#94a3b8}
.card-body{padding:8px 20px 20px}
.english-sentence{direction:ltr;text-align:left;font-size:1.6rem;line-height:1.6;color:#1e293b;padding:16px 0;font-weight:500;cursor:pointer;unicode-bidi:plaintext}
.english-sentence:active{color:#3b82f6}
.word-mode{direction:ltr;text-align:left;display:flex;flex-wrap:wrap;gap:8px;padding:16px 0}
.word-btn{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe;border-radius:8px;padding:8px 14px;font-size:1.2rem;cursor:pointer;transition:all 0.15s}
.word-btn:active{background:#1e40af;color:#fff}
.controls{display:flex;flex-wrap:wrap;gap:8px;padding:8px 0}
.btn{border:none;border-radius:10px;padding:10px 16px;font-size:0.85rem;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.15s;font-family:inherit}
.btn:active{transform:scale(0.96)}
.btn-listen{background:#eff6ff;color:#1e40af}
.btn-translate{background:#f0fdf4;color:#166534}
.btn-tip{background:#fef3c7;color:#92400e}
.btn-words{background:#fdf2f8;color:#9d174d}
.btn-complete{background:#16a34a;color:#fff;width:100%;justify-content:center;padding:12px;margin-top:8px;font-size:0.95rem}
.btn-complete.done{background:#e2e8f0;color:#64748b}
.translation{direction:rtl;text-align:right;background:#f0fdf4;padding:14px;border-radius:10px;margin-top:12px;font-size:1.1rem;line-height:1.8;color:#166534;display:none}
.translation.show{display:block}
.tip{direction:rtl;text-align:right;background:#fef3c7;padding:14px;border-radius:10px;margin-top:8px;font-size:0.95rem;line-height:1.8;color:#92400e;display:none}
.tip.show{display:block}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e2e8f0;display:flex;justify-content:space-between;padding:12px 20px;max-width:500px;margin:0 auto;z-index:10}
.nav-btn{background:#3b82f6;color:#fff;border:none;border-radius:10px;padding:10px 24px;font-size:0.9rem;cursor:pointer;font-family:inherit}
.nav-btn:disabled{background:#e2e8f0;color:#94a3b8}
.nav-btn:active{background:#1d4ed8}
.lesson-count{display:flex;align-items:center;font-size:0.85rem;color:#64748b}
.welcome{padding:30px 20px;text-align:center}
.welcome h2{font-size:1.5rem;margin-bottom:16px;color:#1e40af}
.welcome p{font-size:1rem;line-height:1.8;color:#475569;margin-bottom:12px}
.welcome .start-btn{background:#1e40af;color:#fff;border:none;border-radius:12px;padding:14px 32px;font-size:1.1rem;cursor:pointer;margin-top:20px;font-family:inherit}
.month-title{padding:12px 20px;font-size:0.85rem;color:#64748b;text-align:center;background:#f8fafc}
.gear-btn{position:absolute;left:16px;top:20px;background:none;border:none;color:#fff;font-size:1.4rem;cursor:pointer;opacity:0.85}
.gear-btn:active{opacity:1}
header{position:relative}
.backup-panel{background:#fff;margin:16px;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,0.08);padding:20px;display:none}
.backup-panel.show{display:block}
.backup-panel h3{font-size:1.1rem;margin-bottom:12px;color:#1e40af}
.backup-panel p{font-size:0.9rem;color:#475569;line-height:1.7;margin-bottom:12px}
.backup-panel textarea{width:100%;height:80px;border:1px solid #cbd5e1;border-radius:8px;padding:10px;font-size:0.85rem;font-family:monospace;direction:ltr;resize:none;margin-bottom:8px}
.backup-panel .bp-btn{background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:0.9rem;cursor:pointer;margin-left:8px;font-family:inherit}
.backup-panel .bp-btn.restore{background:#16a34a}
.backup-panel .bp-btn.close{background:#94a3b8}
.bp-msg{font-size:0.85rem;margin-top:8px;padding:8px;border-radius:6px;display:none}
.bp-msg.ok{display:block;background:#f0fdf4;color:#166534}
.bp-msg.err{display:block;background:#fef2f2;color:#991b1b}
</style>
</head>

<script>
const MS=[
{n:"التحيات والأساسيات",e:"Greetings & Basics",c:31},
{n:"العيلة والناس",e:"Family & People",c:28},
{n:"الأرقام والوقت",e:"Numbers & Time",c:31},
{n:"الأكل والشرب",e:"Food & Drink",c:30},
{n:"التسوق والمصاري",e:"Shopping & Money",c:31},
{n:"البيت والروتين",e:"Home & Routine",c:30},
{n:"الاتجاهات والمواصلات",e:"Directions & Transport",c:31},
{n:"الصحة والجسم",e:"Health & Body",c:31},
{n:"الشغل والمدرسة",e:"Work & School",c:30},
{n:"الطقس والطبيعة",e:"Weather & Nature",c:31},
{n:"المشاعر والآراء",e:"Feelings & Opinions",c:30},
{n:"مراجعة ومحادثات",e:"Review & Conversations",c:31}
];
const L=[
// === Month 1: التحيات والأساسيات (31) ===
["Hello!","!مرحبا","\"Hello\" هي أبسط تحية بالإنجليزي. بتنقال بأي وقت من النهار."],
["Good morning.","صباح الخير.","\"Good\" = منيح. \"Morning\" = صباح. بالإنجليزي الصفة بتيجي قبل الاسم."],
["Good evening.","مساء الخير.","\"Evening\" = مسا. نفس القاعدة: Good + وقت من اليوم."],
["How are you?","كيفك؟","\"How\" = كيف. الأسئلة بالإنجليزي كتير بتبلش بـ How أو What أو Where."],
["I am fine, thank you.","أنا منيحة، شكراً.","\"I am\" = أنا. بالإنجليزي لازم تحطي \"am\" بعد \"I\" دايماً."],
["What is your name?","شو اسمك؟","\"What\" = شو. \"Your\" = تبعك. \"Name\" = اسم."],
["My name is Sara.","اسمي سارة.","\"My\" = تبعي. لاحظي: \"my name\" مش \"name my\". الصفة قبل الاسم."],
["Nice to meet you.","تشرفنا.","جملة جاهزة بتنقال لما تتعرفي على حدا جديد."],
["Where are you from?","من وين إنتي؟","\"Where\" = وين. \"From\" = من."],
["I am from Jordan.","أنا من الأردن.","\"I am from\" + اسم البلد. أسماء البلدان بالإنجليزي بتبلش بحرف كبير."],
["I live in America.","أنا ساكنة بأمريكا.","\"Live\" = بعيش. \"In\" = بـ. بنقول \"in\" قبل أسماء البلدان والمدن."],
["I speak Arabic.","أنا بحكي عربي.","\"Speak\" = بحكي. أسماء اللغات بتبلش بحرف كبير: Arabic, English, French."],
["I am learning English.","أنا عم بتعلم إنجليزي.","\"Am learning\" = عم بتعلم. \"Am + verb+ing\" بتعني عم تعملي الشي هلق."],
["Please speak slowly.","من فضلك احكي ببطء.","\"Please\" = لو سمحت. \"Slowly\" = ببطء. ممكن تحطيها بأول أو آخر الجملة."],
["Can you repeat that?","فيك تعيد؟","\"Can you...?\" = فيك...؟ طريقة مهذبة تطلبي شي من حدا."],
["I don't understand.","ما فهمت.","\"Don't\" = ما/مش. لما بدك تنفي شي بتحطي \"don't\" قبل الفعل."],
["Thank you very much.","شكراً كتير.","\"Very much\" = كتير. بتيجي بآخر الجملة للتأكيد."],
["You are welcome.","أهلاً وسهلاً.","هاي بتنقال رد على \"Thank you\". ما بتعني \"مرحبا\" هون."],
["Excuse me.","عن إذنك.","بتنقال لما بدك تلفتي انتباه حدا أو تمري من قدامه."],
["I am sorry.","آسفة.","\"Sorry\" = آسف. بتنقال لما تعتذري عن شي."],
["Yes, please.","أيوا، لو سمحت.","جواب مهذب لما حدا يعرض عليكي شي."],
["No, thank you.","لا، شكراً.","طريقة مهذبة ترفضي عرض حدا."],
["Goodbye!","!مع السلامة","\"Goodbye\" أو \"Bye\" بتنقال لما تودعي حدا."],
["See you later.","بشوفك بعدين.","\"See you\" = بشوفك. \"Later\" = بعدين. وداع غير رسمي."],
["See you tomorrow.","بشوفك بكرا.","\"Tomorrow\" = بكرا. بتقدري تقولي: See you + أي وقت."],
["Have a nice day.","نهارك سعيد.","جملة بتنقال للوداع كتمنيات. \"Day\" = يوم. \"Nice\" = حلو."],
["How is your day going?","كيف نهارك ماشي؟","\"Going\" هون بتعني ماشي. سؤال عن كيف يومك."],
["My day is going well.","نهاري ماشي منيح.","\"Well\" = منيح. بنستعملها مع الأفعال. \"Good\" مع الأسماء."],
["It is nice to meet you.","فرصة سعيدة.","\"It is\" بتنقال كتير بالإنجليزي لتبليش جمل."],
["Welcome to our home.","أهلاً ببيتنا.","\"Our\" = تبعنا. مثل \"my\" بس للجماعة."],
["It was nice talking to you.","كان حلو الحكي معك.","\"Was\" = كان. ماضي \"is\". بنقولها لما نودع حدا حكينا معه."],
// === Month 2: العيلة والناس (28) ===
["This is my husband.","هاد زوجي.","\"This is\" = هاد/هاي. بنستعملها لما نعرّف عن حدا."],
["This is my wife.","هاي مرتي.","\"Wife\" = زوجة. \"Husband\" = زوج."],
["I have two children.","عندي ولدين.","\"I have\" = عندي. \"Children\" جمع \"child\" = ولد."],
["My son is five years old.","ابني عمره خمس سنين.","\"Years old\" = عمره...سنين. بالإنجليزي بنقول الرقم + years old."],
["My daughter is three years old.","بنتي عمرها تلات سنين.","\"Daughter\" = بنت. \"Son\" = ابن."],
["He is my brother.","هو أخوي.","\"He\" = هو. \"She\" = هي. \"He\" للذكر، \"She\" للأنثى."],
["She is my sister.","هي أختي.","\"Sister\" = أخت. \"Brother\" = أخ."],
["My mother is very kind.","أمي كتير طيبة.","\"Kind\" = طيب/لطيف. الصفات بالإنجليزي ما بتتغير حسب المذكر والمؤنث."],
["My father works hard.","أبوي بشتغل كتير.","\"Works\" لاحظي الـ s بالآخر. مع he/she/it بنضيف s للفعل."],
["We are a big family.","نحنا عيلة كبيرة.","\"We are\" = نحنا. \"Big\" = كبير. \"Small\" = صغير."],
["Do you have children?","عندك ولاد؟","\"Do you have...?\" = عندك...؟ طريقة تسألي سؤال بالإنجليزي."],
["How old is your son?","قديش عمر ابنك؟","\"How old\" = قديش العمر. بنقول: How old is + الشخص؟"],
["She looks like her mother.","هي شبه أمها.","\"Looks like\" = شبه. \"Her\" = تبعها. \"His\" = تبعه."],
["He looks like his father.","هو شبه أبوه.","\"His\" = تبعه (للذكر). \"Her\" = تبعها (للأنثى)."],
["My baby is sleeping.","البيبي نايم.","\"Is sleeping\" = عم ينام. \"Is + verb+ing\" = عم يعمل الشي هلق."],
["The children are playing.","الولاد عم يلعبوا.","\"Are playing\" = عم يلعبوا. مع جمع بنقول \"are\" مش \"is\"."],
["My family is in Jordan.","عيلتي بالأردن.","\"Family\" = عيلة. كلمة مفردة بتتعامل معها كوحدة."],
["I miss my family.","مشتاقة لعيلتي.","\"Miss\" = مشتاق لـ. بنقول: I miss + الشخص أو المكان."],
["We talk on the phone every day.","بنحكي عالتلفون كل يوم.","\"Every day\" = كل يوم. \"Every\" = كل."],
["My uncle lives near us.","عمي ساكن قريب مننا.","\"Near\" = قريب. \"Far\" = بعيد. \"Us\" = نحنا (مفعول به)."],
["My aunt is visiting us.","خالتي جاية تزورنا.","\"Is visiting\" = عم تزور. \"Aunt\" = خالة أو عمة."],
["He is a tall man.","هو رجال طويل.","\"Tall\" = طويل. \"Short\" = قصير. الصفة قبل الاسم: tall man."],
["She is a beautiful woman.","هي مرا حلوة.","\"Beautiful\" = حلو/جميل. \"Woman\" = مرا. \"Man\" = رجال."],
["The boy is very smart.","الولد كتير شاطر.","\"Smart\" = شاطر/ذكي. \"The\" = الـ. بنحطها قبل اسم محدد."],
["The girl is very polite.","البنت كتير مأدبة.","\"Polite\" = مأدب. \"Rude\" = قليل أدب."],
["They are good people.","هم ناس منيحين.","\"They\" = هم. \"People\" = ناس. كلمة جمع."],
["She has brown eyes.","عيونها بنية.","\"Has\" بدل \"have\" مع he/she/it. \"Brown\" = بني. \"Eyes\" = عيون."],
["He has black hair.","شعره أسود.","\"Hair\" = شعر. الألوان: black أسود، brown بني، blonde أشقر."],
// === Month 3: الأرقام والوقت (31) ===
["Today is Monday.","اليوم الإثنين.","أيام الأسبوع بالإنجليزي بتبلش بحرف كبير دايماً."],
["Tomorrow is Tuesday.","بكرا الثلاثاء.","\"Tomorrow\" = بكرا. \"Yesterday\" = مبارح."],
["Yesterday was Sunday.","مبارح كان الأحد.","\"Was\" = كان. ماضي \"is\". بنقول: Yesterday was..."],
["What day is today?","شو اليوم؟","\"What day\" = شو اليوم. سؤال عن اليوم."],
["It is ten o'clock.","الساعة عشرة.","\"O'clock\" بتيجي بعد الرقم لما تقولي الساعة بالضبط."],
["What time is it?","قديش الساعة؟","\"What time\" = قديش الساعة. سؤال عن الوقت."],
["I wake up at seven.","بصحى الساعة سبعة.","\"At\" = الساعة. بنقول \"at\" قبل الساعة: at seven, at nine."],
["School starts at eight.","المدرسة بتبلش الساعة تمانة.","\"Starts\" = بتبلش. لاحظي الـ s لأنو مع مفرد (school)."],
["We eat lunch at twelve.","بنتغدى الساعة اثنعش.","\"Lunch\" = غدا. \"Breakfast\" = فطور. \"Dinner\" = عشا."],
["I go to bed at ten.","بنام الساعة عشرة.","\"Go to bed\" = بروح أنام. تعبير جاهز بالإنجليزي."],
["I have one apple.","عندي تفاحة وحدة.","\"One\" = واحد. الأرقام: one, two, three, four, five."],
["I need two cups.","بدي كاستين.","\"Two\" = اثنين. بالإنجليزي بنضيف s للجمع: cup → cups."],
["There are three chairs.","في تلات كراسي.","\"There are\" = في (للجمع). \"There is\" = في (للمفرد)."],
["She has four books.","عندها أربع كتب.","\"Four\" = أربعة. \"Books\" جمع \"book\"."],
["We have five rooms.","عنا خمس غرف.","\"Five\" = خمسة. six ستة، seven سبعة، eight تمانة، nine تسعة، ten عشرة."],
["I bought ten eggs.","اشتريت عشر بيضات.","\"Bought\" = اشتريت. ماضي \"buy\". بالإنجليزي كل فعل إله شكل ماضي."],
["It costs twenty dollars.","بتكلف عشرين دولار.","\"Costs\" = بتكلف. \"Twenty\" = عشرين."],
["There are thirty days in a month.","في تلاتين يوم بالشهر.","\"In a month\" = بالشهر. \"In\" = بـ/في. بنقولها مع الأشهر والسنين."],
["He is forty years old.","هو عمره أربعين سنة.","\"Forty\" = أربعين. الأعداد العشرات: thirty, forty, fifty, sixty."],
["There are fifty students.","في خمسين طالب.","\"Students\" = طلاب. \"Student\" = طالب."],
["I have a hundred pages to read.","عندي مية صفحة أقرأها.","\"A hundred\" = مية. \"A thousand\" = ألف."],
["The meeting is at two thirty.","الاجتماع الساعة اثنين ونص.","\"Two thirty\" = 2:30. بنقول الساعة + الدقائق: two thirty = اثنين وتلاتين."],
["I will be there in fifteen minutes.","بكون هنيك بعد ربع ساعة.","\"In fifteen minutes\" = بعد ربع ساعة. \"Minutes\" = دقائق."],
["January is the first month.","كانون التاني هو أول شهر.","\"First\" = أول. الترتيب: first, second, third, fourth, fifth."],
["My birthday is in March.","عيد ميلادي بشهر آذار.","\"In\" + الشهر: in March, in June, in December."],
["Summer starts in June.","الصيف ببلش بحزيران.","الفصول: summer صيف، winter شتي، spring ربيع، fall خريف."],
["I have an appointment on Wednesday.","عندي موعد يوم الأربعاء.","\"On\" + يوم: on Monday, on Tuesday. \"On\" بنستعملها مع الأيام."],
["The weekend is Saturday and Sunday.","نهاية الأسبوع السبت والأحد.","\"Weekend\" = نهاية الأسبوع. \"And\" = و."],
["What is the date today?","شو التاريخ اليوم؟","\"Date\" = تاريخ. مختلفة عن \"day\" = يوم."],
["It is the fifteenth of March.","اليوم خمستعش آذار.","\"Fifteenth\" = الخامس عشر. بنضيف th للأعداد الترتيبية: fifth, sixth, seventh."],
["We are in the year two thousand twenty-six.","نحنا بسنة ألفين وستة وعشرين.","\"Year\" = سنة. بنقول السنة كرقم كامل."],
// === Month 4: الأكل والشرب (30) ===
["I am hungry.","أنا جوعانة.","\"Hungry\" = جوعان. \"I am\" + صفة = أنا + صفة."],
["I am thirsty.","أنا عطشانة.","\"Thirsty\" = عطشان. نفس القاعدة: I am + الحالة."],
["What do you want to eat?","شو بدك تاكلي؟","\"Want to eat\" = بدك تاكلي. \"Want to\" + فعل = بدك + فعل."],
["I want water, please.","بدي مي، لو سمحت.","\"I want\" = بدي. \"Water\" = مي. كلمة \"water\" ما بتنجمع."],
["I like chicken and rice.","بحب الدجاج والرز.","\"I like\" = بحب. \"Like\" + اسم = بحب + شي."],
["This food is delicious.","هالأكل طيب.","\"Delicious\" = طيب/لذيذ. \"Food\" = أكل."],
["Can I have the menu, please?","ممكن المنيو لو سمحت؟","\"Can I have...?\" = ممكن...؟ طريقة مهذبة تطلبي شي بالمطعم."],
["I would like a cup of coffee.","بدي فنجان قهوة.","\"I would like\" = بدي. أكتر من \"I want\" بالأدب. بنستعملها بالمطاعم."],
["Do you want sugar in your tea?","بدك سكر بالشاي؟","\"Sugar\" = سكر. \"Tea\" = شاي. \"Coffee\" = قهوة."],

// State
let st={m:0,l:0};
const prog=JSON.parse(localStorage.getItem('ec-prog')||'{}');
const started=localStorage.getItem('ec-started');

function saveProg(){localStorage.setItem('ec-prog',JSON.stringify(prog))}
function getGlobalIdx(m,l){let idx=0;for(let i=0;i<m;i++)idx+=MS[i].c;return idx+l}
function getMonthLesson(gi){let m=0,idx=gi;while(m<MS.length&&idx>=MS[m].c){idx-=MS[m].c;m++}return{m,l:idx}}
function completedInMonth(m){let s=getGlobalIdx(m,0),c=0;for(let i=0;i<MS[m].c;i++)if(prog[s+i])c++;return c}
function totalCompleted(){let c=0;for(let k in prog)if(prog[k])c++;return c}

function speak(text,rate){
speechSynthesis.cancel();
const u=new SpeechSynthesisUtterance(text);
u.lang='en-US';u.rate=rate||0.75;
speechSynthesis.speak(u);
}

function exportProgress(){
const data={p:prog,s:started?'1':'0',v:1};
return btoa(unescape(encodeURIComponent(JSON.stringify(data))));
}

function importProgress(code){
try{
const json=decodeURIComponent(escape(atob(code.trim())));
const data=JSON.parse(json);
if(!data.p)throw new Error('bad');
Object.keys(prog).forEach(k=>delete prog[k]);
Object.assign(prog,data.p);
saveProg();
if(data.s==='1')localStorage.setItem('ec-started','1');
return true;
}catch(e){return false;}
}

function showBackupPanel(){
const bp=document.getElementById('backup-panel');
if(bp)bp.classList.toggle('show');
}

function doExport(){
const code=exportProgress();
document.getElementById('bp-code').value=code;
document.getElementById('bp-msg').className='bp-msg ok';
document.getElementById('bp-msg').textContent='تم! انسخي هالكود واحتفظي فيه.';
}

function doCopy(){
const ta=document.getElementById('bp-code');
ta.select();
navigator.clipboard.writeText(ta.value).then(()=>{
document.getElementById('bp-msg').className='bp-msg ok';
document.getElementById('bp-msg').textContent='تم النسخ!';
});
}

function doImport(){
const code=document.getElementById('bp-code').value;
if(!code.trim()){
document.getElementById('bp-msg').className='bp-msg err';
document.getElementById('bp-msg').textContent='الصقي كود النسخة الاحتياطية أولاً.';
return;
}
if(importProgress(code)){
document.getElementById('bp-msg').className='bp-msg ok';
document.getElementById('bp-msg').textContent='تم استرجاع التقدم! رح يتحدث الصفحة...';
setTimeout(()=>location.reload(),1000);
}else{
document.getElementById('bp-msg').className='bp-msg err';
document.getElementById('bp-msg').textContent='الكود مش صحيح. تأكدي إنك نسختيه كامل.';
}
}

let monthTabs='';
for(let i=0;i<MS.length;i++){
const mc=completedInMonth(i);
const full=mc===MS[i].c;
monthTabs+=`<div class="month-tab${i===st.m?' active':''}" onclick="st.m=${i};st.l=0;renderLesson()">
${full?'<span class="check">&#10003;</span>':''}${i+1}. ${MS[i].n}</div>`;
}

let dots='';
for(let i=0;i<MS[st.m].c;i++){
const dgi=getGlobalIdx(st.m,i);
const cls=i===st.l?'current':(prog[dgi]?'done':'');
dots+=`<div class="dot ${cls}" onclick="st.l=${i};renderLesson()"></div>`;
}

app.innerHTML=`
<header>
<button class="gear-btn" onclick="showBackupPanel()">&#9881;</button>
<h1>تعلمي الإنجليزي</h1>
<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
<div class="progress-text">${tc} من ٣٦٥ درس (${pct}%)</div>
</header>
<div id="backup-panel" class="backup-panel">
<h3>&#128190; نسخة احتياطية</h3>
<p>احفظي تقدمك حتى ما يضيع! اضغطي "حفظ" وانسخي الكود. لما بدك ترجعي التقدم، الصقي الكود واضغطي "استرجاع".</p>
<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">
<button class="bp-btn" onclick="doExport()">&#128190; حفظ التقدم</button>
<button class="bp-btn" onclick="doCopy()">&#128203; نسخ الكود</button>
<button class="bp-btn restore" onclick="doImport()">&#128260; استرجاع</button>
<button class="bp-btn close" onclick="showBackupPanel()">&#10005; إغلاق</button>
</div>
<textarea id="bp-code" placeholder="كود النسخة الاحتياطية بيطلع هون..."></textarea>
<div id="bp-msg" class="bp-msg"></div>
</div>
<div class="months">${monthTabs}</div>
<div class="month-title">${MS[st.m].e} - ${MS[st.m].n}</div>
<div class="lesson-nav">
<span>درس ${st.l+1} من ${MS[st.m].c}</span>
<div class="lesson-dots">${dots}</div>
</div>
<div class="card">
<div class="card-header">
<span class="day-num">اليوم ${gi+1} من ٣٦٥</span>
${done?'<span style="color:#16a34a;font-size:0.85rem">&#10003; تم</span>':''}
</div>
<div class="card-body">
<div class="english-sentence" onclick="speak('${lesson[0].replace(/'/g,"\\'")}')">
${lesson[0]}
</div>
<div class="controls">
<button class="btn btn-listen" onclick="speak('${lesson[0].replace(/'/g,"\\'")}')">
&#9654; اسمعيها
</button>
<button class="btn btn-listen" onclick="speak('${lesson[0].replace(/'/g,"\\'")}',0.5)">
&#128034; ببطء
</button>
<button class="btn btn-translate" onclick="document.getElementById('tr').classList.toggle('show')">
&#127760; الترجمة
</button>
<button class="btn btn-tip" onclick="document.getElementById('tp').classList.toggle('show')">
&#128161; نصيحة
</button>
<button class="btn btn-words" onclick="showWords()">
&#128220; كلمة كلمة
</button>
</div>
<div id="word-area"></div>
<div id="tr" class="translation">${lesson[1]}</div>
<div id="tp" class="tip">${lesson[2]}</div>
<button class="btn btn-complete${done?' done':''}" onclick="markDone(${gi})">
${done?'&#10003; تم هالدرس - اضغطي للإلغاء':'&#10003; خلصت هالدرس'}
</button>
</div>
</div>
<div class="bottom-nav">
<button class="nav-btn" ${gi>=364?'disabled':''}
onclick="goNext()">الدرس الجاي &#8592;</button>
<span class="lesson-count">${gi+1}/365</span>
<button class="nav-btn" ${gi<=0?'disabled':''}
onclick="goPrev()">&#8594; الدرس السابق</button>
</div>`;

// scroll month tab into view
setTimeout(()=>{
const active=document.querySelector('.month-tab.active');
if(active)active.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
},100);
}

function showWords(){
const gi=getGlobalIdx(st.m,st.l);
const words=L[gi][0].replace(/[.,!?;:'"]/g,'').split(' ');
const area=document.getElementById('word-area');
if(area.innerHTML){area.innerHTML='';return;}
area.innerHTML='<div class="word-mode">'+words.map(w=>
`<button class="word-btn" onclick="speak('${w.replace(/'/g,"\\'")}',0.6)">${w}</button>`
).join('')+'</div>';
}

function markDone(gi){
if(prog[gi])delete prog[gi];
else prog[gi]=true;
saveProg();
renderLesson();
}

function goNext(){
const gi=getGlobalIdx(st.m,st.l);
if(gi>=364)return;
const nl=getMonthLesson(gi+1);
st.m=nl.m;st.l=nl.l;
renderLesson();
window.scrollTo(0,0);
}

function goPrev(){
const gi=getGlobalIdx(st.m,st.l);
if(gi<=0)return;
const nl=getMonthLesson(gi-1);
st.m=nl.m;st.l=nl.l;
renderLesson();
window.scrollTo(0,0);
}

// Resume from last position
const lastDone=Object.keys(prog).map(Number).sort((a,b)=>b-a)[0];
if(lastDone!==undefined&&lastDone<364){
const next=getMonthLesson(lastDone+1);
st.m=next.m;st.l=next.l;
}

render();
</script>
</body>
</html>
