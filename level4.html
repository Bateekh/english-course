<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI','Arial',sans-serif;background:#f0f4f8;min-height:100vh;color:#1e293b}
#app{max-width:500px;margin:0 auto;padding:0 0 80px 0}
header{background:linear-gradient(135deg,#e11d48,#fb7185);color:#fff;padding:20px;text-align:center;position:relative}
header h1{font-size:1.4rem;margin-bottom:4px}
header p{font-size:0.85rem;opacity:0.9}
.progress-bar{background:rgba(255,255,255,0.2);height:8px;border-radius:4px;margin-top:12px;overflow:hidden}
.progress-fill{background:#fbbf24;height:100%;border-radius:4px;transition:width 0.5s}
.progress-text{font-size:0.75rem;margin-top:4px;opacity:0.8}
.months{display:flex;overflow-x:auto;background:#fff;border-bottom:1px solid #e2e8f0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.months::-webkit-scrollbar{display:none}
.month-tab{flex-shrink:0;padding:12px 16px;font-size:0.8rem;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;color:#64748b;transition:all 0.2s}
.month-tab.active{color:#e11d48;border-bottom-color:#e11d48;font-weight:bold}
.month-tab .check{color:#16a34a;margin-right:4px}
.lesson-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;border-bottom:1px solid #e2e8f0}
.lesson-nav span{font-size:0.85rem;color:#64748b}
.lesson-dots{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;max-width:60%}
.dot{width:10px;height:10px;border-radius:50%;background:#e2e8f0;cursor:pointer;transition:all 0.2s}
.dot.done{background:#16a34a}
.dot.current{background:#e11d48;transform:scale(1.3)}
.card{background:#fff;margin:16px;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,0.08);overflow:hidden}
.card-header{padding:16px 20px 8px;display:flex;justify-content:space-between;align-items:center}
.day-num{font-size:0.8rem;color:#94a3b8}
.card-body{padding:8px 20px 20px}
.english-sentence{direction:ltr;text-align:left;font-size:1.2rem;line-height:1.6;color:#1e293b;padding:16px 0;font-weight:500;cursor:pointer;unicode-bidi:plaintext}
.english-sentence:active{color:#e11d48}
.word-mode{direction:ltr;text-align:left;display:flex;flex-wrap:wrap;gap:8px;padding:16px 0}
.word-btn{background:#fff1f2;color:#e11d48;border:1px solid #fecdd3;border-radius:8px;padding:8px 14px;font-size:1.1rem;cursor:pointer;transition:all 0.15s}
.word-btn:active{background:#e11d48;color:#fff}
.controls{display:flex;flex-wrap:wrap;gap:8px;padding:8px 0}
.btn{border:none;border-radius:10px;padding:10px 16px;font-size:0.85rem;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.15s;font-family:inherit}
.btn:active{transform:scale(0.96)}
.btn-listen{background:#fff1f2;color:#e11d48}
.btn-translate{background:#fdf2f8;color:#9d174d}
.btn-tip{background:#fef3c7;color:#92400e}
.btn-words{background:#f0fdf4;color:#166534}
.btn-complete{background:#16a34a;color:#fff;width:100%;justify-content:center;padding:12px;margin-top:8px;font-size:0.95rem}
.btn-complete.done{background:#e2e8f0;color:#64748b}
.translation{direction:rtl;text-align:right;background:#fdf2f8;padding:14px;border-radius:10px;margin-top:12px;font-size:1.05rem;line-height:1.8;color:#9d174d;display:none}
.translation.show{display:block}
.tip{direction:rtl;text-align:right;background:#fef3c7;padding:14px;border-radius:10px;margin-top:8px;font-size:0.9rem;line-height:1.8;color:#92400e;display:none}
.tip.show{display:block}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e2e8f0;display:flex;justify-content:space-between;padding:12px 20px;max-width:500px;margin:0 auto;z-index:10}
.nav-btn{background:#e11d48;color:#fff;border:none;border-radius:10px;padding:10px 24px;font-size:0.9rem;cursor:pointer;font-family:inherit}
.nav-btn:disabled{background:#e2e8f0;color:#94a3b8}
.nav-btn:active{background:#be123c}
.lesson-count{display:flex;align-items:center;font-size:0.85rem;color:#64748b}
.welcome{padding:30px 20px;text-align:center}
.welcome h2{font-size:1.5rem;margin-bottom:16px;color:#e11d48}
.welcome p{font-size:1rem;line-height:1.8;color:#475569;margin-bottom:12px}
.welcome .start-btn{background:#e11d48;color:#fff;border:none;border-radius:12px;padding:14px 32px;font-size:1.1rem;cursor:pointer;margin-top:20px;font-family:inherit}
.month-title{padding:12px 20px;font-size:0.85rem;color:#64748b;text-align:center;background:#f8fafc}
.gear-btn{position:absolute;left:16px;top:20px;background:none;border:none;color:#fff;font-size:1.4rem;cursor:pointer;opacity:0.85}
.backup-panel{background:#fff;margin:16px;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,0.08);padding:20px;display:none}
.backup-panel.show{display:block}
.backup-panel h3{font-size:1.1rem;margin-bottom:12px;color:#e11d48}
.backup-panel p{font-size:0.9rem;color:#475569;line-height:1.7;margin-bottom:12px}
.backup-panel textarea{width:100%;height:80px;border:1px solid #cbd5e1;border-radius:8px;padding:10px;font-size:0.85rem;font-family:monospace;direction:ltr;resize:none;margin-bottom:8px}
.backup-panel .bp-btn{background:#e11d48;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:0.9rem;cursor:pointer;margin-left:8px;font-family:inherit}
.backup-panel .bp-btn.restore{background:#16a34a}
.backup-panel .bp-btn.close{background:#94a3b8}
.bp-msg{font-size:0.85rem;margin-top:8px;padding:8px;border-radius:6px;display:none}
.bp-msg.ok{display:block;background:#f0fdf4;color:#166534}
.bp-msg.err{display:block;background:#fef2f2;color:#991b1b}
.level-badge{display:inline-block;background:rgba(255,255,255,0.2);padding:2px 10px;border-radius:12px;font-size:0.75rem;margin-bottom:4px}
</style>

const MS=[
{n:"الأزمنة المتقدمة",e:"Advanced Tenses & Grammar",c:31},
{n:"الجمل المعقدة",e:"Complex Sentences & Clauses",c:28},
{n:"إنجليزي الأعمال",e:"Business English",c:31},
{n:"اللغة الأكاديمية",e:"Academic Language",c:30},
{n:"علم النفس والمشاعر",e:"Psychology & Emotions",c:31},
{n:"البيئة والاستدامة",e:"Environment & Sustainability",c:30},
{n:"الفنون والترفيه",e:"Arts & Entertainment",c:31},
{n:"العلوم والابتكار",e:"Science & Innovation",c:31},
{n:"التاريخ والمجتمع",e:"History & Society",c:30},
{n:"الفلسفة والأخلاق",e:"Philosophy & Ethics",c:31},
{n:"تعابير متقدمة",e:"Advanced Idioms & Collocations",c:30},
{n:"محادثات الإتقان",e:"Mastery Conversations",c:31}
];
const L=[
// Month 1: Advanced Tenses & Grammar (31)
["By the time we arrive at the airport, they will have already been waiting for us for over three hours.","لوقت ما نوصل عالمطار، رح يكونوا مستنيينا من أكتر من تلات ساعات.","\"Will have been waiting\" = المستقبل التام المستمر. بيعبر عن مدة الانتظار."],
["She had been studying English for five years before she finally felt confident enough to speak with native speakers.","كانت تدرس إنجليزي من خمس سنين قبل ما أخيراً حست بثقة كافية تحكي مع أهل اللغة.","\"Had been studying\" = الماضي التام المستمر. فترة طويلة من الدراسة."],
["I have been meaning to call you all week, but every time I pick up the phone, something urgent comes up.","كنت ناوية أتصل فيكي كل الأسبوع، بس كل ما بمسك التلفون، بيطلع شي ضروري.","\"Have been meaning to\" = كنت ناوي. نية مستمرة ما تحققت."],
["Had I known about the traffic on the highway, I would have taken a completely different route to the office.","لو كنت بعرف عن الزحمة عالأوتوستراد، كنت أخذت طريق مختلف تماماً عالمكتب.","\"Had I known\" = لو كنت بعرف. شرط مقلوب بدون if. أسلوب رسمي."],
["The children will have finished all of their homework by the time their father gets home from work tonight.","الولاد رح يكونوا خلصوا كل وظائفهم لوقت ما يوصل أبوهم من الشغل الليلة.","\"Will have finished\" = المستقبل التام. حدث بيخلص قبل حدث تاني."],
["We have been living in this neighborhood for almost twelve years, and we still love it just as much as the first day.","صارلنا ساكنين بهالحي تقريباً اثنعش سنة، ولسا بنحبه قد ما حبيناه أول يوم.","\"Have been living\" = المضارع التام المستمر. فعل مستمر للحين."],
["Not only did she pass the exam with flying colors, but she also received the highest score in the entire class.","مش بس نجحت بالامتحان بتفوق، كمان أخذت أعلى علامة بالصف كله.","\"Not only...but also\" = مش بس...كمان. \"Flying colors\" = بتفوق."],
["If I had been paying closer attention to the road, the accident would never have happened in the first place.","لو كنت منتبهة أكتر عالطريق، الحادث ما كان صار أصلاً.","الشرط التالت المختلط: ندم عميق."],
["By next summer, my daughter will have been attending this school for six consecutive years without missing a single day.","بالصيف الجاي، بنتي رح يكون صارلها بهالمدرسة ست سنين متتالية بدون ما تغيب يوم.","\"Consecutive\" = متتالي. \"Without missing\" = بدون ما تغيب."],
["The government is reportedly considering implementing a new policy that would significantly affect small business owners.","الحكومة حسب التقارير عم بتفكر تطبق سياسة جديدة رح تأثر بشكل كبير على أصحاب الأعمال الصغيرة.","\"Reportedly\" = حسب التقارير. \"Implementing\" = تطبيق."],
["Rarely have I encountered someone who possesses such an extraordinary combination of intelligence, kindness, and humility.","نادراً ما قابلت حدا عنده مزيج استثنائي هيك من الذكاء والطيبة والتواضع.","\"Rarely have I\" = نادراً ما. جملة مقلوبة للتأكيد."],
["Were it not for the generous support of our community, we would never have been able to open this cultural center.","لولا الدعم الكريم من مجتمعنا، ما كنا قدرنا نفتح هالمركز الثقافي.","\"Were it not for\" = لولا. شرط مقلوب رسمي جداً."],
["She is said to have graduated from one of the most prestigious universities in the entire country several years ago.","بينقال إنها تخرجت من وحدة من أعرق الجامعات بالبلد كلها قبل عدة سنين.","\"Is said to have\" = بينقال إنها. مبني للمجهول + تام."],
["No sooner had we sat down for dinner than the phone started ringing with an emergency call from the hospital.","بالكاد قعدنا نتعشى لما التلفون بلش يرن بمكالمة طوارئ من المستشفى.","\"No sooner...than\" = بالكاد...لما. ربط زمني قوي."],
["The more I practice speaking English every day, the more natural and effortless it feels during real conversations.","كل ما بتمرن أحكي إنجليزي كل يوم، كل ما بصير أطبع وأسهل بالمحادثات الحقيقية.","\"The more...the more\" = كل ما...كل ما. تناسب طردي."],
["It is absolutely essential that every student submit their assignment before the deadline to avoid any grade penalties.","ضروري جداً إنو كل طالب يسلم وظيفته قبل الموعد النهائي ليتجنب أي خصم بالعلامات.","\"It is essential that...submit\" = subjunctive. لاحظي submit مش submits."],
["Having lived in both the Middle East and America, I can confidently say that each culture has its own unique beauty.","بعد ما عشت بالشرق الأوسط وأمريكا، بقدر أقول بثقة إنو كل ثقافة عندها جمالها الخاص.","\"Having lived\" = بعد ما عشت. اسم فاعل تام. بداية جملة معقدة."],
["Under no circumstances should you ever share your personal banking information with anyone over the phone or by email.","تحت أي ظرف ما لازم تشاركي معلومات حسابك البنكية مع حدا بالتلفون أو بالإيميل.","\"Under no circumstances\" = تحت أي ظرف لا. تحذير قوي."],
["The teacher insisted that all parents attend the mandatory meeting to discuss the new curriculum changes for next year.","المعلمة أصرت إنو كل الأهل يحضروا الاجتماع الإلزامي ليناقشوا تغييرات المنهاج الجديد للسنة الجاية.","\"Insisted that...attend\" = أصرت إنو يحضروا. subjunctive بعد insist."],
["Scarcely had the sun risen over the mountains when the entire village was already awake and bustling with morning activity.","بالكاد طلعت الشمس فوق الجبال لما كانت القرية كلها صاحية ومنشغلة بنشاط الصبح.","\"Scarcely...when\" = بالكاد...لما. وصف أدبي."],
["I wish I had taken the opportunity to travel more extensively before settling down and starting a family in my twenties.","يا ريت كنت استغليت الفرصة وسافرت أكتر قبل ما استقر وأبلش عيلة بالعشرينات.","\"I wish I had taken\" = يا ريت كنت. ندم بالشرط."],
["It would appear that the majority of participants in the study were significantly more productive when working from home.","يبدو إنو غالبية المشاركين بالدراسة كانوا أكتر إنتاجية بشكل كبير لما اشتغلوا من البيت.","\"It would appear that\" = يبدو إنو. تعبير أكاديمي حذر."],
["Never before in my entire life have I tasted food that was as incredibly delicious as the meal she prepared last night.","ما بحياتي كلها دقت أكل كان لذيذ بشكل لا يصدق متل العشا اللي حضرته البارحة.","\"Never before have I\" = ما بحياتي. انقلاب للتأكيد."],
["The project, which had been delayed multiple times due to unexpected budget constraints, was finally completed ahead of schedule.","المشروع اللي تأخر عدة مرات بسبب قيود ميزانية غير متوقعة، أخيراً خلص قبل الموعد.","\"Ahead of schedule\" = قبل الموعد. عكس behind schedule."],
["Provided that all the necessary documents are submitted on time, your visa application should be processed within three weeks.","بشرط إنو كل الأوراق المطلوبة تنسلم بوقتها، طلب الفيزا لازم ينعالج خلال تلات أسابيع.","\"Provided that\" = بشرط إنو. شرط رسمي."],
["She would rather spend her weekends volunteering at the local community center than waste her precious time watching television.","بتفضل تقضي ويكنداتها تتطوع بمركز المجتمع المحلي على ما تضيع وقتها الثمين بمشاهدة التلفزيون.","\"Would rather...than\" = بتفضل...على ما. مقارنة تفضيلية."],
["It is high time that we started taking climate change more seriously and implementing sustainable practices in our daily lives.","صار الوقت إنو نبلش ناخد تغير المناخ بجدية أكتر ونطبق ممارسات مستدامة بحياتنا اليومية.","\"It is high time that\" = صار الوقت. بتطلب past tense بعدها."],
["Supposing you were offered a dream job in another state, would you be willing to relocate your entire family overnight?","لو انعرض عليكي شغل الأحلام بولاية تانية، بتكوني مستعدة تنتقلي بكل عيلتك بليلة؟","\"Supposing\" = لو. طريقة تانية لصياغة الشرط."],
["Only after she had thoroughly reviewed every single page of the contract did she feel comfortable enough to sign it.","بس بعد ما راجعت كل صفحة من العقد بدقة حست براحة كافية تمضيه.","\"Only after...did she\" = انقلاب. الفعل بيجي قبل الفاعل."],
["As much as I would love to join you for dinner this evening, I am afraid I have a prior commitment that I cannot cancel.","مع إني كتير بحب أنضم إلكم على العشا الليلة، بخاف عندي التزام سابق ما بقدر ألغيه.","\"Prior commitment\" = التزام سابق. رفض مهذب جداً."],
["Had she not decided to pursue her education despite all the obstacles, she would not be the successful woman she is today.","لو ما كانت قررت تكمل تعليمها رغم كل العقبات، ما كانت المرا الناجحة اللي هي اليوم.","\"Had she not\" = لو ما كانت. شرط مقلوب عن الماضي."],
// Month 2: Complex Sentences & Clauses (28)
["The woman whose daughter won the national spelling bee competition was so proud that she could barely hold back her tears.","المرا اللي بنتها ربحت مسابقة الإملاء الوطنية كانت فخورة لدرجة بالكاد قدرت تمسك دموعها.","\"Whose\" = اللي + تبعها. ضمير وصل للملكية."],
["The reason why so many immigrants succeed in America is that they bring with them an incredible work ethic and determination.","السبب ليش كتير مهاجرين بينجحوا بأمريكا هو إنهم بيجيبوا معهم أخلاقيات عمل وعزيمة لا تصدق.","\"Work ethic\" = أخلاقيات عمل. \"Determination\" = عزيمة."],
["What surprised me the most about living in America was how friendly and welcoming our neighbors turned out to be.","اللي فاجأني أكتر شي عن العيش بأمريكا هو قديش طلعوا جيراننا ودودين ومرحبين.","\"What surprised me\" = اللي فاجأني. جملة اسمية كفاعل."],
["The city in which I grew up, although relatively small and quiet, provided me with memories that I will cherish forever.","المدينة اللي كبرت فيها، مع إنها صغيرة وهادية نسبياً، عطتني ذكريات رح أعتز فيها للأبد.","\"In which\" = اللي فيها. \"Cherish\" = أعتز."],
["Whoever said that learning a new language as an adult is impossible clearly never met anyone as determined as you are.","مين ما قال إنو تعلم لغة جديدة كبالغ مستحيل، أكيد ما قابل حدا مصمم مثلك.","\"Whoever said\" = مين ما قال. ضمير وصل حر."],
["Not until I moved to a foreign country did I truly realize how much I had taken my own culture for granted.","ما أدركت فعلاً قديش كنت آخذ ثقافتي كشي مسلم فيه إلا لما انتقلت لبلد أجنبي.","\"Taken for granted\" = أخذ كشي مسلم فيه. تعبير مهم."],
["The fact that she managed to raise four children while simultaneously earning her college degree is truly remarkable.","إنها قدرت تربي أربع ولاد وبنفس الوقت تحصل على شهادتها الجامعية هاد شي مذهل فعلاً.","\"The fact that\" = إنو. \"Simultaneously\" = بنفس الوقت."],
["Although the job offer came with an attractive salary and excellent benefits, she ultimately decided to decline it for personal reasons.","مع إنو عرض الشغل إجا بمعاش مغري ومزايا ممتازة، بالنهاية قررت ترفضه لأسباب شخصية.","\"Ultimately\" = بالنهاية. \"Decline\" = ترفض بأدب."],
["The neighborhood where we currently live is considerably safer and more family-friendly than the one we moved from five years ago.","الحي اللي حالياً ساكنين فيه أأمن بكتير وأنسب للعائلات من اللي انتقلنا منه قبل خمس سنين.","\"Considerably\" = بكتير. \"Currently\" = حالياً."],
["Whatever decision you ultimately make regarding your career, just remember that your family will always support you no matter what.","أي قرار بتاخديه بالنهاية بخصوص مهنتك، بس تذكري إنو عيلتك رح يدعموكي مهما كان.","\"Whatever decision\" = أي قرار. \"No matter what\" = مهما كان."],
["The teacher whom my children absolutely adore has been nominated for the prestigious Teacher of the Year award this year.","المعلمة اللي ولادي بيعشقوها ترشحت لجائزة معلم السنة المرموقة هالسنة.","\"Whom\" = اللي. ضمير وصل مفعول به. \"Prestigious\" = مرموق."],
["It was not until she started working alongside people from different cultural backgrounds that she truly began to appreciate diversity.","ما بلشت تقدر التنوع فعلاً إلا لما صارت تشتغل مع ناس من خلفيات ثقافية مختلفة.","\"It was not until...that\" = ما...إلا لما. تركيبة تأكيدية."],
["The documentary, which we watched together as a family last weekend, opened our eyes to many issues we had never considered before.","الفيلم الوثائقي اللي تفرجنا عليه سوا كعيلة الويكند الماضي فتح عيوننا على قضايا ما فكرنا فيها قبل.","الجملة الوصلية غير المحددة: بين فواصل. بتعطي معلومة إضافية."],
["What I find most fascinating about American culture is the way people from entirely different backgrounds manage to coexist so peacefully.","اللي بلاقيه أكتر شي ملفت بالثقافة الأمريكية هو كيف ناس من خلفيات مختلفة تماماً بيقدروا يتعايشوا بسلام.","\"Coexist\" = يتعايشوا. \"Fascinating\" = ملفت."],
["The house that we eventually bought after months of searching was everything we had ever dreamed of and so much more.","البيت اللي بالنهاية اشتريناه بعد أشهر من البحث كان كل شي حلمنا فيه وأكتر بكتير.","\"Eventually\" = بالنهاية. \"Everything we had dreamed of\" = كل شي حلمنا فيه."],
["Regardless of whether you choose to continue your education or enter the workforce directly, the most important thing is to stay motivated.","بغض النظر إذا اخترتي تكملي تعليمك أو تدخلي سوق العمل مباشرة، أهم شي تضلي محفزة.","\"Regardless of whether\" = بغض النظر إذا."],
["The lawyer to whom we were referred by a trusted friend turned out to be incredibly knowledgeable and genuinely compassionate.","المحامي اللي حولونا عليه من صاحب موثوق طلع ذكي بشكل لا يصدق ورحيم بصدق.","\"To whom we were referred\" = اللي حولونا عليه. رسمي جداً."],
