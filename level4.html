["The conference keynote speaker eloquently articulated the urgent need for greater investment in public education at both the state and federal levels.","المتحدث الرئيسي بالمؤتمر عبّر ببلاغة عن الحاجة الملحة لاستثمار أكبر بالتعليم العام على مستوى الولاية والمستوى الفيدرالي.","\"Keynote speaker\" = المتحدث الرئيسي. \"Eloquently\" = ببلاغة."],
["Whereas previous models of language learning emphasized rote memorization, contemporary approaches prioritize communicative competence and meaningful interaction.","بينما نماذج تعلم اللغة السابقة أكدت على الحفظ الآلي، المناهج المعاصرة بتعطي أولوية للكفاءة التواصلية والتفاعل ذو المعنى.","\"Rote memorization\" = الحفظ الآلي. \"Communicative competence\" = الكفاءة التواصلية."],
["The ethical considerations involved in conducting research with vulnerable populations require careful attention and strict adherence to established guidelines.","الاعتبارات الأخلاقية المتعلقة بإجراء أبحاث مع فئات ضعيفة بتتطلب اهتمام دقيق والتزام صارم بالإرشادات المعتمدة.","\"Ethical considerations\" = اعتبارات أخلاقية. \"Vulnerable populations\" = فئات ضعيفة."],
["The interdisciplinary nature of this research allows for a more comprehensive and multifaceted analysis of the complex issues under investigation.","الطبيعة متعددة التخصصات لهالبحث بتسمح بتحليل أشمل ومتعدد الجوانب للقضايا المعقدة قيد البحث.","\"Interdisciplinary\" = متعدد التخصصات. \"Multifaceted\" = متعدد الجوانب."],
["Ultimately, the goal of academic inquiry is not merely to accumulate knowledge but to apply that knowledge in ways that meaningfully benefit society.","بالنهاية، هدف البحث الأكاديمي مش بس تجميع المعرفة بل تطبيق هالمعرفة بطرق تفيد المجتمع بشكل مؤثر.","\"Academic inquiry\" = البحث الأكاديمي. \"Meaningfully benefit\" = تفيد بشكل مؤثر."],
["The annotated bibliography at the end of this chapter provides readers with a curated selection of the most influential works published on this topic.","قائمة المراجع المشروحة بنهاية هالفصل بتوفر للقراء مجموعة منتقاة من أكتر الأعمال تأثيراً المنشورة عن هالموضوع.","\"Annotated bibliography\" = قائمة مراجع مشروحة. \"Curated\" = منتقاة."],
["The peer review process, though sometimes lengthy and demanding, is essential for maintaining the credibility and rigor of published scientific research.","عملية التحكيم، مع إنها أحياناً طويلة ومتطلبة، ضرورية للحفاظ على مصداقية وصرامة البحث العلمي المنشور.","\"Peer review\" = التحكيم. \"Credibility\" = مصداقية. \"Rigor\" = صرامة."],
["The student's thesis presents a compelling and well-substantiated argument that challenges several long-held assumptions within the field of sociolinguistics.","أطروحة الطالبة بتقدم حجة مقنعة ومدعومة بتتحدى عدة افتراضات قديمة بمجال علم اللغة الاجتماعي.","\"Well-substantiated\" = مدعومة بأدلة. \"Sociolinguistics\" = علم اللغة الاجتماعي."],
["Through meticulous data analysis and thoughtful interpretation, the researchers were able to identify several previously unrecognized patterns in the collected data.","من خلال تحليل بيانات دقيق وتفسير مدروس، الباحثين قدروا يحددوا عدة أنماط ما كانت معروفة سابقاً بالبيانات المجموعة.","\"Meticulous\" = دقيق جداً. \"Previously unrecognized\" = ما كانت معروفة سابقاً."],
["The symposium brought together leading experts from around the world to share their latest findings and collaborate on innovative solutions to pressing global challenges.","الندوة جمعت خبراء بارزين من حول العالم ليشاركوا أحدث نتائجهم ويتعاونوا على حلول مبتكرة لتحديات عالمية ملحة.","\"Symposium\" = ندوة. \"Pressing challenges\" = تحديات ملحة."],
["A comprehensive understanding of the historical context is absolutely indispensable for anyone attempting to critically analyze contemporary social and political phenomena.","فهم شامل للسياق التاريخي ضروري جداً لأي حدا بيحاول يحلل بشكل نقدي الظواهر الاجتماعية والسياسية المعاصرة.","\"Indispensable\" = لا غنى عنه. \"Phenomena\" = ظواهر (جمع phenomenon)."],
// Month 5: Psychology & Emotions (31)
["Emotional intelligence, which involves the ability to recognize, understand, and manage our own emotions, is just as important as academic intelligence.","الذكاء العاطفي اللي بيتضمن القدرة على التعرف على مشاعرنا وفهمها وإدارتها، مهم قد الذكاء الأكاديمي.","\"Emotional intelligence\" = الذكاء العاطفي. مفهوم أساسي بعلم النفس."],
["Setting healthy boundaries in your relationships is not a sign of selfishness; it is actually an essential act of self-preservation and self-respect.","وضع حدود صحية بعلاقاتك مش علامة أنانية؛ هو فعلاً فعل ضروري للحفاظ على الذات واحترام النفس.","\"Boundaries\" = حدود. \"Self-preservation\" = الحفاظ على الذات."],
["The way we talk to ourselves inside our own heads has a profound and lasting impact on our mental health and overall well-being.","الطريقة اللي بنحكي فيها مع حالنا جوا رؤوسنا عندها تأثير عميق ودائم على صحتنا النفسية ورفاهيتنا العامة.","\"Self-talk\" = الحديث الداخلي. \"Profound impact\" = تأثير عميق."],
["Experiencing feelings of homesickness and cultural displacement is a perfectly natural and expected response to the enormous challenge of immigration.","الإحساس بالحنين للوطن والتهجير الثقافي هو ردة فعل طبيعية تماماً ومتوقعة على تحدي الهجرة الهائل.","\"Homesickness\" = الحنين للوطن. \"Cultural displacement\" = التهجير الثقافي."],
["Research consistently demonstrates that practicing mindfulness and gratitude on a regular basis can significantly reduce symptoms of anxiety and depression.","الأبحاث بتبيّن باستمرار إنو ممارسة الوعي الذهني والامتنان بانتظام بيقدر يقلل بشكل كبير أعراض القلق والاكتئاب.","\"Mindfulness\" = الوعي الذهني. \"Gratitude\" = الامتنان."],
["It takes tremendous courage to ask for help when you are struggling, and seeking professional support is a sign of incredible strength, not weakness.","بياخد شجاعة هائلة تطلبي مساعدة لما تكوني عم تعاني، وطلب الدعم المهني علامة قوة لا تصدق مش ضعف.","\"Seeking professional support\" = طلب الدعم المهني. رسالة مهمة."],
["Children who grow up in emotionally supportive environments tend to develop stronger coping mechanisms and greater resilience when facing life's inevitable challenges.","الأطفال اللي بيكبروا ببيئات داعمة عاطفياً بيميلوا يطوروا آليات تأقلم أقوى ومرونة أكبر لما بيواجهوا تحديات الحياة الحتمية.","\"Coping mechanisms\" = آليات تأقلم. \"Resilience\" = مرونة/صمود."],
["The phenomenon known as imposter syndrome, which makes accomplished individuals doubt their own abilities, affects people from all walks of life.","ظاهرة متلازمة المحتال اللي بتخلي أشخاص ناجحين يشكوا بقدراتهم بتأثر على ناس من كل مناحي الحياة.","\"Imposter syndrome\" = متلازمة المحتال. \"All walks of life\" = كل مناحي الحياة."],
["Learning to sit with uncomfortable emotions rather than immediately trying to suppress or avoid them is a crucial step toward genuine emotional maturity.","تعلم إنك تقعدي مع مشاعر مزعجة بدل ما تحاولي فوراً تكبتيها أو تتجنبيها خطوة مهمة نحو النضج العاطفي الحقيقي.","\"Suppress\" = تكبت. \"Emotional maturity\" = النضج العاطفي."],
["The bond between a mother and her children is one of the most psychologically complex and profoundly meaningful relationships in all of human experience.","الرابطة بين الأم وأولادها هي من أكتر العلاقات تعقيداً نفسياً وعمقاً بمعناها بكل التجربة الإنسانية.","\"Bond\" = رابطة. \"Psychologically complex\" = معقدة نفسياً."],
["Cognitive behavioral therapy, commonly known as CBT, has been proven to be highly effective in treating a wide range of mental health conditions.","العلاج السلوكي المعرفي المعروف بـ CBT ثبت إنه فعال جداً بعلاج مجموعة واسعة من حالات الصحة النفسية.","\"Cognitive behavioral therapy\" = العلاج السلوكي المعرفي."],
["The ability to empathize with others, to truly put yourself in someone else's shoes, is perhaps the single most important social skill one can develop.","القدرة على التعاطف مع الآخرين، إنك فعلاً تحطي حالك مكان حدا تاني، يمكن أهم مهارة اجتماعية ممكن تطوريها.","\"Put yourself in someone's shoes\" = حط حالك مكان حدا تاني."],
["Attachment theory suggests that the quality of the early bond between an infant and their primary caregiver shapes their relationship patterns throughout life.","نظرية التعلق بتقترح إنو جودة الرابطة المبكرة بين الرضيع ومقدم الرعاية الأساسي بتشكل أنماط علاقاتهم طول الحياة.","\"Attachment theory\" = نظرية التعلق. \"Caregiver\" = مقدم الرعاية."],
["It is perfectly normal to feel overwhelmed when navigating a new culture, and giving yourself permission to rest and recharge is not laziness but wisdom.","طبيعي تماماً تحسي بالإرهاق لما تتأقلمي مع ثقافة جديدة، وتسمحي لحالك ترتاحي وتشحني طاقتك مش كسل بل حكمة.","\"Overwhelmed\" = مرهقة. \"Recharge\" = تشحن الطاقة."],
["Psychologists have found that people who regularly express gratitude and practice acts of kindness report significantly higher levels of life satisfaction.","علماء النفس لقوا إنو الناس اللي بيعبروا عن الامتنان بانتظام وبيمارسوا أعمال الطيبة بيبلغوا عن مستويات أعلى بكتير من الرضا عن الحياة.","\"Life satisfaction\" = الرضا عن الحياة."],
["The process of grief is not linear; it involves a series of emotional waves that come and go with varying intensity over an extended period.","عملية الحزن مش خطية؛ بتتضمن سلسلة موجات عاطفية بتيجي وبتروح بشدة متفاوتة على فترة ممتدة.","\"Grief\" = الحزن. \"Linear\" = خطي. \"Waves\" = موجات."],
["Developing a growth mindset, the belief that abilities can be developed through dedication and effort, fundamentally transforms how we approach challenges.","تطوير عقلية النمو، الإيمان بأنو القدرات ممكن تتطور من خلال التفاني والجهد، بيغير بشكل جذري كيف بنتعامل مع التحديات.","\"Growth mindset\" = عقلية النمو. مقابلها fixed mindset."],
["Self-compassion involves treating yourself with the same kindness, understanding, and forgiveness that you would naturally extend to a beloved close friend.","التعاطف مع الذات بيتضمن إنك تعاملي حالك بنفس الطيبة والتفهم والمسامحة اللي طبيعياً بتمديها لصديقة قريبة عزيزة.","\"Self-compassion\" = التعاطف مع الذات."],
["The transition from adolescence to adulthood involves navigating complex emotional terrain that can be confusing, exciting, and terrifying all at once.","الانتقال من المراهقة للبلوغ بيتضمن التنقل بتضاريس عاطفية معقدة ممكن تكون محيرة ومثيرة ومخيفة بنفس الوقت.","\"Adolescence\" = المراهقة. \"Terrain\" = تضاريس."],
["Healthy communication in relationships requires active listening, honest self-expression, and a genuine willingness to understand the other person's perspective.","التواصل الصحي بالعلاقات بيتطلب إصغاء فعّال وتعبير صادق عن الذات واستعداد حقيقي لفهم وجهة نظر الشخص التاني.","\"Active listening\" = الإصغاء الفعّال."],
["The psychological impact of constantly comparing yourself to others on social media can lead to diminished self-esteem and increased feelings of inadequacy.","التأثير النفسي لمقارنة حالك بغيرك باستمرار على السوشال ميديا ممكن يؤدي لتراجع تقدير الذات وزيادة الإحساس بعدم الكفاية.","\"Self-esteem\" = تقدير الذات. \"Inadequacy\" = عدم الكفاية."],
["Forgiveness does not mean condoning harmful behavior; rather, it means liberating yourself from the heavy emotional burden of carrying resentment and bitterness.","المسامحة ما بتعني القبول بالتصرف المؤذي؛ بل بتعني تحرير حالك من العبء العاطفي الثقيل لحمل الحقد والمرارة.","\"Condoning\" = القبول بـ. \"Resentment\" = حقد. \"Bitterness\" = مرارة."],
["Understanding that perfection is an impossible and ultimately destructive standard to hold yourself to is one of the most liberating realizations you can have.","فهم إنو الكمال معيار مستحيل ومدمر بالنهاية تحطيه على حالك هو من أكتر الإدراكات المحررة اللي ممكن توصليلها.","\"Liberating\" = محرر. \"Destructive standard\" = معيار مدمر."],
["The way parents model emotional regulation in front of their children directly influences how those children learn to handle their own feelings as they grow.","الطريقة اللي الأهل بيمثلوا فيها تنظيم المشاعر قدام أولادهم بتأثر مباشرة على كيف هالأولاد بيتعلموا يتعاملوا مع مشاعرهم وهم عم يكبروا.","\"Model\" (فعل) = يمثل/يكون قدوة. \"Emotional regulation\" = تنظيم المشاعر."],
["Journaling has been scientifically shown to be a remarkably effective tool for processing complex emotions and gaining clarity during periods of personal uncertainty.","كتابة اليوميات ثبت علمياً إنها أداة فعالة بشكل ملحوظ لمعالجة المشاعر المعقدة واكتساب وضوح خلال فترات عدم اليقين الشخصي.","\"Journaling\" = كتابة اليوميات. \"Gaining clarity\" = اكتساب وضوح."],
["The courage to be vulnerable with the people you trust is not a sign of weakness but rather the very foundation upon which deep and authentic connections are built.","الشجاعة إنك تكوني ضعيفة مع الناس اللي بتوثقي فيهم مش علامة ضعف بل هي الأساس اللي بتنبني عليه العلاقات العميقة والأصيلة.","\"Vulnerability\" = الضعف/الانكشاف. مفهوم مهم."],
["Cultural identity is not something fixed and unchangeable; it is a dynamic and evolving aspect of who we are that grows richer with every new experience.","الهوية الثقافية مش شي ثابت وما بيتغير؛ هي جانب ديناميكي ومتطور من مين إحنا بيصير أغنى مع كل تجربة جديدة.","\"Dynamic\" = ديناميكي. \"Evolving\" = متطور."],
["Sometimes the bravest thing you can do is to admit that you do not have all the answers and that you are still figuring things out.","أحياناً أشجع شي ممكن تعمليه هو تعترفي إنك ما عندك كل الأجوبة وإنك لسا عم تفهمي الأمور.","\"Figuring things out\" = عم تفهم الأمور. \"Bravest\" = أشجع."],
["The relationship between physical health and mental well-being is deeply interconnected, and neglecting one inevitably has consequences for the other.","العلاقة بين الصحة الجسدية والصحة النفسية مترابطة بعمق، وإهمال وحدة حتماً عنده عواقب على التانية.","\"Interconnected\" = مترابطة. \"Inevitably\" = حتماً."],
["True emotional healing is not about forgetting painful experiences but about integrating them into your life story in a way that promotes growth and understanding.","الشفاء العاطفي الحقيقي مش عن نسيان التجارب المؤلمة بل عن دمجها بقصة حياتك بطريقة بتعزز النمو والفهم.","\"Emotional healing\" = الشفاء العاطفي. \"Integrating\" = دمج."],
["Every emotion you experience, whether pleasant or painful, carries valuable information about your needs, values, and the boundaries that matter most to you.","كل عاطفة بتعيشيها، سواء حلوة أو مؤلمة، بتحمل معلومات قيّمة عن احتياجاتك وقيمك والحدود اللي بتهمك أكتر شي.","\"Carries valuable information\" = بتحمل معلومات قيّمة."],
// Month 6: Environment & Sustainability (30)
["Climate change is arguably the most pressing global challenge of our generation, and its consequences will be felt for centuries to come.","تغير المناخ يمكن أكبر تحدي عالمي لجيلنا، وعواقبه رح تنحس لقرون جاية.","\"Pressing\" = ملح. \"Consequences\" = عواقب."],
["Reducing our carbon footprint requires a fundamental shift in the way we think about energy consumption, transportation, and everyday lifestyle choices.","تقليل بصمتنا الكربونية بيتطلب تحول جذري بطريقة تفكيرنا باستهلاك الطاقة والنقل وخيارات الحياة اليومية.","\"Carbon footprint\" = البصمة الكربونية. \"Fundamental shift\" = تحول جذري."],
["Renewable energy sources such as solar, wind, and hydroelectric power have become increasingly cost-effective and widely accessible in recent years.","مصادر الطاقة المتجددة مثل الشمسية والرياح والطاقة الكهرومائية صارت أكتر فعالية من حيث التكلفة ومتاحة بالسنوات الأخيرة.","\"Renewable energy\" = الطاقة المتجددة. \"Cost-effective\" = فعال من حيث التكلفة."],
["The alarming rate at which plastic waste is accumulating in our oceans poses a severe threat to marine ecosystems and biodiversity worldwide.","المعدل المقلق اللي النفايات البلاستيكية عم تتراكم فيه بمحيطاتنا بيشكل تهديد خطير للأنظمة البيئية البحرية والتنوع البيولوجي عالمياً.","\"Accumulating\" = تتراكم. \"Marine ecosystems\" = الأنظمة البيئية البحرية."],
["Sustainable agriculture practices that prioritize soil health and minimize chemical pesticide use are essential for ensuring long-term global food security.","ممارسات الزراعة المستدامة اللي بتعطي أولوية لصحة التربة وتقلل استخدام المبيدات الكيماوية ضرورية لضمان الأمن الغذائي العالمي على المدى الطويل.","\"Sustainable agriculture\" = الزراعة المستدامة. \"Food security\" = الأمن الغذائي."],
["Many communities are now implementing comprehensive recycling programs and zero-waste initiatives to drastically reduce the amount of garbage sent to landfills.","مجتمعات كتيرة هلق عم تطبق برامج إعادة تدوير شاملة ومبادرات صفر نفايات لتقليل كمية الزبالة المرسلة للمكبات بشكل كبير.","\"Zero-waste\" = صفر نفايات. \"Landfills\" = مكبات النفايات."],
["Deforestation in tropical regions continues at an alarming pace, destroying critical habitats and releasing enormous quantities of stored carbon into the atmosphere.","إزالة الغابات بالمناطق الاستوائية مستمرة بوتيرة مقلقة، بتدمر مواطن حيوية وبتطلق كميات هائلة من الكربون المخزن بالغلاف الجوي.","\"Deforestation\" = إزالة الغابات. \"Habitats\" = مواطن طبيعية."],
["Individual actions like using reusable bags, conserving water, and choosing public transportation can collectively make a significant environmental difference.","التصرفات الفردية مثل استعمال أكياس قابلة لإعادة الاستخدام وتوفير المياه واختيار النقل العام ممكن تعمل فرق بيئي كبير مجتمعة.","\"Collectively\" = مجتمعة. \"Reusable\" = قابل لإعادة الاستخدام."],
["The transition to electric vehicles is accelerating rapidly, driven by advances in battery technology and growing consumer awareness of environmental responsibility.","الانتقال للسيارات الكهربائية عم يتسارع بسرعة، مدفوع بتقدم تكنولوجيا البطاريات ووعي المستهلكين المتزايد بالمسؤولية البيئية.","\"Electric vehicles\" = سيارات كهربائية. \"Accelerating\" = يتسارع."],
["Water scarcity is projected to become one of the most critical issues facing humanity in the coming decades, particularly in arid and semi-arid regions.","شح المياه متوقع يصير من أكتر القضايا الحرجة اللي بتواجه البشرية بالعقود الجاية، خصوصاً بالمناطق الجافة وشبه الجافة.","\"Water scarcity\" = شح المياه. \"Arid\" = جاف."],
["Green building practices that incorporate energy-efficient design and sustainable materials are becoming the new standard in modern residential and commercial construction.","ممارسات البناء الأخضر اللي بتتضمن تصميم موفر للطاقة ومواد مستدامة عم تصير المعيار الجديد بالبناء السكني والتجاري الحديث.","\"Green building\" = البناء الأخضر. \"Energy-efficient\" = موفر للطاقة."],
["The biodiversity crisis, often overshadowed by climate change in public discourse, poses an equally existential threat to the stability of our planet's ecosystems.","أزمة التنوع البيولوجي اللي غالباً بتتغطى عليها أزمة المناخ بالنقاش العام، بتشكل تهديد وجودي بنفس الدرجة لاستقرار أنظمة كوكبنا البيئية.","\"Overshadowed\" = بتتغطى عليها. \"Existential threat\" = تهديد وجودي."],
["Teaching children about environmental stewardship from an early age instills a sense of responsibility and empowers them to become advocates for positive change.","تعليم الأطفال عن الوصاية البيئية من عمر صغير بيغرس فيهم إحساس بالمسؤولية وبيمكنهم يصيروا مناصرين للتغيير الإيجابي.","\"Stewardship\" = وصاية/رعاية. \"Advocates\" = مناصرين."],
["Urban gardens and community farming projects are transforming neglected city spaces into vibrant green areas that provide fresh food and foster neighborhood connections.","الحدائق الحضرية ومشاريع الزراعة المجتمعية عم تحول مساحات المدينة المهملة لمناطق خضراء نابضة بالحياة بتوفر أكل طازج وبتعزز روابط الجيرة.","\"Urban gardens\" = حدائق حضرية. \"Foster\" = تعزز."],
["The fashion industry's enormous environmental footprint has sparked a growing movement toward ethical and sustainable clothing choices among conscious consumers.","البصمة البيئية الهائلة لصناعة الأزياء أشعلت حركة متنامية نحو خيارات ملابس أخلاقية ومستدامة بين المستهلكين الواعيين.","\"Ethical\" = أخلاقي. \"Conscious consumers\" = مستهلكين واعيين."],
["Scientists warn that if we do not take immediate and decisive action to reduce greenhouse gas emissions, the consequences will be catastrophic and irreversible.","العلماء بيحذروا إنو إذا ما أخذنا إجراء فوري وحاسم لتقليل انبعاثات غازات الدفيئة، العواقب رح تكون كارثية وغير قابلة للعكس.","\"Greenhouse gas emissions\" = انبعاثات غازات الدفيئة. \"Irreversible\" = غير قابل للعكس."],
["Composting food waste at home is a simple yet remarkably effective way to reduce methane emissions and create nutrient-rich soil for your garden.","تحويل بقايا الأكل لسماد بالبيت طريقة بسيطة بس فعالة بشكل ملحوظ لتقليل انبعاثات الميثان وخلق تربة غنية بالعناصر الغذائية لحديقتك.","\"Composting\" = تسميد/كومبوست. \"Methane\" = ميثان."],
["The concept of a circular economy, where products are designed to be reused, repaired, and recycled, challenges the traditional linear model of production and disposal.","مفهوم الاقتصاد الدائري حيث المنتجات بتتصمم ليتم إعادة استخدامها وإصلاحها وتدويرها، بيتحدى النموذج الخطي التقليدي للإنتاج والتخلص.","\"Circular economy\" = الاقتصاد الدائري."],
["Protecting endangered species requires international cooperation and a shared commitment to preserving the delicate balance of our interconnected natural world.","حماية الأنواع المهددة بالانقراض بتتطلب تعاون دولي والتزام مشترك بالحفاظ على التوازن الدقيق لعالمنا الطبيعي المترابط.","\"Endangered species\" = أنواع مهددة بالانقراض. \"Delicate balance\" = توازن دقيق."],
["Every purchase we make is essentially a vote for the kind of world we want to live in, and choosing sustainable products sends a powerful message.","كل عملية شراء بنعملها هي بالأساس تصويت للعالم اللي بدنا نعيش فيه، واختيار المنتجات المستدامة بيبعت رسالة قوية.","\"Vote\" هون = تصويت مجازي. رسالة ملهمة."],
["The environmental movement has evolved from small grassroots activism into a global force that influences government policy, corporate behavior, and consumer habits.","الحركة البيئية تطورت من نشاط شعبي صغير لقوة عالمية بتأثر على سياسة الحكومة وسلوك الشركات وعادات المستهلكين.","\"Grassroots activism\" = نشاط شعبي. \"Evolved\" = تطورت."],
["Investing in clean energy infrastructure today is not just an environmental imperative but also a sound economic strategy that creates millions of new jobs.","الاستثمار ببنية تحتية للطاقة النظيفة اليوم مش بس ضرورة بيئية بل كمان استراتيجية اقتصادية سليمة بتخلق ملايين الوظائف الجديدة.","\"Infrastructure\" = بنية تحتية. \"Imperative\" = ضرورة حتمية."],
["The interconnection between environmental health and public health is becoming increasingly apparent as air pollution and extreme weather events affect communities worldwide.","الترابط بين الصحة البيئية والصحة العامة عم يصير أوضح كل ما التلوث الهوائي وأحداث الطقس المتطرفة بتأثر على مجتمعات حول العالم.","\"Interconnection\" = ترابط. \"Extreme weather events\" = أحداث طقس متطرفة."],
["Future generations will judge us not by the wealth we accumulated but by the condition of the planet we left behind for them to inherit.","الأجيال الجاية رح يحكموا علينا مش بالثروة اللي جمعناها بل بحالة الكوكب اللي تركناه وراءنا ليورثوه.","\"Inherit\" = يورث. رسالة قوية عن المسؤولية."],
["The ocean, which covers more than seventy percent of our planet's surface, plays a critical role in regulating global temperatures and supporting an astonishing diversity of marine life.","المحيط اللي بيغطي أكتر من سبعين بالمية من سطح كوكبنا بيلعب دور حاسم بتنظيم درجات الحرارة العالمية ودعم تنوع مذهل من الحياة البحرية.","\"Regulating\" = تنظيم. \"Marine life\" = الحياة البحرية."],
["Local farmers markets are experiencing a remarkable resurgence in popularity as consumers increasingly prioritize fresh, locally sourced, and organically grown produce.","أسواق المزارعين المحلية عم تعيش عودة ملحوظة بالشعبية كل ما المستهلكين بيعطوا أولوية أكتر لمنتجات طازجة ومحلية ومزروعة عضوياً.","\"Farmers markets\" = أسواق المزارعين. \"Organically grown\" = مزروع عضوياً."],
["The alarming decline in bee populations worldwide threatens not only honey production but the entire global food supply chain that depends on pollination.","التراجع المقلق بأعداد النحل عالمياً بيهدد مش بس إنتاج العسل بل كل سلسلة الإمداد الغذائي العالمية اللي بتعتمد على التلقيح.","\"Pollination\" = التلقيح. النحل ضروري لغذائنا!"],
["Responsible ecotourism, when properly managed and regulated, can provide both economic benefits to local communities and powerful incentives for preserving natural habitats and endangered wildlife.","السياحة البيئية المسؤولة لما تُدار وتُنظم بشكل صحيح ممكن توفر فوائد اقتصادية للمجتمعات المحلية وحوافز قوية للحفاظ على المواطن الطبيعية والحياة البرية المهددة.","\"Ecotourism\" = السياحة البيئية. \"Incentives\" = حوافز."],
["The philosophy of minimalism, which encourages consuming less and focusing on experiences rather than material possessions, aligns naturally with environmental sustainability goals.","فلسفة التقليلية اللي بتشجع على استهلاك أقل والتركيز على التجارب بدل الممتلكات المادية بتتوافق طبيعياً مع أهداف الاستدامة البيئية.","\"Minimalism\" = التقليلية. أقل = أكتر."],
["Educating consumers about the true environmental cost of fast fashion, including water pollution and textile waste, is essential for driving meaningful change in the clothing industry.","تعليم المستهلكين عن التكلفة البيئية الحقيقية للأزياء السريعة بما فيه تلوث المياه ونفايات الأنسجة ضروري لدفع تغيير حقيقي بصناعة الملابس.","\"Fast fashion\" = الأزياء السريعة. \"Textile waste\" = نفايات الأنسجة."],
// Month 7: Arts & Entertainment (31)
["The beauty of art lies in its extraordinary ability to transcend cultural and linguistic barriers and speak directly to the universal human experience.","جمال الفن بقدرته الاستثنائية على تجاوز الحواجز الثقافية واللغوية ويحكي مباشرة مع التجربة الإنسانية العالمية.","\"Transcend\" = يتجاوز. \"Universal\" = عالمي/كوني."],
["The film industry has made tremendous progress in recent years toward achieving more authentic and diverse representation of underrepresented communities on screen.","صناعة الأفلام عملت تقدم هائل بالسنوات الأخيرة نحو تحقيق تمثيل أكتر أصالة وتنوع للمجتمعات غير الممثلة كفاية على الشاشة.","\"Representation\" = تمثيل. \"Underrepresented\" = غير ممثل كفاية."],
["Classical Arabic poetry, with its intricate meter and profound imagery, has influenced literary traditions across multiple cultures and continents for over a millennium.","الشعر العربي الكلاسيكي بوزنه المعقد وصوره العميقة أثر على التقاليد الأدبية عبر ثقافات وقارات متعددة لأكتر من ألف سنة.","\"Intricate meter\" = وزن معقد. \"Millennium\" = ألف سنة."],
["Live theater offers an intimacy and immediacy that cannot be replicated by any screen, creating a shared emotional experience between performers and audience members.","المسرح الحي بيوفر حميمية وفورية ما بتنعاد بأي شاشة، بيخلق تجربة عاطفية مشتركة بين الممثلين والجمهور.","\"Intimacy\" = حميمية. \"Immediacy\" = فورية."],
["Music has the remarkable power to evoke memories, heal emotional wounds, and bring people together across every imaginable boundary of language, culture, and geography.","الموسيقى عندها قوة ملحوظة تستحضر ذكريات وتشفي جروح عاطفية وتجمع الناس عبر كل حدود اللغة والثقافة والجغرافيا اللي ممكن تتخيلها.","\"Evoke\" = تستحضر. \"Imaginable\" = ممكن تتخيله."],
["The way a skilled photographer captures a single fleeting moment and transforms it into a lasting work of art never ceases to amaze me.","الطريقة اللي مصور ماهر بيلتقط فيها لحظة عابرة وحدة ويحولها لعمل فني دائم ما بتوقف تدهشني.","\"Fleeting\" = عابر. \"Never ceases to amaze\" = ما بيوقف يدهشني."],
["Documentary filmmaking plays a crucial role in raising public awareness about important social issues that might otherwise remain invisible to mainstream audiences.","صناعة الأفلام الوثائقية بتلعب دور حاسم برفع الوعي العام عن قضايا اجتماعية مهمة اللي ممكن تضل غير مرئية للجمهور العام.","\"Documentary filmmaking\" = صناعة الأفلام الوثائقية. \"Mainstream\" = عام/سائد."],
["The culinary arts represent a fascinating intersection of science, culture, creativity, and tradition that brings immeasurable joy to people around the world.","فنون الطبخ بتمثل تقاطع ملفت بين العلم والثقافة والإبداع والتقاليد اللي بيجيب فرح لا يقاس لناس حول العالم.","\"Culinary arts\" = فنون الطبخ. \"Intersection\" = تقاطع."],
["Street art and murals have evolved from being considered vandalism to being recognized as legitimate and powerful forms of contemporary artistic expression.","فن الشارع والجداريات تطور من إنو كان يعتبر تخريب لإنو صار يُعترف فيه كشكل شرعي وقوي من التعبير الفني المعاصر.","\"Vandalism\" = تخريب. \"Contemporary\" = معاصر."],
["The digital revolution has democratized access to creative tools, enabling aspiring artists from all backgrounds to share their work with a global audience.","الثورة الرقمية دمقرطت الوصول لأدوات الإبداع، ومكّنت فنانين طموحين من كل الخلفيات يشاركوا عملهم مع جمهور عالمي.","\"Democratized\" = دمقرط. \"Aspiring\" = طموح."],
["Arabic calligraphy, which transforms written language into visual art, stands as one of the most distinctive and breathtaking art forms in the entire world.","الخط العربي اللي بيحول اللغة المكتوبة لفن بصري بيمثل واحد من أكتر أشكال الفن تميزاً وروعة بالعالم كله.","\"Calligraphy\" = فن الخط. \"Breathtaking\" = مذهل/يخطف الأنفاس."],
["The best children's literature does not talk down to its young readers but instead respects their intelligence and challenges them to think critically and creatively.","أفضل أدب الأطفال ما بيتعامل باستخفاف مع قراءه الصغار بل بيحترم ذكاءهم وبيتحداهم يفكروا بشكل نقدي وإبداعي.","\"Talk down to\" = يتعامل باستخفاف. تعبير مهم."],
["Podcasts have emerged as a revolutionary medium for storytelling, education, and cultural commentary, reaching millions of listeners across the globe every single day.","البودكاست طلع كوسيلة ثورية للسرد القصصي والتعليم والتعليق الثقافي، بيوصل لملايين المستمعين حول العالم كل يوم.","\"Revolutionary medium\" = وسيلة ثورية. \"Commentary\" = تعليق."],
["The museum exhibit, which featured artifacts from ancient Mesopotamia, offered visitors a rare and incredibly moving glimpse into one of humanity's earliest civilizations.","معرض المتحف اللي عرض آثار من بلاد ما بين النهرين القديمة وفّر للزوار لمحة نادرة ومؤثرة بشكل لا يصدق عن وحدة من أقدم حضارات البشرية.","\"Artifacts\" = آثار. \"Mesopotamia\" = بلاد ما بين النهرين."],
["Fashion, when approached thoughtfully, becomes a form of personal storytelling that communicates identity, values, and cultural heritage without speaking a single word.","الأزياء لما بتنتعامل معها بتمعن بتصير شكل من السرد الشخصي بتوصل الهوية والقيم والتراث الثقافي بدون ما تحكي كلمة وحدة.","\"Thoughtfully\" = بتمعن. الموضة كتعبير."],
["The resurgence of interest in traditional crafts like pottery, weaving, and woodworking reflects a growing desire for authentic handmade objects in our mass-produced world.","عودة الاهتمام بالحرف التقليدية مثل الفخار والنسيج والنجارة بتعكس رغبة متزايدة بأغراض يدوية أصيلة بعالمنا المنتج بكميات.","\"Resurgence\" = عودة. \"Mass-produced\" = منتج بكميات كبيرة."],
["A truly great novel has the power to completely transform the way you see the world, challenging your assumptions and expanding your capacity for empathy.","رواية عظيمة فعلاً عندها قوة تغير بالكامل طريقة شوفك للعالم، بتتحدى افتراضاتك وبتوسع قدرتك على التعاطف.","\"Assumptions\" = افتراضات. \"Capacity for empathy\" = القدرة على التعاطف."],
["The intersection of technology and art has given rise to entirely new creative disciplines such as digital animation, virtual reality experiences, and interactive installations.","تقاطع التكنولوجيا والفن أنتج تخصصات إبداعية جديدة بالكامل مثل الرسوم المتحركة الرقمية وتجارب الواقع الافتراضي والتركيبات التفاعلية.","\"Interactive installations\" = تركيبات تفاعلية. \"Virtual reality\" = واقع افتراضي."],
["Every culture has its own rich tradition of storytelling, and sharing these stories across cultural boundaries enriches our collective understanding of the human condition.","كل ثقافة عندها تقاليدها الغنية بالسرد القصصي، ومشاركة هالقصص عبر الحدود الثقافية بتغني فهمنا الجماعي للحالة الإنسانية.","\"Human condition\" = الحالة الإنسانية. \"Enriches\" = يغني."],
["The role of arts education in developing well-rounded individuals who can think creatively and communicate effectively should never be underestimated or underfunded.","دور تعليم الفنون بتطوير أفراد متكاملين بيقدروا يفكروا بإبداع ويتواصلوا بفعالية لازم ما يتم التقليل منه أو نقص تمويله.","\"Well-rounded\" = متكامل. \"Underestimated\" = يقلل من شأنه."],
["Attending a live concert, surrounded by thousands of people who share your love for the same music, creates a sense of connection that is truly magical.","حضور حفلة حية محاطة بآلاف الناس اللي بيشاركوك حبك لنفس الموسيقى بيخلق إحساس بالتواصل سحري فعلاً.","\"Sense of connection\" = إحساس بالتواصل."],
["The tradition of oral storytelling, which predates written literature by thousands of years, remains a vibrant and essential art form in communities around the world.","تقليد السرد الشفهي اللي بيسبق الأدب المكتوب بآلاف السنين لسا شكل فني نابض بالحياة وأساسي بمجتمعات حول العالم.","\"Oral storytelling\" = السرد الشفهي. \"Predates\" = يسبق."],
["Contemporary dance pushes the boundaries of physical expression, using the human body as an instrument to convey emotions and ideas that words alone cannot adequately capture.","الرقص المعاصر بيدفع حدود التعبير الجسدي، بيستعمل الجسم البشري كأداة لإيصال مشاعر وأفكار ما الكلمات لحالها بتقدر تلتقطها بشكل كافي.","\"Contemporary dance\" = الرقص المعاصر. الجسد كوسيلة تعبير."],
["The graphic novel has emerged as a sophisticated literary medium that combines visual artistry with complex narrative storytelling to address themes of remarkable depth and emotional resonance.","الرواية المصورة طلعت كوسيلة أدبية متطورة بتجمع بين الفن البصري والسرد القصصي المعقد لمعالجة مواضيع بعمق ملحوظ وتأثير عاطفي.","\"Graphic novel\" = الرواية المصورة. فن أدبي بصري."],
["Architecture, when approached as an art form rather than merely a technical discipline, has the power to profoundly shape how people experience and interact with the spaces they inhabit daily.","الهندسة المعمارية لما تتعامل معها كشكل فني بدل مجرد تخصص تقني عندها القوة تشكل بعمق كيف الناس بيعيشوا وبيتفاعلوا مع المساحات اللي بيسكنوها يومياً.","\"Architecture\" = الهندسة المعمارية. فن العمارة."],
["Video games have evolved into a legitimate art form that combines interactive storytelling, visual design, musical composition, and technological innovation in uniquely immersive ways.","ألعاب الفيديو تطورت لشكل فني شرعي بيجمع بين السرد التفاعلي والتصميم البصري والتأليف الموسيقي والابتكار التكنولوجي بطرق غمرية فريدة.","\"Immersive\" = غمري. ألعاب الفيديو = فن حديث."],
["The photography of Dorothea Lange during the Great Depression demonstrated how a single powerful image can capture an entire era's suffering and permanently alter public consciousness.","تصوير دوروثيا لانج خلال الكساد العظيم أثبت كيف صورة قوية وحدة ممكن تلتقط معاناة حقبة كاملة وتغير الوعي العام بشكل دائم.","\"Public consciousness\" = الوعي العام."],
["Community theater programs provide invaluable opportunities for ordinary people to discover hidden creative talents and build meaningful social connections through collaborative artistic endeavors.","برامج المسرح المجتمعي بتوفر فرص لا تقدر بثمن لناس عاديين يكتشفوا مواهب إبداعية مخفية ويبنوا روابط اجتماعية ذات معنى من خلال مساعي فنية تعاونية.","\"Community theater\" = المسرح المجتمعي. فن للجميع."],
["The art of food presentation, which transforms a simple meal into a visual masterpiece, reflects the deep cultural belief that eating should engage all of the senses simultaneously.","فن تقديم الطعام اللي بيحول وجبة بسيطة لتحفة بصرية بيعكس الإيمان الثقافي العميق إنو الأكل لازم يشغل كل الحواس بنفس الوقت.","\"Food presentation\" = تقديم الطعام. الأكل = فن."],
["Public murals and street installations have the unique power to democratize art by bringing creative expression directly into the everyday lives of people who might never visit a traditional gallery.","الجداريات العامة والتركيبات الشارعية عندها قوة فريدة تدمقرط الفن بجلب التعبير الإبداعي مباشرة لحياة الناس اللي ممكن ما يزوروا أبداً معرض تقليدي.","\"Democratize art\" = دمقرطة الفن. الفن للجميع."],
["The global popularity of Korean cinema, particularly following the historic Academy Award success of Parasite, demonstrates that compelling storytelling transcends all language barriers.","الشعبية العالمية للسينما الكورية خصوصاً بعد نجاح فيلم Parasite التاريخي بالأوسكار بتثبت إنو السرد القصصي المقنع بيتجاوز كل حواجز اللغة.","\"Compelling storytelling\" = سرد مقنع. السينما = لغة عالمية."],
// Month 8: Science & Innovation (31)
["Artificial intelligence is rapidly transforming virtually every aspect of modern life, from healthcare diagnostics to personalized education and autonomous transportation systems.","الذكاء الاصطناعي عم يغير بسرعة تقريباً كل جانب من الحياة الحديثة، من تشخيصات الرعاية الصحية للتعليم الشخصي وأنظمة النقل الذاتي.","\"Artificial intelligence\" = ذكاء اصطناعي. \"Autonomous\" = ذاتي القيادة."],
["The human genome project, which successfully mapped the entire human genetic code, represented one of the most ambitious scientific undertakings in recorded history.","مشروع الجينوم البشري اللي نجح برسم خريطة الشيفرة الجينية البشرية كاملة مثّل واحد من أكتر المساعي العلمية طموحاً بالتاريخ المسجل.","\"Genome\" = جينوم. \"Undertakings\" = مساعي."],
["Quantum computing, though still in its early developmental stages, has the potential to solve extraordinarily complex problems that are currently beyond the reach of conventional computers.","الحوسبة الكمية مع إنها لسا بمراحلها التطويرية المبكرة، عندها القدرة تحل مشاكل معقدة بشكل استثنائي هلق أبعد من قدرة الحواسيب التقليدية.","\"Quantum computing\" = الحوسبة الكمية. \"Conventional\" = تقليدي."],
["The development of mRNA vaccine technology during the global pandemic demonstrated the incredible speed at which modern science can respond to emerging health threats.","تطوير تكنولوجيا لقاحات mRNA خلال الجائحة العالمية أظهر السرعة المذهلة اللي العلم الحديث بيقدر يستجيب فيها لتهديدات صحية ناشئة.","\"mRNA\" = الحمض النووي الريبوزي الرسول. \"Emerging threats\" = تهديدات ناشئة."],
["Space exploration continues to captivate the human imagination, with recent missions to Mars bringing us closer than ever to the possibility of interplanetary colonization.","استكشاف الفضاء لسا بيأسر الخيال البشري، مع مهمات أخيرة للمريخ عم تقربنا أكتر من أي وقت لاحتمال الاستعمار بين الكواكب.","\"Captivate\" = يأسر. \"Interplanetary colonization\" = الاستعمار بين الكواكب."],
["The ethical implications of genetic engineering, particularly gene editing technologies like CRISPR, raise profound questions about the boundaries of human intervention in nature.","التداعيات الأخلاقية للهندسة الجينية، خصوصاً تقنيات تعديل الجينات مثل كريسبر، بتثير أسئلة عميقة عن حدود التدخل البشري بالطبيعة.","\"CRISPR\" = تقنية تعديل جيني ثورية. \"Intervention\" = تدخل."],
["Telemedicine has revolutionized healthcare delivery, enabling patients in remote and underserved areas to access specialist consultations without traveling long distances.","الطب عن بعد غيّر تقديم الرعاية الصحية، بيمكّن مرضى بمناطق نائية وغير مخدومة كفاية يحصلوا على استشارات متخصصة بدون ما يسافروا مسافات طويلة.","\"Telemedicine\" = الطب عن بعد. \"Underserved\" = غير مخدومة كفاية."],
["The development of sustainable nuclear fusion technology could potentially provide humanity with a virtually limitless source of clean energy for generations to come.","تطوير تكنولوجيا الاندماج النووي المستدامة ممكن يوفر للبشرية مصدر طاقة نظيفة لا محدود تقريباً لأجيال قادمة.","\"Nuclear fusion\" = الاندماج النووي. \"Limitless\" = لا محدود."],
["Three-dimensional printing technology is being used in increasingly creative ways, from constructing affordable housing to manufacturing custom prosthetic limbs for patients.","تكنولوجيا الطباعة ثلاثية الأبعاد عم تستعمل بطرق إبداعية متزايدة، من بناء مساكن بأسعار معقولة لتصنيع أطراف صناعية مخصصة للمرضى.","\"3D printing\" = الطباعة ثلاثية الأبعاد. \"Prosthetic limbs\" = أطراف صناعية."],
["The discovery of water on the surface of Mars has reignited scientific debate about the possibility that microbial life may have once existed on the red planet.","اكتشاف المياه على سطح المريخ أعاد إشعال النقاش العلمي عن احتمال إنو حياة جرثومية كانت موجودة يوماً على الكوكب الأحمر.","\"Reignited\" = أعاد إشعال. \"Microbial life\" = حياة جرثومية."],
["Neuroscience research has revealed that the human brain possesses a remarkable degree of neuroplasticity, meaning it can reorganize and adapt throughout our entire lifespan.","أبحاث علم الأعصاب كشفت إنو الدماغ البشري عنده درجة ملحوظة من المرونة العصبية، يعني بيقدر يعيد تنظيم حاله ويتكيف طول حياتنا.","\"Neuroplasticity\" = المرونة العصبية. \"Lifespan\" = فترة الحياة."],
["The internet of things, which connects everyday household devices to the internet, is gradually transforming our homes into intelligent and responsive living environments.","إنترنت الأشياء اللي بيربط أجهزة البيت اليومية بالإنترنت عم يحول بيوتنا تدريجياً لبيئات معيشية ذكية ومستجيبة.","\"Internet of Things\" = إنترنت الأشياء. \"Responsive\" = مستجيب."],
["Advances in renewable energy storage technology are addressing one of the biggest challenges facing the clean energy transition: maintaining reliable power when the sun is not shining.","التقدم بتكنولوجيا تخزين الطاقة المتجددة عم يعالج واحد من أكبر التحديات اللي بتواجه تحول الطاقة النظيفة: الحفاظ على طاقة موثوقة لما الشمس مش طالعة.","\"Energy storage\" = تخزين الطاقة. مشكلة رئيسية."],
["The field of regenerative medicine holds the extraordinary promise of one day being able to grow replacement organs in laboratories for patients awaiting transplants.","مجال الطب التجديدي بيحمل وعد استثنائي إنو يوم من الأيام نقدر ننمّي أعضاء بديلة بالمختبرات لمرضى بيستنوا زراعة أعضاء.","\"Regenerative medicine\" = الطب التجديدي. \"Transplants\" = زراعة أعضاء."],
["Autonomous vehicles, equipped with sophisticated sensors and artificial intelligence, are expected to dramatically reduce traffic accidents caused by human error within the next decade.","السيارات ذاتية القيادة المجهزة بأجهزة استشعار متطورة وذكاء اصطناعي متوقع إنها تقلل بشكل كبير حوادث السير الناتجة عن الخطأ البشري خلال العقد الجاي.","\"Sophisticated sensors\" = أجهزة استشعار متطورة. \"Human error\" = الخطأ البشري."],
["The rapid advancement of machine learning algorithms has enabled computers to perform tasks that were previously thought to require uniquely human cognitive abilities.","التقدم السريع بخوارزميات التعلم الآلي مكّن الحواسيب تنفذ مهام كان يُعتقد سابقاً إنها بتتطلب قدرات معرفية بشرية فريدة.","\"Machine learning\" = التعلم الآلي. \"Algorithms\" = خوارزميات."],
["Biotechnology companies are developing innovative plant-based materials that could eventually replace petroleum-based plastics and significantly reduce global pollution levels.","شركات التكنولوجيا الحيوية عم تطور مواد نباتية مبتكرة ممكن بالنهاية تستبدل البلاستيك المشتق من البترول وتقلل مستويات التلوث العالمي بشكل كبير.","\"Biotechnology\" = التكنولوجيا الحيوية. \"Plant-based\" = نباتي."],
["The international space station serves as a unique floating laboratory where scientists from different nations collaborate on experiments that would be impossible to conduct on Earth.","محطة الفضاء الدولية بتعمل كمختبر عائم فريد حيث علماء من دول مختلفة بيتعاونوا على تجارب مستحيل تنعمل على الأرض.","\"Floating laboratory\" = مختبر عائم. \"Collaborate\" = يتعاونوا."],
["Wearable health technology, from smartwatches to biosensors, is empowering individuals to monitor their own vital signs and take a more proactive approach to personal wellness.","تكنولوجيا الصحة القابلة للارتداء من الساعات الذكية للمستشعرات الحيوية عم تمكن الأفراد يراقبوا علاماتهم الحيوية وياخدوا نهج أكتر استباقية للصحة الشخصية.","\"Wearable technology\" = تكنولوجيا قابلة للارتداء. \"Vital signs\" = العلامات الحيوية."],
["The scientific method, with its emphasis on hypothesis testing, evidence-based reasoning, and peer review, remains humanity's most reliable framework for understanding the natural world.","المنهج العلمي بتركيزه على اختبار الفرضيات والتفكير المبني على الأدلة والتحكيم لسا أكتر إطار موثوق للبشرية لفهم العالم الطبيعي.","\"Scientific method\" = المنهج العلمي. \"Evidence-based\" = مبني على الأدلة."],
["Citizen science projects, which invite ordinary people to participate in real research, have produced numerous valuable discoveries that professional scientists alone could never have achieved.","مشاريع العلم المواطني اللي بتدعو أشخاص عاديين يشاركوا بأبحاث حقيقية أنتجت اكتشافات قيّمة كتيرة ما كان العلماء المحترفين لحالهم يقدروا يحققوها.","\"Citizen science\" = العلم المواطني."],
["The discovery of antibiotics in the early twentieth century revolutionized medicine and has saved an estimated hundreds of millions of lives, but antibiotic resistance now poses a growing global threat.","اكتشاف المضادات الحيوية ببداية القرن العشرين غيّر الطب وأنقذ مئات الملايين من الأرواح تقديرياً، بس مقاومة المضادات الحيوية هلق بتشكل تهديد عالمي متزايد.","\"Antibiotic resistance\" = مقاومة المضادات الحيوية. تهديد جدي."],
["Desalination technology, which converts seawater into fresh drinking water, could potentially solve water scarcity issues in coastal regions but currently requires enormous amounts of energy to operate.","تكنولوجيا تحلية المياه اللي بتحول مياه البحر لمياه شرب عذبة ممكن تحل مشاكل شح المياه بالمناطق الساحلية بس حالياً بتتطلب كميات هائلة من الطاقة للتشغيل.","\"Desalination\" = تحلية المياه."],
["The development of vertical farming technology allows crops to be grown in stacked indoor environments using significantly less water and land than traditional agricultural methods.","تطوير تكنولوجيا الزراعة العمودية بيسمح بزراعة المحاصيل ببيئات داخلية مكدسة باستعمال مياه وأرض أقل بكتير من طرق الزراعة التقليدية.","\"Vertical farming\" = الزراعة العمودية. حل مستقبلي مبتكر."],
["Brain-computer interface technology, which enables direct communication between the human brain and external devices, holds extraordinary promise for individuals with severe physical disabilities.","تكنولوجيا واجهة الدماغ والحاسوب اللي بتمكّن التواصل المباشر بين الدماغ البشري وأجهزة خارجية بتحمل وعد استثنائي لأفراد عندهم إعاقات جسدية شديدة.","\"Brain-computer interface\" = واجهة الدماغ والحاسوب."],
["The James Webb Space Telescope has provided humanity with unprecedented images of distant galaxies, fundamentally expanding our understanding of the origins and structure of the universe.","تلسكوب جيمس ويب الفضائي وفّر للبشرية صور غير مسبوقة لمجرات بعيدة، بيوسع بشكل جذري فهمنا لأصول وبنية الكون.","\"James Webb\" = تلسكوب فضائي ثوري."],
["Precision medicine, which tailors medical treatment to the individual genetic profile of each patient, represents a paradigm shift from the traditional one-size-fits-all approach to healthcare.","الطب الدقيق اللي بيخصص العلاج الطبي للملف الجيني الفردي لكل مريض بيمثل تحول جذري من النهج التقليدي الموحد للرعاية الصحية.","\"Precision medicine\" = الطب الدقيق. \"Paradigm shift\" = تحول جذري."],
["The ethical debate surrounding autonomous weapons systems, machines that can select and engage targets without human intervention, raises profound questions about accountability in warfare.","النقاش الأخلاقي حول أنظمة الأسلحة الذاتية، آلات بتقدر تختار وتهاجم أهداف بدون تدخل بشري، بيطرح أسئلة عميقة عن المسؤولية بالحروب.","\"Autonomous weapons\" = أسلحة ذاتية. سؤال أخلاقي خطير."],
["Blockchain technology, originally developed for cryptocurrency transactions, is finding innovative applications in supply chain management, voting systems, and secure digital identity verification.","تكنولوجيا البلوكتشين اللي تطورت أصلاً لمعاملات العملات المشفرة عم تلاقي تطبيقات مبتكرة بإدارة سلسلة التوريد وأنظمة التصويت والتحقق الآمن من الهوية الرقمية.","\"Blockchain\" = سلسلة الكتل. تطبيقات أبعد من العملات المشفرة."],
["The ongoing quest to develop commercially viable nuclear fusion power could potentially provide humanity with an essentially unlimited source of clean energy without the radioactive waste associated with nuclear fission.","السعي المستمر لتطوير طاقة اندماج نووي مجدية تجارياً ممكن يوفر للبشرية مصدر طاقة نظيفة لا محدود بالأساس بدون النفايات المشعة المرتبطة بالانشطار النووي.","\"Nuclear fusion\" مقابل \"nuclear fission\". الاندماج = المستقبل."],
["The development of CRISPR gene editing technology has opened up possibilities that were once confined entirely to the realm of science fiction, from curing genetic diseases to potentially eliminating hereditary conditions.","تطوير تكنولوجيا تعديل الجينات كريسبر فتح احتمالات كانت محصورة بالكامل بعالم الخيال العلمي، من علاج أمراض جينية لإمكانية القضاء على حالات وراثية.","\"CRISPR\" = أداة تعديل جيني ثورية. \"Hereditary\" = وراثي."],
// Month 9: History & Society (30)
["The civil rights movement of the nineteen sixties fundamentally transformed American society and inspired similar movements for equality and justice around the entire world.","حركة الحقوق المدنية بالستينات غيرت المجتمع الأمريكي بشكل جذري وألهمت حركات مشابهة للمساواة والعدالة حول العالم كله.","\"Civil rights\" = حقوق مدنية. \"Fundamentally transformed\" = غيرت بشكل جذري."],
["Understanding the complex historical forces that shaped the modern Middle East is essential for anyone seeking to comprehend the region's current social and political dynamics.","فهم القوى التاريخية المعقدة اللي شكلت الشرق الأوسط الحديث ضروري لأي حدا بيحاول يفهم الديناميكيات الاجتماعية والسياسية الحالية بالمنطقة.","\"Dynamics\" = ديناميكيات. \"Comprehend\" = يفهم بعمق."],
["The industrial revolution, which began in eighteenth-century Britain, dramatically altered the course of human civilization in ways that continue to shape our world today.","الثورة الصناعية اللي بدأت ببريطانيا بالقرن الثامنعشر غيرت بشكل كبير مسار الحضارة البشرية بطرق لسا عم تشكل عالمنا اليوم.","\"Industrial revolution\" = الثورة الصناعية. \"Altered the course\" = غيرت المسار."],
["Immigration has been a defining feature of the American experience since the nation's founding, contributing immeasurably to its cultural richness and economic vitality.","الهجرة كانت سمة أساسية من التجربة الأمريكية من تأسيس الدولة، وساهمت بشكل لا يقاس بغناها الثقافي وحيويتها الاقتصادية.","\"Defining feature\" = سمة أساسية. \"Economic vitality\" = حيوية اقتصادية."],
["The women's suffrage movement, which fought tirelessly for the right to vote, stands as a powerful testament to the transformative power of organized collective action.","حركة حق المرأة بالتصويت اللي ناضلت بلا كلل من أجل حق الانتخاب بتقف كشهادة قوية على القوة التحويلية للعمل الجماعي المنظم.","\"Suffrage\" = حق التصويت. \"Tirelessly\" = بلا كلل."],
["The fall of the Berlin Wall in nineteen eighty-nine symbolized the end of the Cold War and ushered in a new era of geopolitical realignment across Europe.","سقوط جدار برلين بسنة ألف وتسعمية وتسعة وتمانين رمز لنهاية الحرب الباردة ودشن عهد جديد من إعادة الترتيب الجيوسياسي عبر أوروبا.","\"Ushered in\" = دشن/بدأ. \"Geopolitical\" = جيوسياسي."],
["The Renaissance period in European history produced an extraordinary flowering of art, science, and philosophical thought that continues to influence Western culture to this day.","عصر النهضة بالتاريخ الأوروبي أنتج ازدهار استثنائي بالفن والعلم والفكر الفلسفي اللي لسا بيأثر على الثقافة الغربية لهاليوم.","\"Renaissance\" = عصر النهضة. \"Flowering\" = ازدهار."],
["Oral history projects that preserve the personal stories of community elders play an invaluable role in maintaining cultural memory and passing wisdom to future generations.","مشاريع التاريخ الشفهي اللي بتحفظ القصص الشخصية لكبار المجتمع بتلعب دور لا يقدر بثمن بالحفاظ على الذاكرة الثقافية ونقل الحكمة للأجيال الجاية.","\"Oral history\" = التاريخ الشفهي. \"Invaluable\" = لا يقدر بثمن."],
["The abolition of slavery, though it represented an enormous moral victory, was followed by decades of systematic discrimination that perpetuated inequality in countless ways.","إلغاء العبودية مع إنو مثّل انتصار أخلاقي هائل تبعته عقود من التمييز المنهجي اللي أدام عدم المساواة بطرق لا حصر لها.","\"Abolition\" = إلغاء. \"Perpetuated\" = أدام/استمر بـ."],
["The invention of the printing press in the fifteenth century democratized access to knowledge and is widely considered one of the most consequential innovations in human history.","اختراع المطبعة بالقرن الخامسعشر دمقرط الوصول للمعرفة وبيعتبر على نطاق واسع واحد من أكتر الابتكارات تأثيراً بتاريخ البشرية.","\"Printing press\" = المطبعة. \"Consequential\" = ذو تأثير كبير."],
["The formation of the United Nations after World War Two represented humanity's collective determination to prevent the catastrophic horrors of global conflict from ever recurring.","تشكيل الأمم المتحدة بعد الحرب العالمية التانية مثّل تصميم البشرية الجماعي لمنع أهوال الصراع العالمي الكارثية من التكرار.","\"United Nations\" = الأمم المتحدة. \"Recurring\" = التكرار."],
["The Arab contribution to mathematics, astronomy, medicine, and philosophy during the Islamic Golden Age laid the essential foundation for the European scientific revolution.","المساهمة العربية بالرياضيات والفلك والطب والفلسفة خلال العصر الذهبي الإسلامي حطت الأساس الضروري للثورة العلمية الأوروبية.","\"Islamic Golden Age\" = العصر الذهبي الإسلامي."],
["Social movements throughout history have demonstrated that ordinary citizens, when united by a common cause, possess the extraordinary power to dismantle unjust systems.","الحركات الاجتماعية عبر التاريخ أثبتت إنو المواطنين العاديين لما يتحدوا بقضية مشتركة بيملكوا قوة استثنائية لتفكيك الأنظمة الظالمة.","\"Dismantle\" = تفكيك. \"Unjust\" = ظالم."],
["The ongoing debate about how history should be taught in schools reflects deeper questions about national identity, collective memory, and the purpose of education itself.","النقاش المستمر عن كيف لازم يندرّس التاريخ بالمدارس بيعكس أسئلة أعمق عن الهوية الوطنية والذاكرة الجماعية والغاية من التعليم نفسه.","\"Collective memory\" = الذاكرة الجماعية. \"Purpose\" = الغاية."],
["The globalization of culture, accelerated by the internet and social media, has created both unprecedented opportunities for cross-cultural exchange and legitimate concerns about cultural homogenization.","عولمة الثقافة اللي تسارعت بالإنترنت والسوشال ميديا خلقت فرص غير مسبوقة للتبادل الثقافي ومخاوف مشروعة عن التجانس الثقافي.","\"Globalization\" = عولمة. \"Homogenization\" = تجانس."],
["The legacy of colonialism continues to shape economic and political realities in many parts of the developing world in ways that demand honest acknowledgment and meaningful redress.","إرث الاستعمار لسا عم يشكل الواقع الاقتصادي والسياسي بكتير مناطق من العالم النامي بطرق بتتطلب اعتراف صادق وإصلاح حقيقي.","\"Colonialism\" = الاستعمار. \"Redress\" = إصلاح/تعويض."],
["The story of the Underground Railroad, through which enslaved people courageously escaped to freedom, remains one of the most inspiring chapters in American history.","قصة السكة الحديد السرية اللي العبيد هربوا من خلالها بشجاعة للحرية لسا واحدة من أكتر الفصول إلهاماً بالتاريخ الأمريكي.","\"Underground Railroad\" = السكة الحديد السرية. شبكة مساعدة."],
["Studying history teaches us not only about the triumphs and failures of past civilizations but also about the enduring patterns of human behavior that transcend time.","دراسة التاريخ بتعلمنا مش بس عن انتصارات وإخفاقات الحضارات السابقة بل كمان عن الأنماط الدائمة للسلوك البشري اللي بتتجاوز الزمن.","\"Enduring patterns\" = أنماط دائمة. \"Transcend\" = تتجاوز."],
["The peaceful transition of power between political administrations is one of democracy's most remarkable achievements and should never be taken for granted by any generation.","الانتقال السلمي للسلطة بين الإدارات السياسية واحد من أبرز إنجازات الديمقراطية ولازم ما يؤخذ كشي مسلم فيه من أي جيل.","\"Transition of power\" = انتقال السلطة."],
["Every society must grapple with the fundamental question of how to balance individual freedom with collective responsibility in ways that promote justice and human flourishing.","كل مجتمع لازم يتصارع مع السؤال الأساسي كيف يوازن بين الحرية الفردية والمسؤولية الجماعية بطرق بتعزز العدالة وازدهار الإنسان.","\"Grapple with\" = يتصارع مع. \"Human flourishing\" = ازدهار الإنسان."],
["The Silk Road was not merely a trade route but a vast network of cultural exchange that connected civilizations from China to the Mediterranean for centuries.","طريق الحرير ما كان مجرد طريق تجاري بل شبكة واسعة من التبادل الثقافي ربطت حضارات من الصين للبحر المتوسط لقرون.","\"Silk Road\" = طريق الحرير. تبادل ثقافي وتجاري."],
["The suffragette movement demonstrated that meaningful social change often requires decades of persistent, organized, and sometimes deeply unpopular advocacy before achieving lasting results.","حركة المطالبة بحق المرأة بالتصويت أثبتت إنو التغيير الاجتماعي الحقيقي غالباً بيتطلب عقود من المناصرة المستمرة والمنظمة وأحياناً غير الشعبية بعمق قبل تحقيق نتائج دائمة.","\"Suffragette\" = مناضلة لحق التصويت. \"Advocacy\" = مناصرة."],
["The Great Migration, during which millions of African Americans moved from the rural South to northern cities, fundamentally reshaped the demographic and cultural landscape of the United States.","الهجرة الكبرى اللي خلالها ملايين الأمريكيين الأفارقة انتقلوا من الجنوب الريفي لمدن الشمال غيّرت بشكل جذري المشهد الديموغرافي والثقافي للولايات المتحدة.","\"Great Migration\" = الهجرة الكبرى. حدث تاريخي محوري."],
["Archaeological discoveries continue to challenge and refine our understanding of ancient civilizations, proving that history is never truly settled but always subject to revision.","الاكتشافات الأثرية لسا عم تتحدى وتنقّح فهمنا للحضارات القديمة، بتثبت إنو التاريخ أبداً ما بيكون محسوم نهائياً بل دايماً قابل للمراجعة.","\"Archaeological\" = أثري. \"Subject to revision\" = قابل للمراجعة."],
["The concept of constitutional democracy, where individual rights are protected from the tyranny of the majority through enshrined legal protections, remains one of humanity's most important political innovations.","مفهوم الديمقراطية الدستورية حيث حقوق الفرد محمية من طغيان الأغلبية من خلال حمايات قانونية مكرسة لسا واحد من أهم الابتكارات السياسية للبشرية.","\"Constitutional democracy\" = ديمقراطية دستورية. \"Tyranny of the majority\" = طغيان الأغلبية."],
["The history of medicine reveals a fascinating pattern of breakthroughs that were initially rejected by the scientific establishment before eventually being recognized as revolutionary advances.","تاريخ الطب بيكشف نمط ملفت من الاختراقات اللي بالأول رفضتها المؤسسة العلمية قبل ما بالنهاية يتم الاعتراف فيها كتقدمات ثورية.","\"Breakthroughs\" = اختراقات. \"Scientific establishment\" = المؤسسة العلمية."],
["Understanding how propaganda has been used throughout history to manipulate public opinion is essential for developing the critical media literacy skills that every citizen needs.","فهم كيف تم استعمال البروباغاندا عبر التاريخ للتلاعب بالرأي العام ضروري لتطوير مهارات محو الأمية الإعلامية النقدية اللي كل مواطن بيحتاجها.","\"Propaganda\" = البروباغاندا. \"Manipulate\" = يتلاعب."],
["The Harlem Renaissance of the nineteen twenties produced an extraordinary flowering of African American art, literature, and music that continues to influence American culture profoundly to this day.","نهضة هارلم بالعشرينات أنتجت ازدهار استثنائي بالفن والأدب والموسيقى الأفريقية الأمريكية اللي لسا بتأثر على الثقافة الأمريكية بعمق لهاليوم.","\"Harlem Renaissance\" = نهضة هارلم. حركة ثقافية مؤثرة."],
["The history of human rights is ultimately a story of ordinary people who refused to accept injustice and demanded that their inherent dignity be recognized and respected by those in power.","تاريخ حقوق الإنسان بالنهاية قصة ناس عاديين رفضوا يقبلوا الظلم وطالبوا إنو كرامتهم المتأصلة تنعترف وتُحترم من اللي بالسلطة.","رسالة قوية: التغيير بيبدأ من الناس العاديين."],
["The Marshall Plan, which provided American economic aid to rebuild war-torn Europe after World War Two, remains one of the most successful foreign policy initiatives in modern diplomatic history.","خطة مارشال اللي وفرت مساعدات اقتصادية أمريكية لإعادة بناء أوروبا المدمرة من الحرب بعد الحرب العالمية التانية لسا واحدة من أنجح مبادرات السياسة الخارجية بالتاريخ الدبلوماسي الحديث.","\"Marshall Plan\" = خطة مارشال. \"Foreign policy\" = سياسة خارجية."],
// Month 10: Philosophy & Ethics (31)
["The ancient Greek philosopher Socrates famously declared that the unexamined life is not worth living, emphasizing the fundamental importance of self-reflection and critical inquiry.","الفيلسوف اليوناني القديم سقراط قال مقولته الشهيرة إنو الحياة بدون تأمل ما بتستحق العيش، بيأكد على الأهمية الأساسية للتأمل الذاتي والبحث النقدي.","\"Unexamined life\" = حياة بدون تأمل. مقولة سقراط الشهيرة."],
["The ethical dilemma of whether the ends justify the means has been debated by philosophers, politicians, and ordinary citizens for thousands of years without resolution.","المعضلة الأخلاقية إذا الغاية بتبرر الوسيلة تمت مناقشتها من فلاسفة وسياسيين ومواطنين عاديين لآلاف السنين بدون حل.","\"The ends justify the means\" = الغاية تبرر الوسيلة. معضلة كلاسيكية."],
["Existentialist thinkers like Jean-Paul Sartre argued that human beings are fundamentally free and therefore bear complete responsibility for the choices they make in life.","المفكرين الوجوديين مثل جان بول سارتر حاججوا إنو البشر أحرار بشكل أساسي وبالتالي بيتحملوا مسؤولية كاملة عن الخيارات اللي بياخدوها بالحياة.","\"Existentialist\" = وجودي. \"Bear responsibility\" = يتحمل المسؤولية."],
["The concept of human rights, which asserts that every individual possesses inherent dignity and is entitled to basic freedoms, forms the moral foundation of modern international law.","مفهوم حقوق الإنسان اللي بيؤكد إنو كل فرد عنده كرامة متأصلة ويستحق حريات أساسية بيشكل الأساس الأخلاقي للقانون الدولي الحديث.","\"Inherent dignity\" = كرامة متأصلة. \"Entitled to\" = يستحق."],
["The philosophical question of whether morality is objective and universal or subjective and culturally determined remains one of the most enduring debates in ethics.","السؤال الفلسفي إذا الأخلاق موضوعية وعالمية أو ذاتية ومحددة ثقافياً لسا واحد من أكتر النقاشات ديمومة بالأخلاقيات.","\"Objective\" = موضوعي. \"Subjective\" = ذاتي."],
["Immanuel Kant proposed that we should always treat other people as ends in themselves and never merely as means to achieve our own personal goals.","إيمانويل كانط اقترح إنو لازم دايماً نعامل الناس التانيين كغايات بحد ذاتهم ومش أبداً بس كوسائل لتحقيق أهدافنا الشخصية.","\"Ends in themselves\" = غايات بحد ذاتها. الأمر الأخلاقي لكانط."],
["The trolley problem, a famous thought experiment in moral philosophy, forces us to confront uncomfortable questions about utilitarian calculations and moral intuition.","مسألة القطار، تجربة فكرية مشهورة بالفلسفة الأخلاقية، بتجبرنا نواجه أسئلة مزعجة عن الحسابات النفعية والحدس الأخلاقي.","\"Trolley problem\" = مسألة القطار. \"Utilitarian\" = نفعي."],
["The virtue of empathy, the capacity to genuinely understand and share another person's emotional experience, lies at the very heart of what it means to be fully human.","فضيلة التعاطف، القدرة على فهم ومشاركة التجربة العاطفية لشخص تاني بصدق، بتقع بقلب ما يعنيه إنك تكون إنسان كامل.","\"Virtue\" = فضيلة. \"Lies at the heart\" = بقلب/بجوهر."],
["The philosophical tradition of pragmatism, rooted in American thought, evaluates ideas not by their abstract truth but by their practical consequences and real-world applications.","التقليد الفلسفي للبراغماتية المتجذر بالفكر الأمريكي بيقيّم الأفكار مش بحقيقتها المجردة بل بعواقبها العملية وتطبيقاتها بالعالم الحقيقي.","\"Pragmatism\" = البراغماتية. \"Abstract\" = مجرد."],
["Environmental ethics challenges us to expand our moral circle beyond human beings to include the natural world and the countless species with which we share this planet.","أخلاقيات البيئة بتتحدانا نوسع دائرتنا الأخلاقية أبعد من البشر لتشمل العالم الطبيعي والأنواع اللي لا حصر لها اللي بنشارك معها هالكوكب.","\"Moral circle\" = الدائرة الأخلاقية. مفهوم فلسفي مهم."],
["The tension between individual liberty and the common good is a philosophical question that every democratic society must continuously negotiate and balance.","التوتر بين الحرية الفردية والمصلحة العامة سؤال فلسفي كل مجتمع ديمقراطي لازم يتفاوض عليه ويوازنه باستمرار.","\"Common good\" = المصلحة العامة. \"Negotiate\" = يتفاوض."],
["The Stoic philosophers of ancient Rome taught that true happiness comes not from external circumstances but from cultivating inner virtue and accepting what we cannot control.","الفلاسفة الرواقيين من روما القديمة علموا إنو السعادة الحقيقية مش من الظروف الخارجية بل من تنمية الفضيلة الداخلية وتقبل اللي ما بنقدر نسيطر عليه.","\"Stoic\" = رواقي. \"Cultivating\" = تنمية."],
["The philosophical concept of the social contract suggests that individuals agree to surrender certain freedoms in exchange for the protection and order that organized society provides.","المفهوم الفلسفي للعقد الاجتماعي بيقترح إنو الأفراد بيوافقوا يتنازلوا عن حريات معينة مقابل الحماية والنظام اللي المجتمع المنظم بيوفره.","\"Social contract\" = العقد الاجتماعي. فكرة روسو ولوك."],
["Whether artificial intelligence can ever truly possess consciousness or merely simulate it is a profound philosophical question that challenges our understanding of mind itself.","إذا الذكاء الاصطناعي بيقدر فعلاً يملك وعي أو بس يحاكيه هو سؤال فلسفي عميق بيتحدى فهمنا للعقل نفسه.","\"Consciousness\" = الوعي. \"Simulate\" = يحاكي."],
["The Buddhist concept of impermanence reminds us that all things, both pleasant and painful, are temporary, and that clinging to permanence is a fundamental source of suffering.","مفهوم عدم الديمومة البوذي بيذكرنا إنو كل الأشياء الحلوة والمؤلمة مؤقتة، وإنو التمسك بالديمومة مصدر أساسي للمعاناة.","\"Impermanence\" = عدم الديمومة. \"Clinging\" = التمسك."],
["The moral responsibility we bear toward future generations who cannot advocate for themselves raises challenging questions about sustainability, justice, and intergenerational fairness.","المسؤولية الأخلاقية اللي بنتحملها تجاه الأجيال الجاية اللي ما بتقدر تدافع عن نفسها بتطرح أسئلة صعبة عن الاستدامة والعدالة والإنصاف بين الأجيال.","\"Intergenerational fairness\" = الإنصاف بين الأجيال."],
["The principle of justice demands that we treat similar cases similarly and different cases differently, applying consistent standards while remaining sensitive to individual circumstances.","مبدأ العدالة بيتطلب إنو نعامل الحالات المتشابهة بالتشابه والمختلفة بالاختلاف، بتطبيق معايير ثابتة مع البقاء حساسين للظروف الفردية.","\"Consistent standards\" = معايير ثابتة. مبدأ العدالة."],
["Moral courage, the willingness to stand up for what is right even when facing personal risk or social pressure, is perhaps the rarest and most admirable of all virtues.","الشجاعة الأخلاقية، الاستعداد للدفاع عن الصح حتى لما تواجه مخاطر شخصية أو ضغط اجتماعي، يمكن أندر وأكتر فضيلة تثير الإعجاب.","\"Moral courage\" = الشجاعة الأخلاقية. فضيلة عظيمة."],
["The philosophy of education raises fundamental questions about what knowledge is most worth having and how learning can best be structured to develop the whole person.","فلسفة التعليم بتطرح أسئلة أساسية عن أي معرفة أكتر استحقاقاً وكيف التعلم ممكن يتنظم بأفضل طريقة لتطوير الشخص ككل.","\"Philosophy of education\" = فلسفة التعليم. \"Whole person\" = الشخص ككل."],
["The idea that every person is born with equal inherent worth and deserves to be treated with dignity, regardless of any external characteristic, is the cornerstone of modern human rights.","الفكرة إنو كل شخص بينولد بقيمة متأصلة متساوية وبيستحق يتعامل معه بكرامة بغض النظر عن أي صفة خارجية، هي حجر الأساس لحقوق الإنسان الحديثة.","\"Cornerstone\" = حجر الأساس. \"Inherent worth\" = قيمة متأصلة."],
["The capacity for ethical reasoning, the ability to think carefully about right and wrong and to act accordingly, is what ultimately distinguishes truly wise individuals from merely clever ones.","القدرة على التفكير الأخلاقي، القدرة على التفكير بعناية بالصح والغلط والتصرف بناءً عليه، هو اللي بيميز الأشخاص الحكيمين فعلاً عن الأذكياء فقط.","\"Ethical reasoning\" = التفكير الأخلاقي. \"Wise vs clever\" = حكيم مقابل ذكي."],
["The paradox of tolerance, first articulated by Karl Popper, argues that a society committed to tolerance must paradoxically be intolerant of intolerance itself in order to survive.","مفارقة التسامح اللي صاغها كارل بوبر أولاً بتحاجج إنو مجتمع ملتزم بالتسامح لازم بالمفارقة يكون غير متسامح مع عدم التسامح نفسه ليبقى.","\"Paradox of tolerance\" = مفارقة التسامح. فكرة فلسفية مهمة."],
["The philosophy of Ubuntu, an African concept meaning I am because we are, emphasizes that our individual humanity is inextricably bound to the humanity of those around us.","فلسفة أوبونتو، مفهوم أفريقي بيعني أنا أكون لأنو إحنا نكون، بيأكد إنو إنسانيتنا الفردية مرتبطة بشكل لا ينفصل بإنسانية اللي حوالينا.","\"Ubuntu\" = أنا أكون لأنو إحنا نكون. فلسفة أفريقية عميقة."],
["The ancient Arabic philosophical tradition, which preserved and expanded upon Greek thought during Europe's Dark Ages, represents an intellectual bridge without which modern Western philosophy would not exist.","التقليد الفلسفي العربي القديم اللي حفظ ووسّع الفكر اليوناني خلال العصور المظلمة بأوروبا بيمثل جسر فكري بدونه الفلسفة الغربية الحديثة ما كانت وُجدت.","دور الفلسفة العربية بحفظ المعرفة البشرية."],
["The thought experiment of the ship of Theseus, which asks whether an object that has had all of its components replaced remains fundamentally the same object, challenges our deepest intuitions about identity.","تجربة سفينة ثيسيوس الفكرية اللي بتسأل إذا شي تم استبدال كل مكوناته بيضل بالأساس نفس الشي، بتتحدى أعمق حدسنا عن الهوية.","\"Ship of Theseus\" = سفينة ثيسيوس. سؤال عن الهوية."],
["The philosophy of nonviolent resistance, as practiced by Mahatma Gandhi and Martin Luther King Junior, demonstrated that moral authority can be more powerful than physical force in achieving lasting social change.","فلسفة المقاومة اللاعنفية كما مارسها المهاتما غاندي ومارتن لوثر كينغ جونيور أثبتت إنو السلطة الأخلاقية ممكن تكون أقوى من القوة الجسدية بتحقيق تغيير اجتماعي دائم.","\"Nonviolent resistance\" = المقاومة اللاعنفية. قوة الأخلاق."],
["The concept of the golden mean, proposed by Aristotle, suggests that virtue lies not in extremes but in finding the appropriate middle ground between excess and deficiency in any given situation.","مفهوم الوسط الذهبي اللي اقترحه أرسطو بيقترح إنو الفضيلة مش بالتطرف بل بإيجاد الأرضية الوسطى المناسبة بين الإفراط والنقصان بأي موقف معين.","\"Golden mean\" = الوسط الذهبي. فلسفة الاعتدال."],
["The question of whether free will truly exists or whether all human behavior is ultimately determined by prior causes remains one of the most contested issues in both philosophy and neuroscience.","سؤال إذا الإرادة الحرة موجودة فعلاً أو إذا كل السلوك البشري بالنهاية محدد بأسباب سابقة لسا واحد من أكتر القضايا جدلاً بالفلسفة وعلم الأعصاب.","\"Free will\" = الإرادة الحرة. سؤال فلسفي أساسي."],
["Epistemology, the branch of philosophy concerned with the nature, sources, and limits of human knowledge, asks the deceptively simple question: how do we know what we claim to know?","نظرية المعرفة، فرع الفلسفة المعني بطبيعة ومصادر وحدود المعرفة البشرية، بيسأل سؤال بسيط بشكل خادع: كيف بنعرف اللي بندعي إنا بنعرفه؟","\"Epistemology\" = نظرية المعرفة. كيف بنعرف؟"],
["The concept of moral relativism, which holds that ethical standards are culturally determined rather than universal, creates challenging dilemmas when cultures with fundamentally different values interact.","مفهوم النسبية الأخلاقية اللي بيقول إنو المعايير الأخلاقية محددة ثقافياً بدل ما تكون عالمية بيخلق معضلات صعبة لما ثقافات بقيم مختلفة جذرياً بيتفاعلوا.","\"Moral relativism\" = النسبية الأخلاقية."],
["The philosophical concept of authenticity, living in accordance with your true self rather than conforming to external expectations, has become central to modern existentialist and humanistic psychology.","المفهوم الفلسفي للأصالة، العيش بتوافق مع ذاتك الحقيقية بدل الانصياع للتوقعات الخارجية، صار مركزي بعلم النفس الوجودي والإنساني الحديث.","\"Authenticity\" = الأصالة. كوني حالك الحقيقية."],
// Month 11: Advanced Idioms & Collocations (30)
["She was completely over the moon when she found out that her youngest daughter had been accepted into the university of her dreams.","كانت فرحانة كتير لما اكتشفت إنو بنتها الصغيرة انقبلت بجامعة أحلامها.","\"Over the moon\" = فرحان جداً. تعبير بريطاني شائع."],
["After months of going back and forth, they finally decided to take the plunge and invest their savings in opening a small family restaurant.","بعد أشهر من التردد، أخيراً قرروا ياخدوا الخطوة ويستثمروا مدخراتهم بفتح مطعم عائلي صغير.","\"Take the plunge\" = ياخد الخطوة. قرار كبير. \"Going back and forth\" = التردد."],
["He has a real gift for breaking the ice at parties; within minutes, complete strangers feel comfortable enough to share their life stories with him.","عنده موهبة حقيقية بكسر الجليد بالحفلات؛ خلال دقائق، غرباء كاملين بيحسوا بالراحة يشاركوه قصص حياتهم.","\"Breaking the ice\" = كسر الجليد. بدء محادثة مريحة."],
["I know the new schedule is going to be an adjustment, but let's not cross that bridge until we come to it and focus on today.","بعرف الجدول الجديد رح يكون تعديل، بس ما نهتم بهالموضوع لما يجي وقته ونركز على اليوم.","\"Cross that bridge when we come to it\" = نهتم بالموضوع لما يجي وقته."],
["The politician's speech was nothing but smoke and mirrors, designed to distract voters from the real issues that actually matter to their daily lives.","خطاب السياسي ما كان إلا خدعة، مصمم ليلهي الناخبين عن القضايا الحقيقية اللي فعلاً بتأثر على حياتهم اليومية.","\"Smoke and mirrors\" = خدعة/وهم."],
["When it comes to finding a good work-life balance, I have learned the hard way that you cannot have your cake and eat it too.","لما بيجي الموضوع لإيجاد توازن بين الشغل والحياة، تعلمت بالطريقة الصعبة إنو ما بتقدر تحصل على كل شي.","\"Have your cake and eat it too\" = تحصل على كل شي. مستحيل تاخذ كل شي."],
["She bent over backwards to make her mother-in-law feel welcome in their home, but unfortunately, her efforts went completely unappreciated and unacknowledged.","عملت المستحيل لتخلي حماتها تحس بالترحيب ببيتهم، بس للأسف جهودها ما تم تقديرها أو الاعتراف فيها.","\"Bent over backwards\" = عملت المستحيل. \"Unappreciated\" = غير مقدر."],
["The new employee is still learning the ropes, so please be patient with her and remember that we were all beginners at some point in our careers.","الموظفة الجديدة لسا عم تتعلم الأساسيات، فكونوا صبورين معها وتذكروا إنا كلنا كنا مبتدئين بمرحلة من حياتنا المهنية.","\"Learning the ropes\" = تتعلم الأساسيات."],
["He always manages to stay cool as a cucumber during high-pressure situations, which is exactly why the company promoted him to crisis manager.","دايماً بيقدر يضل هادي تحت الضغط، وهاد بالزبط ليش الشركة رقته لمدير أزمات.","\"Cool as a cucumber\" = هادي جداً."],
["After burning the midnight oil for three consecutive weeks to meet the project deadline, the entire team was completely burnt out and desperately needed a break.","بعد السهر لتلات أسابيع متتالية لتلحق الموعد النهائي للمشروع، كل الفريق كان منهك تماماً وبحاجة ماسة لاستراحة.","\"Burning the midnight oil\" = السهر للعمل. \"Burnt out\" = منهك."],
["I hate to be the one to burst your bubble, but the apartment you are considering renting is actually in a neighborhood known for being quite noisy.","بكره إني أكون اللي بيخيب ظنك، بس الشقة اللي عم تفكري تستأجريها فعلاً بحي معروف إنو صاخب كتير.","\"Burst your bubble\" = يخيب ظنك."],
["The teacher has a heart of gold and goes above and beyond for every single student, often spending her own money on classroom supplies and materials.","المعلمة قلبها ذهب وبتعمل أكتر من المطلوب لكل طالب، وكتير بتصرف من مصاريها على لوازم الصف والمواد.","\"Heart of gold\" = قلب ذهب. \"Goes above and beyond\" = تعمل أكتر من المطلوب."],
["Let's not beat around the bush: the company needs to cut costs significantly, and that unfortunately means some positions will have to be eliminated.","ما نلف وندور: الشركة لازم تخفض التكاليف بشكل كبير، وهاد للأسف يعني بعض الوظائف لازم تتلغى.","\"Beat around the bush\" = يلف ويدور. \"Cut costs\" = يخفض التكاليف."],
["She has a remarkable ability to think outside the box and come up with creative solutions to problems that leave everyone else completely stumped.","عندها قدرة ملحوظة تفكر خارج الصندوق وتطلع بحلول إبداعية لمشاكل بتخلي كل الباقيين محتارين تماماً.","\"Think outside the box\" = يفكر خارج الصندوق. \"Stumped\" = محتار."],
["Getting a foot in the door at a competitive company is often the hardest part, but once you prove yourself, opportunities tend to multiply rapidly.","إنك تحطي إجرك بالباب بشركة تنافسية غالباً أصعب شي، بس أول ما تثبتي حالك، الفرص بتميل تتضاعف بسرعة.","\"Foot in the door\" = أول فرصة/بداية."],
["He tends to wear his heart on his sleeve, which makes him incredibly genuine and trustworthy but also somewhat vulnerable to being taken advantage of.","بيميل يبيّن مشاعره بوضوح، واللي بيخليه صادق وموثوق بشكل لا يصدق بس كمان شوي معرض لأنو ينستغل.","\"Wear your heart on your sleeve\" = يبيّن مشاعره بوضوح."],
